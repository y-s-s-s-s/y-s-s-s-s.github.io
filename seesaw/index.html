<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>シーソーでいちばん重いのは？</title>
  <style>
    :root{
      --bg1:#08122c;
      --bg2:#0b2a3a;
      --stroke:rgba(255,255,255,.16);
      --text:#f2f5ff;
      --muted:rgba(255,255,255,.72);
      --shadow:0 18px 60px rgba(0,0,0,.45);
      --ok:#7CFFB2;
      --ng:#ff7a7a;
      --accent:#ffd54a;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
      color:var(--text);
      background:
        radial-gradient(1000px 700px at 15% 10%, #253d85, var(--bg1)),
        radial-gradient(900px 650px at 85% 20%, #3c1d7a, transparent 60%),
        radial-gradient(900px 650px at 50% 120%, #145a5e, transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height:100svh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px 0 16px; /* 省スペース */
      overflow:hidden;
    }

    #fx{
      position:fixed; inset:0;
      width:100vw; height:100vh;
      pointer-events:none;
      z-index:5;
    }

    .wrap{
      width:min(1080px, 94vw);
      z-index:10;
    }

    .titleRow{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:10px;
      margin:0 0 8px;
      flex-wrap:wrap;
    }
    h1{
      margin:0;
      font-weight:1000;
      letter-spacing:.02em;
      font-size:16px; /* 少し小さく */
      display:flex;
      align-items:center;
      gap:8px;
      line-height:1.2;
    }

    .pillRow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:center;
    }
    .pill{
      font-size:12px;
      font-weight:900;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      user-select:none;
      white-space:nowrap;
    }
    .pill b{ color:var(--accent); }

    /* stage */
    .stage{
      margin-top:8px;
      background:rgba(0,0,0,.20);
      border:1px solid rgba(255,255,255,.14);
      border-radius:16px;
      padding:10px; /* 省スペース */
    }

    /* ★横3個×縦1行（PC/iPad） */
    .seesawGrid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:10px;
      align-items:stretch;
    }

    /* ★スマホは「縦1列」に折り返し（横スクロールはしない） */
    @media (max-width: 860px){
      .seesawGrid{ grid-template-columns: 1fr; }
    }

    .seesaw{
      border-radius:14px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      padding:10px;
      position:relative;
      overflow:hidden;
      min-height: 170px; /* 省スペース */
    }
    /* 念のため */
    .seesawLabel{ display:none !important; }

    .rig{
      position:relative;
      height:130px; /* 省スペース */
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* fulcrum */
    .fulcrum{
      position:absolute;
      bottom:14px;
      width:0; height:0;
      border-left:22px solid transparent;
      border-right:22px solid transparent;
      border-bottom:36px solid rgba(216,222,233,.35);
      filter: drop-shadow(0 8px 18px rgba(0,0,0,.35));
    }
    .base{
      position:absolute;
      bottom:6px;
      width:180px;
      height:9px;
      border-radius:999px;
      background: rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.10);
    }

    /* beam */
    .beam{
      position:absolute;
      bottom:48px;
      width:min(420px, 92%);
      height:12px;
      border-radius:999px;
      background: linear-gradient(180deg, rgba(197,138,75,.95), rgba(154,101,51,.95));
      border:1px solid rgba(255,255,255,.10);
      transform-origin: 50% 50%;
      box-shadow: 0 10px 26px rgba(0,0,0,.28);
      transition: transform 260ms ease;
    }

    /* platforms */
    .platform{
      position:absolute;
      width:72px;
      height:48px;
      border-radius:14px;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      backdrop-filter: blur(8px);
    }
    .platform img{
      width:84%;
      height:84%;
      object-fit:contain;
      display:block;
      pointer-events:none;
    }
    .fallbackEmoji{
      font-size:28px;
      line-height:1;
      font-weight:900;
      opacity:.95;
      pointer-events:none;
    }

    .platform.left{ left: calc(50% - min(210px, 44%) ); }
    .platform.right{ right: calc(50% - min(210px, 44%) ); }

    /* tilt states */
    .tilt-left  .beam{ transform: rotate(-7deg); }
    .tilt-right .beam{ transform: rotate( 7deg); }
    .tilt-left  .platform.left { transform: translateY(8px); }
    .tilt-left  .platform.right{ transform: translateY(-8px); }
    .tilt-right .platform.left { transform: translateY(-8px); }
    .tilt-right .platform.right{ transform: translateY(8px); }

    /* choices */
    .choices{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:10px;
      margin-top:10px;
    }
    .choiceBtn{
      border:none;
      border-radius:16px;
      padding:10px 8px;
      cursor:pointer;
      user-select:none;
      touch-action:manipulation;
      background: rgba(255,255,255,.10);
      color: var(--text);
      border:1px solid rgba(255,255,255,.16);
      box-shadow: 0 18px 40px rgba(0,0,0,.18);
      transition: transform .08s ease, filter .08s ease, background .2s ease, border-color .2s ease;
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:center;
      justify-content:center;
      min-height:92px; /* 省スペース */
    }
    .choiceBtn:active{ transform: scale(.98); filter: brightness(1.1); }
    .choiceBtn.correct{
      background: rgba(124,255,178,.18);
      border-color: rgba(124,255,178,.45);
    }
    .choiceBtn.wrong{
      background: rgba(255,122,122,.16);
      border-color: rgba(255,122,122,.45);
    }
    .choiceThumb{
      width:58px; height:58px;
      border-radius:14px;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .choiceThumb img{ width:84%; height:84%; object-fit:contain; }

    /* 念のため：名前欄があっても見えない */
    .choiceName{ display:none !important; }

    .statusRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      align-items:center;
      margin-top:10px;
    }
    .status{
      padding:9px 10px;
      border-radius:14px;
      background:rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.12);
      font-size:14px;
      font-weight:900;
      min-width: 240px;
      text-align:center;
    }
    .status.ok{ border-color: rgba(124,255,178,.35); }
    .status.ng{ border-color: rgba(255,122,122,.35); }

    .toolsRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:8px;
    }
    .miniBtn{
      border:none;
      padding:9px 11px;
      border-radius:14px;
      font-size:13px;
      font-weight:900;
      cursor:pointer;
      user-select:none;
      touch-action:manipulation;
      background: rgba(255,255,255,.10);
      color:var(--text);
      border:1px solid rgba(255,255,255,.16);
    }
    .miniBtn.primary{
      background: rgba(255,213,74,.18);
      border-color: rgba(255,213,74,.45);
      color:#221400;
    }
    .toggle{
      display:flex; align-items:center; gap:10px;
      padding:9px 11px;
      border-radius:14px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.14);
      font-size:13px;
      font-weight:900;
    }
    .toggle input{ transform:scale(1.15); }

    .footerTip{
      margin-top:8px;
      font-size:12px;
      opacity:.86;
      text-align:center;
      line-height:1.45;
      color:rgba(255,255,255,.72);
    }

    @media (max-width:720px){
      .choices{ grid-template-columns: repeat(2, 1fr); }
      .choiceBtn{ min-height:86px; }
    }
    @media (max-width:560px){
      h1{ font-size:15px; }
      .footerTip{ display:none; } /* 超小さい画面は非表示 */
    }

    @media (prefers-reduced-motion: reduce){
      .beam{ transition:none; }
      .choiceBtn{ transition:none; }
    }
  </style>
</head>

<body>
<canvas id="fx"></canvas>

<div class="wrap">
  <div class="titleRow">
    <div>
      <h1>⚖️ シーソーでいちばん重いのは？</h1>
    </div>
    <div class="pillRow">
      <div class="pill">せいかい：<b><span id="score">0</span></b></div>
      <div class="pill">れんぞく：<b><span id="streak">0</span></b></div>
    </div>
  </div>

  <div class="stage">
    <div class="seesawGrid" id="seesawGrid" aria-label="シーソー比較"></div>
  </div>

  <div class="choices" id="choices" aria-label="答えの選択肢"></div>

  <div class="statusRow">
    <div class="status" id="status">読み込み中...</div>
  </div>

  <div class="toolsRow">
    <button class="miniBtn primary" id="btnNext">つぎの もんだい</button>
    <button class="miniBtn" id="btnRetry">もういちど</button>

    <label class="toggle" title="iPadは最初のタップで音が有効になります（仕様）">
      <input id="soundToggle" type="checkbox" checked>
      おと ON
    </label>
  </div>

  <div class="footerTip">
    画像は <b>../count/assets/items/manifest.json</b> から読み込みます（重複なしで4種類ランダム）。
  </div>
</div>

<script>
/* ============================
   画像：manifest.json（GitHub Pages向け）
   seesaw/index.html から見て
   ../count/assets/items/manifest.json を読む
   画像実体：../count/assets/items/<file>
   ============================ */
const IMAGE_DIR = "../count/assets/items/";
const MANIFEST_URL = IMAGE_DIR + "manifest.json";

/* ============================
   状態
   ============================ */
let pool = [];
let currentItems = [];
let weights = [1,2,3,4];
let heaviestId = 0;
let comparisons = [];
let locked = false;

let score = 0;
let streak = 0;

/* ============================
   DOM
   ============================ */
const seesawGrid = document.getElementById("seesawGrid");
const choicesEl = document.getElementById("choices");
const statusEl  = document.getElementById("status");
const scoreEl   = document.getElementById("score");
const streakEl  = document.getElementById("streak");
const btnNext  = document.getElementById("btnNext");
const btnRetry = document.getElementById("btnRetry");
const soundToggle = document.getElementById("soundToggle");

/* ============================
   音（WebAudio：簡易）
   ============================ */
let audioCtx = null;
function ctx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
async function ensureAudio(){
  if(!soundToggle.checked) return;
  try{
    const c = ctx();
    if(c.state === "suspended") await c.resume();
  }catch(e){}
}
function tone(freq, t0, dur, type="sine", gain=0.12){
  const c = ctx();
  const o = c.createOscillator();
  const g = c.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.value = 0.0001;
  o.connect(g); g.connect(c.destination);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.start(t0);
  o.stop(t0 + dur + 0.02);
}
function playOk(){
  if(!soundToggle.checked) return;
  const c = ctx();
  const t = c.currentTime;
  tone(660, t, .10, "triangle", .14);
  tone(880, t + .10, .12, "triangle", .12);
  tone(1100, t + .22, .14, "sine", .10);
}
function playNg(){
  if(!soundToggle.checked) return;
  const c = ctx();
  const t = c.currentTime;
  tone(220, t, .18, "square", .10);
  tone(170, t + .08, .22, "square", .08);
}

/* ============================
   FX（Canvas）
   ============================ */
const fx = document.getElementById("fx");
const cx2 = fx.getContext("2d");
const particles = [];
function resizeFX(){
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  fx.width = Math.floor(innerWidth * dpr);
  fx.height = Math.floor(innerHeight * dpr);
  fx.style.width = innerWidth + "px";
  fx.style.height = innerHeight + "px";
  cx2.setTransform(dpr,0,0,dpr,0,0);
}
addEventListener("resize", resizeFX, {passive:true});
resizeFX();
function rand(a,b){ return a + Math.random()*(b-a); }
function spawnConfetti(n=120){
  for(let i=0;i<n;i++){
    particles.push({
      x: innerWidth*0.5 + rand(-50, 50),
      y: innerHeight*0.2 + rand(-20, 20),
      vx: rand(-6, 6),
      vy: rand(-9, -2),
      g: 0.12,
      r: rand(2.5, 4.5),
      a: 1,
      life: rand(40, 90),
      col: ["#ffd54a","#7CFFB2","#5ad8ff","#ff7bd1","#b48cff","#ffffff"][Math.floor(Math.random()*6)]
    });
  }
}
function fxLoop(){
  cx2.clearRect(0,0,innerWidth,innerHeight);
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += p.g;
    p.life -= 1; p.a *= 0.985;
    cx2.globalAlpha = Math.max(0, Math.min(1, p.a));
    cx2.fillStyle = p.col;
    cx2.beginPath();
    cx2.arc(p.x, p.y, p.r, 0, Math.PI*2);
    cx2.fill();
    if(p.life <= 0 || p.y > innerHeight + 60) particles.splice(i,1);
  }
  requestAnimationFrame(fxLoop);
}
requestAnimationFrame(fxLoop);

/* ============================
   helper
   ============================ */
function setStatus(text, kind=""){
  statusEl.textContent = text;
  statusEl.classList.remove("ok","ng");
  if(kind) statusEl.classList.add(kind);
}
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

/* ============================
   manifest 読み込み
   ============================ */
async function loadManifest(){
  try{
    const url = MANIFEST_URL + "?v=" + Date.now();
    const res = await fetch(url, { cache: "no-store" });
    if(!res.ok) throw new Error("manifest fetch failed: " + res.status);
    const data = await res.json();
    const list = Array.isArray(data.images) ? data.images : [];
    pool = list.filter(x => typeof x === "string" && x.trim().length > 0);

    if(pool.length < 4){
      throw new Error("images in manifest < 4");
    }
    setStatus("スタート！ もんだいを つくるよ");
  }catch(e){
    console.error(e);
    setStatus("画像一覧の読み込みに失敗（manifest.json / パスを確認）", "ng");
    pool = [];
  }
}

/* ============================
   論理：3比較から「一番重い」が一意に確定するセットを選ぶ
   ============================ */
function allPermutations(arr){
  const res = [];
  const a = arr.slice();
  function backtrack(i){
    if(i === a.length){ res.push(a.slice()); return; }
    for(let j=i;j<a.length;j++){
      [a[i],a[j]] = [a[j],a[i]];
      backtrack(i+1);
      [a[i],a[j]] = [a[j],a[i]];
    }
  }
  backtrack(0);
  return res;
}
const perms = allPermutations([0,1,2,3]);

function constraintsFromPairs(pairs, w){
  return pairs.map(({a,b}) => ({
    a, b,
    dir: (w[a] > w[b]) ? "a>b" : "b>a"
  }));
}
function satisfies(perm, constraints){
  const pos = new Map();
  perm.forEach((id, idx) => pos.set(id, idx)); // idx小さいほど重い
  for(const c of constraints){
    if(c.dir === "a>b"){
      if(!(pos.get(c.a) < pos.get(c.b))) return false;
    }else{
      if(!(pos.get(c.b) < pos.get(c.a))) return false;
    }
  }
  return true;
}
function uniqueHeaviestGivenConstraints(constraints){
  let heavy = null;
  let count = 0;
  for(const perm of perms){
    if(satisfies(perm, constraints)){
      const top = perm[0];
      if(heavy === null) heavy = top;
      else if(heavy !== top) return false;
      count++;
    }
  }
  return count > 0;
}
function chooseSolvableComparisonSet(w){
  const pairsAll = [];
  for(let i=0;i<4;i++){
    for(let j=i+1;j<4;j++){
      pairsAll.push({a:i,b:j});
    }
  }
  const sets = [];
  for(let i=0;i<pairsAll.length;i++){
    for(let j=i+1;j<pairsAll.length;j++){
      for(let k=j+1;k<pairsAll.length;k++){
        sets.push([pairsAll[i], pairsAll[j], pairsAll[k]]);
      }
    }
  }
  for(let t=0;t<80;t++){
    const cand = sets[Math.floor(Math.random()*sets.length)];
    const cons = constraintsFromPairs(cand, w);
    if(uniqueHeaviestGivenConstraints(cons)) return cand;
  }
  for(const cand of sets){
    const cons = constraintsFromPairs(cand, w);
    if(uniqueHeaviestGivenConstraints(cons)) return cand;
  }
  const heavy = w.indexOf(Math.max(...w));
  const others = [0,1,2,3].filter(x => x !== heavy);
  return [{a:heavy,b:others[0]}, {a:heavy,b:others[1]}, {a:heavy,b:others[2]}];
}

/* ============================
   表示：画像ノード（失敗時フォールバック）
   ============================ */
function createItemNode(item){
  const wrap = document.createElement("div");
  const img = document.createElement("img");
  img.alt = item.alt || "";
  img.src = item.img;
  img.loading = "eager";
  img.onerror = () => {
    img.remove();
    const em = document.createElement("div");
    em.className = "fallbackEmoji";
    em.textContent = item.fallback || "？";
    wrap.appendChild(em);
  };
  wrap.appendChild(img);
  return wrap;
}

/* ============================
   描画：シーソー3つ（ラベルなし）
   ============================ */
function renderSeesaws(){
  seesawGrid.innerHTML = "";
  comparisons.forEach((c) => {
    const a = currentItems[c.a];
    const b = currentItems[c.b];

    const box = document.createElement("div");
    box.className = "seesaw " + (c.tilt === "left" ? "tilt-left" : "tilt-right");

    const rig = document.createElement("div");
    rig.className = "rig";

    const beam = document.createElement("div");
    beam.className = "beam";
    rig.appendChild(beam);

    const fulcrum = document.createElement("div");
    fulcrum.className = "fulcrum";
    rig.appendChild(fulcrum);

    const base = document.createElement("div");
    base.className = "base";
    rig.appendChild(base);

    const left = document.createElement("div");
    left.className = "platform left";
    left.appendChild(createItemNode(a));

    const right = document.createElement("div");
    right.className = "platform right";
    right.appendChild(createItemNode(b));

    rig.appendChild(left);
    rig.appendChild(right);

    box.appendChild(rig);
    seesawGrid.appendChild(box);
  });
}

/* ============================
   選択肢（文字なし）
   ============================ */
function renderChoices(){
  choicesEl.innerHTML = "";
  currentItems.forEach(item => {
    const btn = document.createElement("button");
    btn.className = "choiceBtn";
    btn.setAttribute("aria-label", "えらぶ");

    const thumb = document.createElement("div");
    thumb.className = "choiceThumb";
    thumb.appendChild(createItemNode(item));
    btn.appendChild(thumb);

    // ★A/B/C/D表示は作らない

    btn.addEventListener("click", () => choose(item.id, btn));
    choicesEl.appendChild(btn);
  });
}

/* ============================
   問題生成：manifestからランダム4種（重複なし）
   ============================ */
function pickFourUniqueFromPool(){
  const list = pool.slice();
  shuffle(list);
  return list.slice(0, 4);
}
function buildItemsFromFiles(files){
  const fallbacks = ["🍎","🚗","⭐️","🐱"];
  return files.map((file, i) => ({
    id: i,
    img: IMAGE_DIR + file,
    fallback: fallbacks[i],
    alt: ""
  }));
}

function newPuzzle(){
  if(pool.length < 4){
    setStatus("画像が足りません（manifestに4枚以上必要）", "ng");
    return;
  }

  locked = false;
  setStatus("どれが いちばん おもい？");

  const files = pickFourUniqueFromPool();
  currentItems = buildItemsFromFiles(files);

  const base = [1,2,3,4];
  shuffle(base);
  weights = base.slice();

  heaviestId = weights.indexOf(Math.max(...weights));

  const pairSet = chooseSolvableComparisonSet(weights);

  comparisons = pairSet.map(p => {
    const leftHeavy = weights[p.a] > weights[p.b];
    return { a:p.a, b:p.b, tilt: leftHeavy ? "left" : "right" };
  });

  renderSeesaws();
  renderChoices();
}

/* ============================
   回答
   ============================ */
async function choose(id, btn){
  if(locked) return;
  locked = true;
  await ensureAudio();

  if(id === heaviestId){
    btn.classList.add("correct");
    score++;
    streak++;
    scoreEl.textContent = score;
    streakEl.textContent = streak;
    setStatus("せいかい！🎉", "ok");
    spawnConfetti(160);
    playOk();
    setTimeout(() => newPuzzle(), 800);
  }else{
    btn.classList.add("wrong");
    streak = 0;
    streakEl.textContent = streak;
    setStatus("ざんねん！もういちど🙂", "ng");
    playNg();
    setTimeout(() => { locked = false; }, 520);
  }
}

/* ============================
   ボタン
   ============================ */
btnNext.addEventListener("click", () => newPuzzle());
btnRetry.addEventListener("click", () => {
  locked = false;
  setStatus("もういちど！どれが いちばん おもい？");
});

/* ============================
   初期化
   ============================ */
(async function init(){
  scoreEl.textContent = score;
  streakEl.textContent = streak;
  setStatus("画像を読み込み中...");
  await loadManifest();
  if(pool.length >= 4){
    setTimeout(() => newPuzzle(), 120);
  }
})();
</script>
