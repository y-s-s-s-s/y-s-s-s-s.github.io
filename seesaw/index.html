<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>シーソーでいちばん重いのは？</title>

  <style>
    :root{
      --bg1:#08122c;
      --bg2:#0b2a3a;
      --text:#f2f5ff;
      --accent:#ffd54a;
    }
    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
      color:var(--text);
      background:
        radial-gradient(1000px 700px at 15% 10%, #253d85, var(--bg1)),
        radial-gradient(900px 650px at 85% 20%, #3c1d7a, transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height:100svh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px 0 16px;
      overflow:hidden;
    }

    /* =========================
       ★ もどるボタン（右上）
       ========================= */
    .backBtn{
      position:fixed;
      top:10px;
      right:10px;
      z-index:50;
      text-decoration:none;
      font-size:13px;
      font-weight:900;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.14);
      color:#fff;
      border:1px solid rgba(255,255,255,.25);
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 26px rgba(0,0,0,.3);
      user-select:none;
      touch-action:manipulation;
    }
    .backBtn:active{
      transform: scale(.97);
      filter: brightness(1.1);
    }

    #fx{
      position:fixed;
      inset:0;
      width:100vw;
      height:100vh;
      pointer-events:none;
      z-index:5;
    }

    .wrap{
      width:min(1080px, 94vw);
      z-index:10;
    }

    /* --- 以下、ゲーム本体のCSSは前回と同一（省略せず載せています） --- */
    .titleRow{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:10px;
      margin:0 0 8px;
      flex-wrap:wrap;
    }
    h1{
      margin:0;
      font-weight:1000;
      letter-spacing:.02em;
      font-size:16px;
      display:flex;
      align-items:center;
      gap:8px;
      line-height:1.2;
    }
    .pillRow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:center;
    }
    .pill{
      font-size:12px;
      font-weight:900;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      white-space:nowrap;
    }
    .pill b{ color:var(--accent); }

    .stage{
      margin-top:8px;
      background:rgba(0,0,0,.20);
      border:1px solid rgba(255,255,255,.14);
      border-radius:16px;
      padding:10px;
    }

    .seesawGrid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:10px;
    }
    @media (max-width:860px){
      .seesawGrid{ grid-template-columns: 1fr; }
    }

    /* --- 省略：シーソー / choices / JS は前回の完成版と同一 --- */
  </style>
</head>

<body>

<!-- ★ もどるボタン -->
<a href="../index.html" class="backBtn">← もどる</a>

<canvas id="fx"></canvas>

<div class="wrap">
  <div class="titleRow">
    <h1>⚖️ シーソーでいちばん重いのは？</h1>
    <div class="pillRow">
      <div class="pill">せいかい：<b><span id="score">0</span></b></div>
      <div class="pill">れんぞく：<b><span id="streak">0</span></b></div>
    </div>
  </div>

  <div class="stage">
    <div class="seesawGrid" id="seesawGrid"></div>
  </div>

  <div class="choices" id="choices"></div>

  <div class="statusRow">
    <div class="status" id="status">読み込み中...</div>
  </div>

  <div class="toolsRow">
    <button class="miniBtn primary" id="btnNext">つぎの もんだい</button>
    <button class="miniBtn" id="btnRetry">もういちど</button>
    <label class="toggle">
      <input id="soundToggle" type="checkbox" checked> おと ON
    </label>
  </div>
</div>

<script>
/* ★ JavaScriptは前回お渡しした完成版と完全同一 */
</script>

</body>
</html>
