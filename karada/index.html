<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>からだ とれーにんぐ</title>
  <style>
    :root{
      --bg:#0b1020;
      --card:#121a33;
      --card2:#0f1730;
      --text:#eef2ff;
      --muted:#b9c2ff;
      --accent:#62d0ff;
      --accent2:#7cf1b8;
      --danger:#ff6b6b;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --radius: 22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      background:
        radial-gradient(900px 500px at 20% -10%, rgba(98,208,255,.25), transparent 60%),
        radial-gradient(700px 400px at 90% 10%, rgba(124,241,184,.18), transparent 60%),
        radial-gradient(800px 500px at 50% 110%, rgba(185,194,255,.12), transparent 60%),
        var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px 14px 90px;
    }

    header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin: 8px 0 14px;
    }
    .titleArea{
      flex: 1;
      min-width: 200px;
    }
    .titleline{
      font-size: clamp(22px, 3.4vw, 36px);
      font-weight: 900;
      letter-spacing: .02em;
      line-height: 1.15;
      margin:0;
    }
    .miniinfo{
      font-size: 14px;
      color: var(--muted);
      opacity:.95;
      line-height:1.35;
      user-select:none;
      margin-top: 6px;
    }

    .progressArea{
      width: min(440px, 44vw);
      display:flex;
      flex-direction:column;
      gap: 8px;
      align-items:flex-end;
    }
    .progressHead{
      font-size: 13px;
      font-weight: 900;
      color: rgba(238,242,255,.92);
      letter-spacing:.08em;
      user-select:none;
    }
    .progressBar{
      width:100%;
      display:grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 6px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 10px 26px rgba(0,0,0,.25);
    }
    .seg{
      height: 12px;
      border-radius: 999px;
      background: rgba(185,194,255,.22);
      border: 1px solid rgba(255,255,255,.10);
    }
    .seg.done{
      background: rgba(124,241,184,.72);
      border-color: rgba(124,241,184,.45);
      box-shadow: 0 0 0 3px rgba(124,241,184,.12);
    }
    .seg.now{
      background: rgba(98,208,255,.78);
      border-color: rgba(98,208,255,.48);
      box-shadow: 0 0 0 3px rgba(98,208,255,.14);
    }
    .progressText{
      font-size: 13px;
      color: rgba(185,194,255,.98);
      font-weight: 800;
      user-select:none;
    }

    .main{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.10);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .mainInner{
      display:grid;
      grid-template-columns: 1.3fr .9fr;
      gap: 0;
      min-height: 360px;
    }

    .left{
      padding: 16px;
      background: linear-gradient(180deg, rgba(98,208,255,.08), rgba(255,255,255,.02));
      border-right: 1px solid rgba(255,255,255,.10);
      display:flex;
      flex-direction:column;
      gap: 12px;
    }
    .imgCard{
      flex: 1;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius: 20px;
      background: rgba(0,0,0,.16);
      border: 1px solid rgba(255,255,255,.10);
      overflow:hidden;
      position:relative;
      min-height: 280px;
    }
    .imgCard img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      background: rgba(0,0,0,.10);
    }
    .imgHint{
      position:absolute;
      left:14px;
      bottom:12px;
      font-size: 13px;
      color: rgba(238,242,255,.80);
      background: rgba(0,0,0,.28);
      border: 1px solid rgba(255,255,255,.12);
      padding: 8px 10px;
      border-radius: 14px;
      backdrop-filter: blur(6px);
      user-select:none;
    }

    .right{
      padding: 16px;
      display:flex;
      flex-direction:column;
      gap: 12px;
      background: linear-gradient(180deg, rgba(124,241,184,.06), rgba(255,255,255,.02));
    }

    .timerBox{
      flex: 1;
      border-radius: 20px;
      background: rgba(0,0,0,.16);
      border: 1px solid rgba(255,255,255,.10);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding: 18px;
      gap: 10px;
      position:relative;
    }
    .timerLabel{
      font-size: 14px;
      color: var(--muted);
      letter-spacing:.06em;
      user-select:none;
    }
    .timer{
      font-variant-numeric: tabular-nums;
      font-size: clamp(56px, 8vw, 96px);
      font-weight: 900;
      letter-spacing: .02em;
      line-height: 1;
      text-shadow: 0 8px 30px rgba(0,0,0,.35);
    }
    .status{
      font-size: 18px;
      font-weight: 800;
      color: rgba(238,242,255,.92);
      min-height: 26px;
      text-align:center;
      user-select:none;
    }

    .btnRow{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    button{
      appearance:none;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: var(--text);
      border-radius: 18px;
      padding: 14px 12px;
      font-size: 18px;
      font-weight: 900;
      cursor:pointer;
      user-select:none;
      transition: transform .06s ease, background .2s ease, border-color .2s ease;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
    }
    button:active{ transform: translateY(1px) scale(.99); }
    button:hover{ background: rgba(255,255,255,.12); }
    button:disabled{
      opacity:.55;
      cursor:not-allowed;
      box-shadow:none;
    }
    .start{ border-color: rgba(98,208,255,.45); background: rgba(98,208,255,.14); }
    .stop{ border-color: rgba(255,107,107,.45); background: rgba(255,107,107,.12); }
    .next{ border-color: rgba(124,241,184,.45); background: rgba(124,241,184,.12); }

    .overlay{
      position: fixed;
      inset: 0;
      display:none;
      align-items:center;
      justify-content:center;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(8px);
      z-index: 50;
      padding: 18px;
    }
    .overlay.show{ display:flex; }
    .overlayCard{
      width:min(760px, 100%);
      border-radius: 28px;
      background: rgba(18,26,51,.90);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 24px 70px rgba(0,0,0,.45);
      padding: 26px 18px;
      text-align:center;
    }
    .cueText{
      font-size: clamp(44px, 7vw, 92px);
      font-weight: 900;
      letter-spacing:.04em;
      line-height: 1.05;
      margin: 0;
      text-shadow: 0 12px 40px rgba(0,0,0,.40);
    }
    .cueSub{
      margin: 14px 0 0;
      font-size: 18px;
      color: rgba(185,194,255,.95);
      font-weight: 800;
    }

    .spacer{
      height: 50vh;
    }

    .settings{
      margin-top: 26px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .settingsHead{
      padding: 16px 16px 8px;
      font-size: 20px;
      font-weight: 900;
      letter-spacing:.02em;
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap: 10px;
    }
    .settingsNote{
      font-size: 13px;
      color: rgba(185,194,255,.96);
      font-weight: 800;
      user-select:none;
    }
    .settingsBody{
      padding: 0 12px 14px;
      display:flex;
      flex-direction:column;
      gap: 10px;
    }

    .setRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      background: rgba(0,0,0,.14);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 18px;
      padding: 12px 12px;
    }
    .setLeft{
      min-width: 170px;
      font-size: 15px;
      font-weight: 900;
      color: rgba(238,242,255,.96);
      user-select:none;
      line-height: 1.25;
    }
    .setLeft small{
      display:block;
      font-size: 12px;
      font-weight: 900;
      color: rgba(185,194,255,.96);
      letter-spacing:.08em;
      margin-top: 4px;
    }

    .choices{
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      gap: 8px;
    }

    .chip{
      position:relative;
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      cursor:pointer;
      user-select:none;
      font-weight: 900;
      color: rgba(238,242,255,.92);
      transition: background .18s ease, border-color .18s ease, transform .06s ease;
    }
    .chip:active{ transform: translateY(1px); }
    .chip input{
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor:pointer;
    }
    .chip.on{
      background: rgba(98,208,255,.14);
      border-color: rgba(98,208,255,.42);
      box-shadow: 0 0 0 3px rgba(98,208,255,.10);
    }
    .chip.on input{ accent-color: var(--accent2); }

    .setRow.now{
      border-color: rgba(98,208,255,.30);
      box-shadow: 0 0 0 3px rgba(98,208,255,.08);
    }
    .setRow.now .setLeft{
      color: rgba(238,242,255,.98);
    }

    @media (max-width: 920px){
      header{ align-items:flex-start; }
      .progressArea{ width: min(520px, 58vw); }
    }
    @media (max-width: 820px){
      header{ flex-direction:column; align-items:stretch; }
      .progressArea{ width:100%; align-items:flex-start; }
      .mainInner{ grid-template-columns: 1fr; }
      .left{ border-right:none; border-bottom: 1px solid rgba(255,255,255,.10); }
      .btnRow{ grid-template-columns: 1fr; }
      button{ font-size: 20px; padding: 16px 12px; }
      .setRow{ flex-direction:column; align-items:stretch; }
      .choices{ justify-content:flex-start; }
      .setLeft{ min-width:auto; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="titleArea">
        <h1 id="menuTitle" class="titleline"> </h1>
        <div class="miniinfo">
          <div id="menuCount"> </div>
          <div id="baseTimeInfo"> </div>
        </div>
      </div>

      <div class="progressArea" aria-label="しんちょく">
        <div class="progressHead">シンチョク</div>
        <div id="progressBar" class="progressBar"></div>
        <div id="progressText" class="progressText"> </div>
      </div>
    </header>

    <section class="main" aria-label="めいん">
      <div class="mainInner">
        <div class="left">
          <div class="imgCard">
            <img id="sampleImg" alt="おてほんがぞう" src="" />
            <div class="imgHint">がぞうは あとで さしかえ できます</div>
          </div>
        </div>

        <div class="right">
          <div class="timerBox">
            <div class="timerLabel">のこりじかん</div>
            <div id="timer" class="timer">00:00</div>
            <div id="status" class="status"> </div>
          </div>

          <div class="btnRow">
            <button id="btnStart" class="start">スタート</button>
            <button id="btnStop" class="stop">ストップ</button>
            <button id="btnNext" class="next">つぎへ</button>
          </div>
        </div>
      </div>
    </section>

    <div class="spacer"></div>

    <section class="settings" id="settings" aria-label="せってい">
      <div class="settingsHead">
        <div>せってい</div>
        <div class="settingsNote">うごいているときは かえられません（ストップ してね）</div>
      </div>
      <div class="settingsBody" id="settingsBody">
        <!-- js -->
      </div>
    </section>
  </div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true">
    <div class="overlayCard">
      <p class="cueText" id="cueText"> </p>
      <p class="cueSub" id="cueSub"> </p>
    </div>
  </div>

  <script>
    // menu data
    const menus = [
      { title: "かたあしだち（みぎ）", seconds: 60, img: "assets/01.png" },
      { title: "かたあしだち（ひだり）", seconds: 60, img: "assets/02.png" },
      { title: "ひこうき（みぎ）", seconds: 30, img: "assets/03.png" },
      { title: "ひこうき（ひだり）", seconds: 30, img: "assets/04.png" },
      { title: "ぷらんく", seconds: 60, img: "assets/05.png" },
      { title: "ボールなげあげ", seconds: 60, img: "assets/06.png" },
      { title: "ドリブル", seconds: 120, img: "assets/07.png" },
      { title: "てつぼうぶらさがり", seconds: 15, img: "assets/08.png" },
      { title: "まめつかみ", seconds: 60, img: "assets/09.png" },
      { title: "ゴムとび", seconds: 60, img: "assets/10.png" },
    ];

    const TIME_CHOICES = [15,30,60,90,120,180];

    // elements
    const menuTitle = document.getElementById("menuTitle");
    const menuCount = document.getElementById("menuCount");
    const baseTimeInfo = document.getElementById("baseTimeInfo");
    const sampleImg = document.getElementById("sampleImg");
    const timerEl = document.getElementById("timer");
    const statusEl = document.getElementById("status");

    const btnStart = document.getElementById("btnStart");
    const btnStop = document.getElementById("btnStop");
    const btnNext = document.getElementById("btnNext");

    const overlay = document.getElementById("overlay");
    const cueTextEl = document.getElementById("cueText");
    const cueSubEl = document.getElementById("cueSub");

    const settingsBody = document.getElementById("settingsBody");

    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");

    // state
    let idx = 0;
    let mode = "idle"; // idle | cue | running | paused | finished
    let remainingMs = 0;

    let tickTimer = null;
    let cueTimers = [];
    let lastSpokenAt = 0;

    // progress
    const done = Array(menus.length).fill(false);

    // helpers
    function pad2(n){ return String(n).padStart(2,"0"); }
    function fmt(ms){
      const total = Math.max(0, Math.ceil(ms / 1000));
      const m = Math.floor(total / 60);
      const s = total % 60;
      return `${pad2(m)}:${pad2(s)}`;
    }
    function setStatus(txt){
      statusEl.textContent = txt || "";
    }

    function showOverlay(text, sub){
      cueTextEl.textContent = text || "";
      cueSubEl.textContent = sub || "";
      overlay.classList.add("show");
    }
    function hideOverlay(){
      overlay.classList.remove("show");
    }

    function clearCueTimers(){
      cueTimers.forEach(t => clearTimeout(t));
      cueTimers = [];
    }

    function stopAllTimers(){
      clearCueTimers();
      if(tickTimer){ clearInterval(tickTimer); tickTimer = null; }
    }

    function canChangeSetting(){
      return !(mode === "cue" || mode === "running");
    }

    function speak(text){
      try{
        if(!("speechSynthesis" in window)) return;
        const now = Date.now();
        if(now - lastSpokenAt < 300) return;
        lastSpokenAt = now;

        const u = new SpeechSynthesisUtterance(text);
        u.lang = "ja-JP";
        u.rate = 1.05;
        u.pitch = 1.0;
        u.volume = 1.0;

        const voices = speechSynthesis.getVoices?.() || [];
        const ja = voices.find(v => (v.lang || "").toLowerCase().startsWith("ja"));
        if(ja) u.voice = ja;

        speechSynthesis.cancel();
        speechSynthesis.speak(u);
      }catch(e){}
    }

    // progress ui
    function buildProgress(){
      progressBar.innerHTML = "";
      for(let i=0;i<menus.length;i++){
        const d = document.createElement("div");
        d.className = "seg";
        d.setAttribute("aria-label", `seg ${i+1}`);
        progressBar.appendChild(d);
      }
      updateProgress();
    }

    function updateProgress(){
      const segs = [...progressBar.querySelectorAll(".seg")];
      segs.forEach((s, i) => {
        s.classList.remove("done","now");
        if(done[i]) s.classList.add("done");
        if(i === idx) s.classList.add("now");
      });
      const doneCount = done.filter(Boolean).length;
      progressText.textContent = `${doneCount}/10`;
    }

    // settings ui
    function buildSettings(){
      settingsBody.innerHTML = "";

      // top row: apply all
      settingsBody.appendChild(buildSetRowAll());

      // each menu row
      menus.forEach((m, i) => {
        settingsBody.appendChild(buildSetRow(i));
      });

      updateSettingsHighlight();
      setSettingsEnabled(canChangeSetting());
    }

    function buildSetRowAll(){
      const row = document.createElement("div");
      row.className = "setRow";
      row.dataset.row = "all";

      const left = document.createElement("div");
      left.className = "setLeft";
      left.textContent = "ぜんぶ";
      const sm = document.createElement("small");
      sm.textContent = "じかん を そろえる";
      left.appendChild(sm);

      const choices = document.createElement("div");
      choices.className = "choices";

      TIME_CHOICES.forEach(sec => {
        const chip = makeChoiceChip("all", sec, false);
        choices.appendChild(chip);
      });

      row.appendChild(left);
      row.appendChild(choices);
      return row;
    }

    function buildSetRow(i){
      const m = menus[i];
      const row = document.createElement("div");
      row.className = "setRow";
      row.dataset.row = String(i);

      const left = document.createElement("div");
      left.className = "setLeft";
      left.textContent = `${i+1}. ${m.title}`;
      const sm = document.createElement("small");
      sm.textContent = `いま ${m.seconds} びょう`;
      sm.className = "rowNowSec";
      left.appendChild(sm);

      const choices = document.createElement("div");
      choices.className = "choices";

      TIME_CHOICES.forEach(sec => {
        const checked = (sec === m.seconds);
        const chip = makeChoiceChip(String(i), sec, checked);
        choices.appendChild(chip);
      });

      row.appendChild(left);
      row.appendChild(choices);
      return row;
    }

    function makeChoiceChip(groupId, sec, checked){
      const label = document.createElement("label");
      label.className = "chip" + (checked ? " on" : "");
      label.dataset.group = groupId;
      label.dataset.sec = String(sec);

      const input = document.createElement("input");
      input.type = "checkbox";
      input.checked = !!checked;
      input.setAttribute("aria-label", `${sec}`);

      const text = document.createElement("span");
      text.textContent = `${sec}`;

      label.appendChild(input);
      label.appendChild(text);

      label.addEventListener("click", (e) => {
        // allow clicking on label anywhere
        e.preventDefault();
        if(!canChangeSetting()){
          showOverlay("ストップしてね", "");
          setTimeout(() => hideOverlay(), 900);
          return;
        }
        setGroupExclusive(groupId, sec);
        if(groupId === "all"){
          applyAllSeconds(sec);
          showOverlay("できた", "ぜんぶ かえたよ");
          setTimeout(() => hideOverlay(), 700);
        }else{
          const i = parseInt(groupId, 10);
          applyOneSeconds(i, sec);
          showOverlay("できた", "");
          setTimeout(() => hideOverlay(), 550);
        }
      });

      return label;
    }

    function setGroupExclusive(groupId, sec){
      const chips = [...settingsBody.querySelectorAll(`.chip[data-group="${groupId}"]`)];
      chips.forEach(ch => {
        const v = parseInt(ch.dataset.sec, 10);
        const inp = ch.querySelector("input");
        const on = (v === sec);
        inp.checked = on;
        ch.classList.toggle("on", on);
      });
    }

    function syncRowSecondsLabel(i){
      const row = settingsBody.querySelector(`.setRow[data-row="${i}"]`);
      if(!row) return;
      const sm = row.querySelector(".rowNowSec");
      if(sm) sm.textContent = `いま ${menus[i].seconds} びょう`;
    }

    function applyOneSeconds(i, sec){
      menus[i].seconds = sec;
      syncRowSecondsLabel(i);

      // if current menu, update timer to base and reset mode to idle
      if(i === idx){
        remainingMs = sec * 1000;
        timerEl.textContent = fmt(remainingMs);
        baseTimeInfo.textContent = `きほん じかん ${menus[idx].seconds} びょう`;
        mode = "idle";
        setStatus("");
        updateButtons();
      }
    }

    function applyAllSeconds(sec){
      menus.forEach((m, i) => {
        m.seconds = sec;
        syncRowSecondsLabel(i);
        setGroupExclusive(String(i), sec);
      });

      // update current
      remainingMs = menus[idx].seconds * 1000;
      timerEl.textContent = fmt(remainingMs);
      baseTimeInfo.textContent = `きほん じかん ${menus[idx].seconds} びょう`;
      mode = "idle";
      setStatus("");
      updateButtons();
    }

    function updateSettingsHighlight(){
      [...settingsBody.querySelectorAll(".setRow")].forEach(r => r.classList.remove("now"));
      const nowRow = settingsBody.querySelector(`.setRow[data-row="${idx}"]`);
      if(nowRow) nowRow.classList.add("now");
    }

    function setSettingsEnabled(enabled){
      // disable all checkboxes while running/cue
      const inputs = [...settingsBody.querySelectorAll("input[type='checkbox']")];
      inputs.forEach(i => i.disabled = !enabled);
    }

    function updateButtons(){
      btnStop.disabled = (mode === "idle" || mode === "finished");
      btnNext.disabled = (mode === "cue" || mode === "running");
      btnStart.disabled = (mode === "cue");
      setSettingsEnabled(canChangeSetting());
    }

    function loadMenu(i){
      idx = (i + menus.length) % menus.length;
      const m = menus[idx];

      menuTitle.textContent = m.title;
      menuCount.textContent = `${idx+1}/10`;
      baseTimeInfo.textContent = `きほん じかん ${m.seconds} びょう`;

      sampleImg.src = m.img;
      sampleImg.onerror = () => {
        sampleImg.removeAttribute("src");
      };

      remainingMs = m.seconds * 1000;
      timerEl.textContent = fmt(remainingMs);
      setStatus("");
      mode = "idle";
      updateButtons();

      updateProgress();
      updateSettingsHighlight();
    }

    function finish(){
      stopAllTimers();
      mode = "finished";
      remainingMs = 0;
      timerEl.textContent = "00:00";
      setStatus("よくできました");
      done[idx] = true;
      updateProgress();
      speak("やめ");
      updateButtons();
    }

    function startCountdown(){
      mode = "running";
      setStatus("");
      hideOverlay();
      updateButtons();

      const endAt = Date.now() + remainingMs;

      if(tickTimer) clearInterval(tickTimer);
      tickTimer = setInterval(() => {
        const now = Date.now();
        remainingMs = Math.max(0, endAt - now);
        timerEl.textContent = fmt(remainingMs);

        if(remainingMs <= 0){
          clearInterval(tickTimer);
          tickTimer = null;
          finish();
        }
      }, 100);
    }

    function cueSequenceThenStart(full){
      stopAllTimers();
      mode = "cue";
      updateButtons();

      const steps = full
        ? [
            { t: "いちについて", ms: 1500 },
            { t: "よーい", ms: 1500 },
            { t: "スタート", ms: 1000 },
          ]
        : [
            { t: "スタート", ms: 1000 },
          ];

      let total = 0;
      steps.forEach((s) => {
        cueTimers.push(setTimeout(() => {
          showOverlay(s.t, "");
        }, total));
        total += s.ms;
      });

      cueTimers.push(setTimeout(() => {
        startCountdown();
      }, total));
    }

    function onStart(){
      if(mode === "running" || mode === "cue") return;

      if(mode === "paused"){
        cueSequenceThenStart(false);
        return;
      }

      if(mode === "idle" || mode === "finished"){
        if(mode === "finished"){
          remainingMs = menus[idx].seconds * 1000;
          timerEl.textContent = fmt(remainingMs);
          setStatus("");
        }
        cueSequenceThenStart(true);
      }
    }

    function onStop(){
      if(mode === "cue"){
        stopAllTimers();
        hideOverlay();
        mode = "paused";
        setStatus("とまってるよ");
        updateButtons();
        return;
      }
      if(mode === "running"){
        stopAllTimers();
        mode = "paused";
        setStatus("とまってるよ");
        updateButtons();
      }
    }

    function onNext(){
      if(mode === "cue" || mode === "running") return;
      stopAllTimers();
      hideOverlay();
      setStatus("");
      loadMenu(idx + 1);
    }

    // bind
    btnStart.addEventListener("click", onStart);
    btnStop.addEventListener("click", onStop);
    btnNext.addEventListener("click", onNext);

    // init
    buildProgress();
    buildSettings();
    loadMenu(0);

    if("speechSynthesis" in window){
      speechSynthesis.onvoiceschanged = () => {};
    }
  </script>
</body>
</html>
