<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>からだ とれーにんぐ</title>
  <style>
    :root{
      --bg:#0b1020;
      --card:#121a33;
      --card2:#0f1730;
      --text:#eef2ff;
      --muted:#b9c2ff;
      --accent:#62d0ff;
      --accent2:#7cf1b8;
      --danger:#ff6b6b;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --radius: 22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      background:
        radial-gradient(900px 500px at 20% -10%, rgba(98,208,255,.25), transparent 60%),
        radial-gradient(700px 400px at 90% 10%, rgba(124,241,184,.18), transparent 60%),
        radial-gradient(800px 500px at 50% 110%, rgba(185,194,255,.12), transparent 60%),
        var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px 14px 90px;
    }

    header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin: 8px 0 14px;
    }
    .titleArea{
      flex: 1;
      min-width: 200px;
    }
    .titleline{
      font-size: clamp(22px, 3.4vw, 36px);
      font-weight: 900;
      letter-spacing: .02em;
      line-height: 1.15;
      margin:0;
    }
    .miniinfo{
      font-size: 14px;
      color: var(--muted);
      opacity:.95;
      line-height:1.35;
      user-select:none;
      margin-top: 6px;
    }

    .progressArea{
      width: min(420px, 40vw);
      display:flex;
      flex-direction:column;
      gap: 8px;
      align-items:flex-end;
    }

    /* ★「シンチョク」文字は削除（progressHead 自体を使わない） */

    .progressBar{
      width:100%;
      display:grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 6px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 10px 26px rgba(0,0,0,.25);
    }

    /* ★ 進捗（タマゴ/キャラ表示） */
    .seg{
      height: 34px;
      border-radius: 14px;
      background: rgba(185,194,255,.12);
      border: 1px solid rgba(255,255,255,.10);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      position:relative;
      padding: 3px;
    }
    .seg img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.25));
      transform: translateZ(0);
    }
    .seg.done{
      background: rgba(124,241,184,.16);
      border-color: rgba(124,241,184,.35);
      box-shadow: 0 0 0 3px rgba(124,241,184,.10);
    }
    .seg.now{
      background: rgba(98,208,255,.18);
      border-color: rgba(98,208,255,.45);
      box-shadow: 0 0 0 3px rgba(98,208,255,.14);
    }
    .progressText{
      font-size: 13px;
      color: rgba(185,194,255,.98);
      font-weight: 800;
      user-select:none;
    }

    .main{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.10);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .mainInner{
      display:grid;
      grid-template-columns: 1.3fr .9fr;
      gap: 0;
      min-height: 360px;
    }

    .left{
      padding: 16px;
      background: linear-gradient(180deg, rgba(98,208,255,.08), rgba(255,255,255,.02));
      border-right: 1px solid rgba(255,255,255,.10);
      display:flex;
      flex-direction:column;
      gap: 12px;
    }
    .imgCard{
      flex: 1;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius: 20px;
      background: rgba(0,0,0,.16);
      border: 1px solid rgba(255,255,255,.10);
      overflow:hidden;
      position:relative;
      min-height: 280px;
    }
    .imgCard img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      background: rgba(0,0,0,.10);
    }

    .right{
      padding: 16px;
      display:flex;
      flex-direction:column;
      gap: 12px;
      background: linear-gradient(180deg, rgba(124,241,184,.06), rgba(255,255,255,.02));
    }

    .timerBox{
      flex: 0 0 auto;
      border-radius: 20px;
      background: rgba(0,0,0,.16);
      border: 1px solid rgba(255,255,255,.10);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding: 14px;
      gap: 8px;
      min-height: 210px;
      position:relative;
    }
    .timerLabel{
      font-size: 14px;
      color: var(--muted);
      letter-spacing:.06em;
      user-select:none;
    }
    .timer{
      font-variant-numeric: tabular-nums;
      font-size: clamp(52px, 7.2vw, 90px);
      font-weight: 900;
      letter-spacing: .02em;
      line-height: 1;
      text-shadow: 0 8px 30px rgba(0,0,0,.35);
    }
    .status{
      font-size: 18px;
      font-weight: 800;
      color: rgba(238,242,255,.92);
      min-height: 26px;
      text-align:center;
      user-select:none;
    }

    .controls{
      display:flex;
      flex-direction:column;
      gap: 10px;
    }
    .btnRow1{
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .btnRow2{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    button{
      appearance:none;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: var(--text);
      border-radius: 18px;
      padding: 14px 12px;
      font-size: 18px;
      font-weight: 900;
      cursor:pointer;
      user-select:none;
      transition: transform .06s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
    }
    button:active{ transform: translateY(1px) scale(.99); }
    button:hover{ background: rgba(255,255,255,.12); }
    button:disabled{
      opacity:.55;
      cursor:not-allowed;
      box-shadow:none;
    }

    .start{
      border-color: rgba(98,208,255,.55);
      background: linear-gradient(180deg, rgba(98,208,255,.30), rgba(98,208,255,.12));
      box-shadow:
        0 18px 40px rgba(98,208,255,.18),
        0 10px 24px rgba(0,0,0,.25);
      font-size: 26px;
      padding: 18px 14px;
      border-radius: 20px;
      letter-spacing: .06em;
    }
    .start:hover{
      background: linear-gradient(180deg, rgba(98,208,255,.38), rgba(98,208,255,.14));
    }
    .stop{ border-color: rgba(255,107,107,.45); background: rgba(255,107,107,.12); }
    .next{ border-color: rgba(124,241,184,.45); background: rgba(124,241,184,.12); }
    .prev{ border-color: rgba(185,194,255,.40); background: rgba(185,194,255,.10); }

    .overlay{
      position: fixed;
      inset: 0;
      display:none;
      align-items:center;
      justify-content:center;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(8px);
      z-index: 50;
      padding: 18px;
    }
    .overlay.show{ display:flex; }
    .overlayCard{
      width:min(760px, 100%);
      border-radius: 28px;
      background: rgba(18,26,51,.90);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 24px 70px rgba(0,0,0,.45);
      padding: 26px 18px;
      text-align:center;
    }
    .cueText{
      font-size: clamp(44px, 7vw, 92px);
      font-weight: 900;
      letter-spacing:.04em;
      line-height: 1.05;
      margin: 0;
      text-shadow: 0 12px 40px rgba(0,0,0,.40);
    }
    .cueSub{
      margin: 14px 0 0;
      font-size: 18px;
      color: rgba(185,194,255,.95);
      font-weight: 800;
    }

    .spacer{ height: 50vh; }

    .settings{
      margin-top: 26px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .settingsHead{
      padding: 16px 16px 8px;
      font-size: 20px;
      font-weight: 900;
      letter-spacing:.02em;
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap: 10px;
    }
    .settingsNote{
      font-size: 13px;
      color: rgba(185,194,255,.96);
      font-weight: 800;
      user-select:none;
    }
    .settingsBody{
      padding: 0 12px 14px;
      display:flex;
      flex-direction:column;
      gap: 10px;
    }

    .setRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      background: rgba(0,0,0,.14);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 18px;
      padding: 12px 12px;
    }
    .setLeft{
      min-width: 170px;
      font-size: 15px;
      font-weight: 900;
      color: rgba(238,242,255,.96);
      user-select:none;
      line-height: 1.25;
    }
    .setLeft small{
      display:block;
      font-size: 12px;
      font-weight: 900;
      color: rgba(185,194,255,.96);
      letter-spacing:.08em;
      margin-top: 4px;
    }

    .choices{
      display:flex;
      flex-wrap:wrap;
      justify-content:flex-end;
      gap: 8px;
    }

    .chip{
      position:relative;
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      cursor:pointer;
      user-select:none;
      font-weight: 900;
      color: rgba(238,242,255,.92);
      transition: background .18s ease, border-color .18s ease, transform .06s ease;
    }
    .chip:active{ transform: translateY(1px); }
    .chip input{
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor:pointer;
    }
    .chip.on{
      background: rgba(98,208,255,.14);
      border-color: rgba(98,208,255,.42);
      box-shadow: 0 0 0 3px rgba(98,208,255,.10);
    }
    .chip.on input{ accent-color: var(--accent2); }

    .setRow.now{
      border-color: rgba(98,208,255,.30);
      box-shadow: 0 0 0 3px rgba(98,208,255,.08);
    }
    .setRow.now .setLeft{ color: rgba(238,242,255,.98); }

    /* かみふぶき */
    #confettiCanvas{
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 80;
      display: none;
    }
    #confettiCanvas.show{ display: block; }

    /* ===== ★ おうえん（10びょうごと）オーバーレイ ===== */
    .cheer{
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 65;
      padding: 18px;
      background: rgba(0,0,0,.58);
      backdrop-filter: blur(10px);
      pointer-events: none;
    }
    .cheer.show{ display:flex; }

    @keyframes cheerPop {
      0% { transform: translateY(10px) scale(.96); opacity: 0; }
      55% { transform: translateY(0) scale(1.02); opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    .cheerCard{
      width: min(860px, 100%);
      border-radius: 30px;
      background: rgba(18,26,51,.92);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 28px 80px rgba(0,0,0,.55);
      padding: 18px;
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 16px;
      align-items: center;
      animation: cheerPop .22s ease-out both;
    }

    .cheerAvatar{
      width: 170px;
      height: 170px;
      border-radius: 26px;
      overflow: hidden;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.12);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 16px 40px rgba(0,0,0,.35);
    }
    .cheerAvatar img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display:block;
    }

    .cheerBubble{
      border-radius: 26px;
      padding: 18px 18px;
      background: linear-gradient(180deg, rgba(98,208,255,.18), rgba(255,255,255,.06));
      border: 1px solid rgba(98,208,255,.30);
      box-shadow: 0 16px 42px rgba(0,0,0,.35);
      position: relative;
      min-height: 130px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .cheerBubble:before{
      content:"";
      position:absolute;
      left:-12px;
      top: 50%;
      transform: translateY(-50%) rotate(45deg);
      width: 22px;
      height: 22px;
      background: rgba(98,208,255,.14);
      border-left: 1px solid rgba(98,208,255,.30);
      border-bottom: 1px solid rgba(98,208,255,.30);
    }

    .cheerMsg{
      font-size: clamp(28px, 4.2vw, 54px);
      font-weight: 900;
      letter-spacing: .04em;
      line-height: 1.15;
      text-align: center;
      text-shadow: 0 10px 34px rgba(0,0,0,.40);
      white-space: pre-line;
    }

    /* ===== ★ エンディング画面 ===== */
    .ending{
      position: fixed;
      inset: 0;
      z-index: 120;
      display: none;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      padding: 10px;
      cursor: pointer;
    }
    .ending.show{ display: flex; }

    .endingInner{
      width: min(1100px, 98vw);
      height: min(720px, 92vh);
      position: relative;
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 28px 90px rgba(0,0,0,.65);
      border: 1px solid rgba(255,255,255,.18);
      background: #000;
    }
    .endingBg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit: contain;
      background: rgba(0,0,0,.10);
      user-select: none;
      pointer-events: none;
    }

    /* end.png の「空白部分」に置く想定のエリア（必要なら % を微調整できます） */
    .endingCharsArea{
      position:absolute;
      left: 10%;
      top: 10%;
      width: 80%;
      height: 75%;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 14px;
      align-items: center;
      justify-items: center;
      padding: 10px;
      pointer-events: none; /* タップは画面全体で拾う */
    }

    @keyframes swing20 {
      0%   { transform: rotate(-20deg); }
      50%  { transform: rotate( 20deg); }
      100% { transform: rotate(-20deg); }
    }

    .endChar{
      width: min(130px, 16vw);
      height: min(130px, 16vw);
      max-width: 150px;
      max-height: 150px;
      object-fit: contain;
      filter: drop-shadow(0 10px 16px rgba(0,0,0,.35));
      transform-origin: 50% 80%;
      animation: swing20 2s ease-in-out infinite;
      user-select: none;
    }

    .endingHint{
      position:absolute;
      left: 12px;
      bottom: 10px;
      right: 12px;
      text-align: center;
      font-weight: 900;
      font-size: 14px;
      color: rgba(238,242,255,.92);
      text-shadow: 0 6px 18px rgba(0,0,0,.55);
      pointer-events: none;
    }

    @media (max-width: 920px){
      header{ align-items:flex-start; }
      .progressArea{ width: min(520px, 58vw); }
    }
    @media (max-width: 820px){
      header{ flex-direction:column; align-items:stretch; }
      .progressArea{ width:100%; align-items:flex-start; }
      .mainInner{ grid-template-columns: 1fr; }
      .left{ border-right:none; border-bottom: 1px solid rgba(255,255,255,.10); }

      .timerBox{ min-height: 190px; }
      .btnRow2{ grid-template-columns: 1fr; }
      button{ font-size: 20px; padding: 16px 12px; }
      .start{ font-size: 26px; padding: 18px 12px; }

      .setRow{ flex-direction:column; align-items:stretch; }
      .choices{ justify-content:flex-start; }
      .setLeft{ min-width:auto; }

      .cheerCard{
        grid-template-columns: 1fr;
        text-align: center;
      }
      .cheerAvatar{
        width: 160px;
        height: 160px;
        margin: 0 auto;
      }
      .cheerBubble:before{
        left: 50%;
        top: -12px;
        transform: translateX(-50%) rotate(45deg);
        border-left: 1px solid rgba(98,208,255,.30);
        border-bottom: 1px solid rgba(98,208,255,.30);
      }

      .endingCharsArea{
        left: 6%;
        top: 10%;
        width: 88%;
        height: 75%;
        gap: 10px;
      }
      .endChar{
        width: min(120px, 22vw);
        height: min(120px, 22vw);
      }
    }
  </style>
</head>

<body>
  <canvas id="confettiCanvas"></canvas>

  <div class="wrap">
    <header>
      <div class="titleArea">
        <h1 id="menuTitle" class="titleline"> </h1>
        <div class="miniinfo">
          <div id="menuCount"> </div>
          <div id="baseTimeInfo"> </div>
        </div>
      </div>

      <div class="progressArea" aria-label="しんちょく">
        <!-- ★ シンチョク文字を削除 -->
        <div id="progressBar" class="progressBar"></div>
        <div id="progressText" class="progressText"> </div>
      </div>
    </header>

    <section class="main" aria-label="めいん">
      <div class="mainInner">
        <div class="left">
          <div class="imgCard">
            <img id="sampleImg" alt="おてほんがぞう" src="" />
          </div>
        </div>

        <div class="right">
          <div class="timerBox">
            <div class="timerLabel">のこりじかん</div>
            <div id="timer" class="timer">00:00</div>
            <div id="status" class="status"> </div>
          </div>

          <div class="controls" aria-label="ぼたん">
            <div class="btnRow1">
              <button id="btnStart" class="start">スタート</button>
            </div>
            <div class="btnRow2">
              <button id="btnPrev" class="prev">まえへ</button>
              <button id="btnStop" class="stop">ストップ</button>
              <button id="btnNext" class="next">つぎへ</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="spacer"></div>

    <section class="settings" id="settings" aria-label="せってい">
      <div class="settingsHead">
        <div>せってい</div>
        <div class="settingsNote">うごいているときは かえられません（ストップ してね）</div>
      </div>
      <div class="settingsBody" id="settingsBody">
        <!-- js -->
      </div>
    </section>
  </div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true">
    <div class="overlayCard">
      <p class="cueText" id="cueText"> </p>
      <p class="cueSub" id="cueSub"> </p>
    </div>
  </div>

  <!-- ★ おうえん オーバーレイ -->
  <div class="cheer" id="cheerOverlay" aria-hidden="true">
    <div class="cheerCard">
      <div class="cheerAvatar">
        <img id="cheerImg" alt="おうえん きゃら" src="" />
      </div>
      <div class="cheerBubble">
        <div id="cheerMsg" class="cheerMsg"></div>
      </div>
    </div>
  </div>

  <!-- ★ エンディング画面 -->
  <div class="ending" id="endingOverlay" aria-hidden="true" title="タップでおわる">
    <div class="endingInner">
      <img class="endingBg" alt="えんでぃんぐ" src="assets/end.png" />
      <div class="endingCharsArea" id="endingCharsArea"></div>
      <div class="endingHint">どこかを 1かい タップして おわる</div>
    </div>
  </div>

  <script>
    // menu data
    const menus = [
      { title: "かたあしだち（みぎ）", seconds: 60, img: "assets/01.png" },
      { title: "かたあしだち（ひだり）", seconds: 60, img: "assets/02.png" },
      { title: "ひこうき（みぎ）", seconds: 30, img: "assets/03.png" },
      { title: "ひこうき（ひだり）", seconds: 30, img: "assets/04.png" },
      { title: "ぷらんく", seconds: 60, img: "assets/05.png" },
      { title: "ボールなげあげ", seconds: 60, img: "assets/06.png" },
      { title: "ドリブル", seconds: 120, img: "assets/07.png" },
      { title: "ゴムとび", seconds: 60, img: "assets/08.png" },
      { title: "まめつかみ", seconds: 60, img: "assets/09.png" },
      { title: "てつぼうぶらさがり", seconds: 15, img: "assets/10.png" },
    ];

    const TIME_CHOICES = [15,30,60,90,120,180];

    // ★ progress egg/character settings
    const EGG_SRC = "assets/tamago.png";
    const MANIFEST_URL = "../count/assets/items/manifest.json";
    const MANIFEST_BASE_DIR = "../count/assets/items/";

    // elements
    const menuTitle = document.getElementById("menuTitle");
    const menuCount = document.getElementById("menuCount");
    const baseTimeInfo = document.getElementById("baseTimeInfo");
    const sampleImg = document.getElementById("sampleImg");
    const timerEl = document.getElementById("timer");
    const statusEl = document.getElementById("status");

    const btnStart = document.getElementById("btnStart");
    const btnPrev  = document.getElementById("btnPrev");
    const btnStop  = document.getElementById("btnStop");
    const btnNext  = document.getElementById("btnNext");

    const overlay = document.getElementById("overlay");
    const cueTextEl = document.getElementById("cueText");
    const cueSubEl = document.getElementById("cueSub");

    const settingsBody = document.getElementById("settingsBody");

    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");

    // confetti
    const confettiCanvas = document.getElementById("confettiCanvas");
    const cctx = confettiCanvas.getContext("2d");

    // ★ cheer overlay
    const cheerOverlay = document.getElementById("cheerOverlay");
    const cheerImg = document.getElementById("cheerImg");
    const cheerMsg = document.getElementById("cheerMsg");

    // ★ ending overlay
    const endingOverlay = document.getElementById("endingOverlay");
    const endingCharsArea = document.getElementById("endingCharsArea");

    // state
    let idx = 0;
    let mode = "idle"; // idle | cue | running | paused | finished | ending
    let remainingMs = 0;

    let tickTimer = null;
    let cueTimers = [];
    let lastSpokenAt = 0;

    // 10びょう かうんと
    let lastCountdownSpoken = null;

    // progress
    const done = Array(menus.length).fill(false);

    // ★ egg hatch state (null = egg, string = character image url)
    const hatchImg = Array(menus.length).fill(null);
    const usedChar = new Set(); // avoid duplicates if possible

    // audio
    let audioCtx = null;

    // ★ cheer scheduler state
    let cheerNextAt = 0;
    let cheerHideTimer = null;

    // ★ ending scheduler
    let endingTimer = null;
    let endingShown = false;

    // helpers
    function pad2(n){ return String(n).padStart(2,"0"); }
    function fmt(ms){
      const total = Math.max(0, Math.ceil(ms / 1000));
      const m = Math.floor(total / 60);
      const s = total % 60;
      return `${pad2(m)}:${pad2(s)}`;
    }
    function setStatus(txt){
      statusEl.textContent = txt || "";
    }

    function showOverlay(text, sub){
      cueTextEl.textContent = text || "";
      cueSubEl.textContent = sub || "";
      overlay.classList.add("show");
    }
    function hideOverlay(){
      overlay.classList.remove("show");
    }

    function clearCueTimers(){
      cueTimers.forEach(t => clearTimeout(t));
      cueTimers = [];
    }

    // ===== ★ cheer logic =====
    const CHEER_DATA = [
      {
        id: "A",
        src: "assets/a.png",
        msgs: [
          "がんばれ！",
          "いいぞ！",
          "しゅうちゅう！",
        ]
      },
      {
        id: "B",
        src: "assets/b.png",
        msgs: [
          "がんばって",
          "すごい",
          "かっこいい"
        ]
      },
      {
        id: "C",
        src: "assets/c.png",
        msgs: [
          "がんばってね",
          "すごいね",
          "コジコジはコジコジだよ"
        ]
      }
    ];

    function showCheer(src, msg){
      try{
        cheerImg.src = src;
        cheerMsg.textContent = msg;
        cheerOverlay.classList.add("show");
        cheerOverlay.setAttribute("aria-hidden", "false");
        if(cheerHideTimer) clearTimeout(cheerHideTimer);
        cheerHideTimer = setTimeout(() => {
          hideCheer();
        }, 2000);
      }catch(e){}
    }

    function hideCheer(){
      cheerOverlay.classList.remove("show");
      cheerOverlay.setAttribute("aria-hidden", "true");
    }

    function resetCheer(){
      cheerNextAt = 0;
      if(cheerHideTimer){ clearTimeout(cheerHideTimer); cheerHideTimer = null; }
      hideCheer();
    }

    function pickRandomCheer(){
      const c = CHEER_DATA[randInt(CHEER_DATA.length)];
      const msg = c.msgs[randInt(c.msgs.length)];
      return { src: c.src, msg };
    }

    function maybeCheer(now){
      if(mode !== "running") return;
      if(!cheerNextAt) return;

      // ラスト10びょうは ださない
      if(remainingMs <= 10000) return;

      if(now >= cheerNextAt){
        const { src, msg } = pickRandomCheer();
        showCheer(src, msg);

        // 次回（遅れても等間隔を保つ）
        do{
          cheerNextAt += 15000;
        }while(now >= cheerNextAt);
      }
    }

    function armCheer(){
      // 15びょうごと（開始15秒後から）
      cheerNextAt = Date.now() + 15000;
    }

    function stopAllTimers(){
      clearCueTimers();
      if(tickTimer){ clearInterval(tickTimer); tickTimer = null; }
      // おんせいも とめる
      try{ if("speechSynthesis" in window) speechSynthesis.cancel(); }catch(e){}
      lastCountdownSpoken = null;

      // ★ cheer stop
      resetCheer();
    }

    function canChangeSetting(){
      return !(mode === "cue" || mode === "running" || mode === "ending");
    }

    function speak(text){
      try{
        if(!("speechSynthesis" in window)) return;
        const now = Date.now();
        if(now - lastSpokenAt < 220) return; // かさなり ぼうし
        lastSpokenAt = now;

        const u = new SpeechSynthesisUtterance(text);
        u.lang = "ja-JP";
        u.rate = 1.08;
        u.pitch = 1.0;
        u.volume = 1.0;

        const voices = speechSynthesis.getVoices?.() || [];
        const ja = voices.find(v => (v.lang || "").toLowerCase().startsWith("ja"));
        if(ja) u.voice = ja;

        speechSynthesis.cancel();
        speechSynthesis.speak(u);
      }catch(e){}
    }

    // ========= ★ manifest loader（キャラ画像一覧） =========
    let _charListPromise = null;
    let _charListCache = null; // ★ 取得済みを保持

    function isImageUrl(u){
      const s = String(u || "");
      const noQuery = s.split("?")[0].split("#")[0];
      return /\.(png|jpg|jpeg|gif|webp|svg)$/i.test(noQuery);
    }

    function normalizeUrl(u){
      if(!u) return null;
      if(/^https?:\/\//i.test(u)) return u;
      if(u.startsWith("/") || u.startsWith("./") || u.startsWith("../")) return u;
      return MANIFEST_BASE_DIR + u;
    }

    function extractImageUrlsFromManifest(json){
      const urls = [];
      const pushAny = (v) => {
        if(!v) return;
        if(typeof v === "string"){
          const nu = normalizeUrl(v);
          if(nu && isImageUrl(nu)) urls.push(nu);
          return;
        }
        if(typeof v === "object"){
          const cand = v.src || v.url || v.path || v.file || v.image || v.img;
          if(typeof cand === "string"){
            const nu = normalizeUrl(cand);
            if(nu && isImageUrl(nu)) urls.push(nu);
          }
        }
      };

      if(Array.isArray(json)){
        json.forEach(pushAny);
      }else if(json && typeof json === "object"){
        if(Array.isArray(json.items)) json.items.forEach(pushAny);
        if(Array.isArray(json.images)) json.images.forEach(pushAny);
        if(Array.isArray(json.manifest)) json.manifest.forEach(pushAny);
        if(Array.isArray(json.files)) json.files.forEach(pushAny);

        Object.values(json).forEach(v => {
          if(Array.isArray(v)) return;
          pushAny(v);
        });
      }

      const seen = new Set();
      return urls.filter(u => {
        if(seen.has(u)) return false;
        seen.add(u);
        return true;
      });
    }

    function preloadImages(list){
      try{
        list.slice(0, 200).forEach(u => { const im = new Image(); im.decoding = "async"; im.src = u; });
      }catch(e){}
    }

    function loadCharacterList(){
      if(_charListPromise) return _charListPromise;
      _charListPromise = (async () => {
        try{
          const res = await fetch(MANIFEST_URL, { cache: "no-store" });
          if(!res.ok) throw new Error("manifest fetch failed");
          const json = await res.json();
          const list = extractImageUrlsFromManifest(json);
          _charListCache = list;
          preloadImages(list);
          return list;
        }catch(e){
          _charListCache = [];
          return [];
        }
      })();
      return _charListPromise;
    }

    function randInt(max){
      if(max <= 0) return 0;
      const c = (window.crypto && crypto.getRandomValues) ? crypto.getRandomValues(new Uint32Array(1))[0] : Math.floor(Math.random() * 0xFFFFFFFF);
      return c % max;
    }

    async function hatchEggAt(i){
      if(hatchImg[i]) return;
      const list = await loadCharacterList();
      if(!list || list.length === 0) return;

      const unused = list.filter(u => !usedChar.has(u));
      const pool = unused.length ? unused : list;
      const pick = pool[randInt(pool.length)];

      hatchImg[i] = pick;
      usedChar.add(pick);
      updateProgress();
    }

    // progress ui
    function buildProgress(){
      progressBar.innerHTML = "";
      for(let i=0;i<menus.length;i++){
        const d = document.createElement("div");
        d.className = "seg";
        d.setAttribute("aria-label", `seg ${i+1}`);

        const img = document.createElement("img");
        img.className = "segImg";
        img.alt = "タマゴ";
        img.src = EGG_SRC;
        img.loading = "lazy";
        img.decoding = "async";
        img.onerror = () => {};

        d.appendChild(img);
        progressBar.appendChild(d);
      }
      updateProgress();
    }

    function updateProgress(){
      const segs = [...progressBar.querySelectorAll(".seg")];
      segs.forEach((s, i) => {
        s.classList.remove("done","now");
        if(done[i]) s.classList.add("done");
        if(i === idx) s.classList.add("now");

        const img = s.querySelector("img");
        const src = hatchImg[i] ? hatchImg[i] : EGG_SRC;
        if(img && img.src !== src){
          img.src = src;
        }
        if(img){
          img.alt = hatchImg[i] ? "キャラクター" : "タマゴ";
        }
      });
      const doneCount = done.filter(Boolean).length;
      progressText.textContent = `${doneCount}/${menus.length}`;
    }

    // settings ui
    function buildSettings(){
      settingsBody.innerHTML = "";

      settingsBody.appendChild(buildSetRowAll());

      menus.forEach((m, i) => {
        settingsBody.appendChild(buildSetRow(i));
      });

      updateSettingsHighlight();
      setSettingsEnabled(canChangeSetting());
    }

    function buildSetRowAll(){
      const row = document.createElement("div");
      row.className = "setRow";
      row.dataset.row = "all";

      const left = document.createElement("div");
      left.className = "setLeft";
      left.textContent = "ぜんぶ";
      const sm = document.createElement("small");
      sm.textContent = "じかん を そろえる";
      left.appendChild(sm);

      const choices = document.createElement("div");
      choices.className = "choices";

      TIME_CHOICES.forEach(sec => {
        const chip = makeChoiceChip("all", sec, false);
        choices.appendChild(chip);
      });

      row.appendChild(left);
      row.appendChild(choices);
      return row;
    }

    function buildSetRow(i){
      const m = menus[i];
      const row = document.createElement("div");
      row.className = "setRow";
      row.dataset.row = String(i);

      const left = document.createElement("div");
      left.className = "setLeft";
      left.textContent = `${i+1}. ${m.title}`;
      const sm = document.createElement("small");
      sm.textContent = `いま ${m.seconds} びょう`;
      sm.className = "rowNowSec";
      left.appendChild(sm);

      const choices = document.createElement("div");
      choices.className = "choices";

      TIME_CHOICES.forEach(sec => {
        const checked = (sec === m.seconds);

      row.appendChild(choices);

    function makeChoiceChip(groupId, sec, checked){
      const label = document.createElement("label");
      label.className = "chip" + (checked ? " on" : "");
      label.dataset.group = groupId;
      label.dataset.sec = String(sec);

      const input = document.createElement("input");
      input.type = "checkbox";
      input.checked = !!checked;
      input.setAttribute("aria-label", `${sec}`);

      const text = document.createElement("span");
      text.textContent = `${sec}`;

      label.appendChild(input);
      label.appendChild(text);

      label.addEventListener("click", (e) => {
        e.preventDefault();
        if(!canChangeSetting()){
          showOverlay("ストップしてね", "");
          setTimeout(() => hideOverlay(), 900);
          return;
        }
        setGroupExclusive(groupId, sec);
        if(groupId === "all"){
          applyAllSeconds(sec);
          showOverlay("できた", "ぜんぶ かえたよ");
          setTimeout(() => hideOverlay(), 700);
        }else{
          const i = parseInt(groupId, 10);
          applyOneSeconds(i, sec);
          showOverlay("できた", "");
          setTimeout(() => hideOverlay(), 550);
        }
      });

      return label;
    }

    function setGroupExclusive(groupId, sec){
      const chips = [...settingsBody.querySelectorAll(`.chip[data-group="${groupId}"]`)];
      chips.forEach(ch => {
        const v = parseInt(ch.dataset.sec, 10);
        const inp = ch.querySelector("input");
        const on = (v === sec);
        inp.checked = on;
        ch.classList.toggle("on", on);
      });
    }

    function syncRowSecondsLabel(i){
      const row = settingsBody.querySelector(`.setRow[data-row="${i}"]`);
      if(!row) return;
      const sm = row.querySelector(".rowNowSec");
      if(sm) sm.textContent = `いま ${menus[i].seconds} びょう`;
    }

    function applyOneSeconds(i, sec){
      menus[i].seconds = sec;
      syncRowSecondsLabel(i);

      if(i === idx){
        remainingMs = sec * 1000;
        timerEl.textContent = fmt(remainingMs);
        baseTimeInfo.textContent = `きほん じかん ${menus[idx].seconds} びょう`;
        mode = "idle";
        setStatus("");
        updateButtons();
      }
    }

    function applyAllSeconds(sec){
      menus.forEach((m, i) => {
        m.seconds = sec;
        syncRowSecondsLabel(i);
        setGroupExclusive(String(i), sec);
      });

      remainingMs = menus[idx].seconds * 1000;
      timerEl.textContent = fmt(remainingMs);
      baseTimeInfo.textContent = `きほん じかん ${menus[idx].seconds} びょう`;
      mode = "idle";
      setStatus("");
      updateButtons();
    }

    function updateSettingsHighlight(){
      [...settingsBody.querySelectorAll(".setRow")].forEach(r => r.classList.remove("now"));
      const nowRow = settingsBody.querySelector(`.setRow[data-row="${idx}"]`);
      if(nowRow) nowRow.classList.add("now");
    }

    function setSettingsEnabled(enabled){
      const inputs = [...settingsBody.querySelectorAll("input[type='checkbox']")];
      inputs.forEach(i => i.disabled = !enabled);
    }

    function updateButtons(){
      const locked = (mode === "cue" || mode === "running" || mode === "ending");
      btnStop.disabled  = (mode === "idle" || mode === "finished" || mode === "ending");
      btnNext.disabled  = locked;
      btnPrev.disabled  = locked;
      btnStart.disabled = (mode === "cue" || mode === "ending");
      setSettingsEnabled(canChangeSetting());
    }

    function loadMenu(i){
      idx = (i + menus.length) % menus.length;
      const m = menus[idx];

      menuTitle.textContent = m.title;
      menuCount.textContent = `${idx+1}/${menus.length}`;
      baseTimeInfo.textContent = `きほん じかん ${m.seconds} びょう`;

      sampleImg.src = m.img;
      sampleImg.onerror = () => { sampleImg.removeAttribute("src"); };

      remainingMs = m.seconds * 1000;
      timerEl.textContent = fmt(remainingMs);
      setStatus("");
      mode = "idle";
      lastCountdownSpoken = null;
      updateButtons();

      // ★ 応援もリセット
      resetCheer();

      updateProgress();
      updateSettingsHighlight();
    }

    // ========= 10びょう かうんと =========
    function maybeSpeakCountdown(){
      if(mode !== "running") return;
      const secLeft = Math.ceil(remainingMs / 1000);

      if(secLeft <= 10 && secLeft >= 1){
        if(lastCountdownSpoken !== secLeft){
          lastCountdownSpoken = secLeft;
          speak(String(secLeft));
        }
      }else if(secLeft > 10){
        lastCountdownSpoken = null;
      }
    }

    // ========= ★ エンディング =========
    function allDone(){
      return done.every(Boolean);
    }

    function allHatchedOrNoManifest(){
      // manifestが空なら「キャラがない」ので条件で止めない
      if(_charListCache && _charListCache.length === 0) return true;
      // まだ読めてない間は、いったん「全孵化チェック」を厳密にしない
      if(_charListCache == null) return hatchImg.filter(Boolean).length === menus.length;
      // 通常
      return hatchImg.every(Boolean);
    }

    function buildEndingChars(){
      endingCharsArea.innerHTML = "";
      for(let i=0;i<menus.length;i++){
        const im = document.createElement("img");
        im.className = "endChar";
        im.alt = "キャラクター";
        im.src = hatchImg[i] || EGG_SRC;
        // ちょいずらし：全員同じ揺れだと固いので位相を変える
        im.style.animationDelay = (i * 0.12) + "s";
        endingCharsArea.appendChild(im);
      }
    }

    function showEnding(){
      if(endingShown) return;
      endingShown = true;
      mode = "ending";
      stopAllTimers();
      hideOverlay();
      hideCheer();

      buildEndingChars();
      endingOverlay.classList.add("show");
      endingOverlay.setAttribute("aria-hidden","false");
      updateButtons();
    }

    function hideEnding(){
      endingOverlay.classList.remove("show");
      endingOverlay.setAttribute("aria-hidden","true");
      mode = "finished";
      updateButtons();
    }

    function maybeScheduleEnding(){
      if(endingShown) return;
      if(!allDone()) return;
      if(!allHatchedOrNoManifest()) return;

      if(endingTimer) return;
      endingTimer = setTimeout(() => {
        endingTimer = null;
        showEnding();
      }, 3000);
    }

    // タップ1回で終了
    endingOverlay.addEventListener("click", () => {
      hideEnding();
    }, { passive: true });

    // ========= ふぁんふぁーれ =========
    function ensureAudio(){
      if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if(audioCtx.state === "suspended"){
        audioCtx.resume().catch(()=>{});
      }
      return audioCtx;
    }

    function playTone(freq, startAt, dur, type="sine", gain=0.12){
      const ctx = ensureAudio();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = type;
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, startAt);
      g.gain.exponentialRampToValueAtTime(gain, startAt + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, startAt + dur);

      o.connect(g);
      g.connect(ctx.destination);

      o.start(startAt);
      o.stop(startAt + dur + 0.02);
    }

    function playFanfare(){
      try{
        const ctx = ensureAudio();
        const t0 = ctx.currentTime + 0.02;

        const notes = [
          [523.25, 0.00, 0.14],
          [659.25, 0.14, 0.14],
          [783.99, 0.28, 0.18],
          [1046.5,0.46, 0.26],
          [987.77,0.74, 0.18],
          [1046.5,0.92, 0.34],
        ];
        notes.forEach(([f, off, d]) => playTone(f, t0 + off, d, "triangle", 0.14));

        const harm = [
          [392.00, 0.00, 0.28],
          [493.88, 0.28, 0.44],
          [523.25, 0.72, 0.54],
        ];
        harm.forEach(([f, off, d]) => playTone(f, t0 + off, d, "sine", 0.09));

        playTone(1567.98, t0 + 0.46, 0.10, "square", 0.06);
        playTone(2093.00, t0 + 0.56, 0.10, "square", 0.05);
      }catch(e){}
    }

    // ========= かみふぶき =========
    let confettiAnim = null;
    let confettiStopAt = 0;
    let confettiParts = [];

    function resizeConfetti(){
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      confettiCanvas.width = Math.floor(window.innerWidth * dpr);
      confettiCanvas.height = Math.floor(window.innerHeight * dpr);
      confettiCanvas.style.width = window.innerWidth + "px";
      confettiCanvas.style.height = window.innerHeight + "px";
      cctx.setTransform(dpr,0,0,dpr,0,0);
    }
    window.addEventListener("resize", () => {
      if(confettiCanvas.classList.contains("show")) resizeConfetti();
    });

    function launchConfetti(ms=2200){
      resizeConfetti();
      confettiCanvas.classList.add("show");

      const W = window.innerWidth, H = window.innerHeight;
      const colors = ["#62d0ff","#7cf1b8","#b9c2ff","#ffd166","#ff6b6b","#ffffff"];
      const n = Math.min(180, Math.floor(W * 0.18));

      confettiParts = [];
      for(let i=0;i<n;i++){
        confettiParts.push({
          x: Math.random()*W,
          y: -20 - Math.random()*H*0.3,
          r: 3 + Math.random()*5,
          w: 6 + Math.random()*10,
          h: 6 + Math.random()*12,
          vx: -1.2 + Math.random()*2.4,
          vy: 2.6 + Math.random()*4.8,
          rot: Math.random()*Math.PI,
          vr: -0.18 + Math.random()*0.36,
          col: colors[(Math.random()*colors.length)|0],
          shape: Math.random() < 0.55 ? "rect" : "circle",
          alpha: 0.95
        });
      }

      confettiStopAt = performance.now() + ms;
      if(confettiAnim) cancelAnimationFrame(confettiAnim);

      const step = (t) => {
        const now = t || performance.now();
        cctx.clearRect(0,0,W,H);

        confettiParts.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.rot += p.vr;
          p.vy += 0.02;
          if(now > confettiStopAt - 700){
            p.alpha *= 0.985;
          }
          if(p.y > H + 40){
            p.y = -20;
            p.x = Math.random()*W;
            p.vy = 2.6 + Math.random()*4.8;
            p.alpha = 0.95;
          }

          cctx.save();
          cctx.globalAlpha = Math.max(0, Math.min(1, p.alpha));
          cctx.translate(p.x, p.y);
          cctx.rotate(p.rot);
          cctx.fillStyle = p.col;

          if(p.shape === "rect"){
            cctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
          }else{
            cctx.beginPath();
            cctx.arc(0,0,p.r,0,Math.PI*2);
            cctx.fill();
          }
          cctx.restore();
        });

        if(now < confettiStopAt){
          confettiAnim = requestAnimationFrame(step);
        }else{
          confettiCanvas.classList.remove("show");
          cctx.clearRect(0,0,W,H);
          confettiAnim = null;
        }
      };

      confettiAnim = requestAnimationFrame(step);
    }

    function finish(){
      stopAllTimers();
      mode = "finished";
      remainingMs = 0;
      timerEl.textContent = "00:00";
      setStatus("よくできました");

      // done
      done[idx] = true;

      // ★ タマゴをキャラに（孵化）→ 終わったらエンディング判定
      hatchEggAt(idx).then(() => {
        updateProgress();
        maybeScheduleEnding();
      });

      updateProgress();

      // しゅうりょう えんしゅつ
      playFanfare();
      launchConfetti(2400);

      updateButtons();
    }

    function startCountdown(){
      mode = "running";
      setStatus("");
      hideOverlay();
      hideCheer();
      updateButtons();

      lastCountdownSpoken = null;

      // ★ 応援スケジューラ開始
      armCheer();

      const endAt = Date.now() + remainingMs;

      if(tickTimer) clearInterval(tickTimer);
      tickTimer = setInterval(() => {
        const now = Date.now();
        remainingMs = Math.max(0, endAt - now);
        timerEl.textContent = fmt(remainingMs);

        maybeSpeakCountdown();
        maybeCheer(now);

        if(remainingMs <= 0){
          clearInterval(tickTimer);
          tickTimer = null;
          finish();
        }
      }, 100);
    }

    function cueSequenceThenStart(full){
      stopAllTimers();
      mode = "cue";
      updateButtons();

      const steps = full
        ? [
            { t: "いちについて", ms: 1500 },
            { t: "よーい", ms: 1500 },
            { t: "スタート", ms: 1000 },
          ]
        : [
            { t: "スタート", ms: 1000 },
          ];

      let total = 0;
      steps.forEach((s) => {
        cueTimers.push(setTimeout(() => {
          showOverlay(s.t, "");
          try{ ensureAudio(); }catch(e){}
          // ★ 文字表示 + 音声
          speak(s.t);
        }, total));
        total += s.ms;
      });

      cueTimers.push(setTimeout(() => {
        startCountdown();
      }, total));
    }

    function onStart(){
      if(mode === "running" || mode === "cue" || mode === "ending") return;

      try{ ensureAudio(); }catch(e){}

      if(mode === "paused"){
        cueSequenceThenStart(false);
        return;
      }

      if(mode === "idle" || mode === "finished"){
        if(mode === "finished"){
          remainingMs = menus[idx].seconds * 1000;
          timerEl.textContent = fmt(remainingMs);
          setStatus("");
        }
        cueSequenceThenStart(true);
      }
    }

    function onStop(){
      if(mode === "ending") return;

      if(mode === "cue"){
        stopAllTimers();
        hideOverlay();
        mode = "paused";
        setStatus("とまってるよ");
        updateButtons();
        return;
      }
      if(mode === "running"){
        stopAllTimers();
        mode = "paused";
        setStatus("とまってるよ");
        updateButtons();
      }
    }

    function onNext(){
      if(mode === "cue" || mode === "running" || mode === "ending") return;
      stopAllTimers();
      hideOverlay();
      setStatus("");
      loadMenu(idx + 1);
    }

    function onPrev(){
      if(mode === "cue" || mode === "running" || mode === "ending") return;
      stopAllTimers();
      hideOverlay();
      setStatus("");
      loadMenu(idx - 1);
    }

    // bind
    btnStart.addEventListener("click", onStart);
    btnStop.addEventListener("click", onStop);
    btnNext.addEventListener("click", onNext);
    btnPrev.addEventListener("click", onPrev);

    // init
    buildProgress();
    buildSettings();
    loadMenu(0);

    // ★ 先にmanifestを読み込み開始（孵化をスムーズに）
    loadCharacterList().then(() => {
      // 既に全部終わってる状態でリロードした場合も考慮（念のため）
      maybeScheduleEnding();
    });

    if("speechSynthesis" in window){
      speechSynthesis.onvoiceschanged = () => {};
    }
  </script>
</body>
</html>
