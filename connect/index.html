<!doctype html><!doctype="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>てんつなぎ（自動生成・直線化・厳密判定）</title>

<style>
  :root{
    --bg1:#0b1538;
    --bg2:#0b2a3a;
    --text:#f2f5ff;
    --card:#ffffff;
    --dot:#3e4452;
    --sample:#ff3b3b;
    --draw:#00d2ff;                 /* 確定線（濃い水色） */
    --preview:rgba(0,210,255,.35);  /* 描画中プレビュー（薄い水色） */
    --accent:#ffd54a;
    --shadow:0 18px 60px rgba(0,0,0,.45);
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    color:var(--text);
    background:
      radial-gradient(1000px 700px at 15% 10%, #253d85, var(--bg1)),
      radial-gradient(900px 650px at 85% 20%, #3c1d7a, transparent 60%),
      radial-gradient(900px 650px at 50% 120%, #145a5e, transparent 55%),
      linear-gradient(180deg, var(--bg1), var(--bg2));
    min-height:100svh;
    display:flex;
    justify-content:center;
    padding:8px; /* 省スペース */
    overscroll-behavior:none;
  }

  /* 花吹雪Canvas */
  #fx{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    pointer-events:none;
    z-index:40;
  }

  /* 右上もどる（正しいa要素） */
  .backBtn{
    position:fixed;
    top:8px;
    right:8px;
    z-index:999;
    text-decoration:none;
    font-size:13px;
    font-weight:900;
    padding:8px 12px;
    border-radius:999px;
    background:rgba(255,255,255,.14);
    color:#fff;
    border:1px solid rgba(255,255,255,.25);
    backdrop-filter: blur(6px);
    box-shadow: 0 10px 26px rgba(0,0,0,.3);
    user-select:none;
    touch-action:manipulation;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .backBtn:active{ transform:scale(.97); filter:brightness(1.1); }

  .wrap{ width:min(520px, 96vw); }
  h1{
    margin:4px 0 8px;
    font-size:18px;
    font-weight:1000;
    text-align:center;
    letter-spacing:.02em;
  }
  .card{
    background:var(--card);
    border-radius:12px;
    padding:7px;
    margin-bottom:8px;
    box-shadow: var(--shadow);
  }
  canvas.board{
    display:block;
    width:100%;
    aspect-ratio:1/1;
    touch-action:none;
    user-select:none;
    -webkit-user-select:none;
  }
  .row{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:4px;
  }
  button{
    border:none;
    border-radius:14px;
    padding:11px 16px;
    font-size:16px;
    font-weight:1000;
    cursor:pointer;
    user-select:none;
    touch-action:manipulation;
  }
  .primary{ background:var(--accent); color:#221400; }
  .sub{ background:rgba(255,255,255,.14); color:#fff; border:1px solid rgba(255,255,255,.22); }

  .status{
    margin-top:8px;
    text-align:center;
    font-weight:1000;
    min-height:1.6em;
  }
  .hint{
    margin-top:6px;
    text-align:center;
    font-size:12px;
    opacity:.86;
    line-height:1.4;
  }

  @media (max-width:420px){
    body{ padding:6px; }
    .card{ padding:6px; margin-bottom:7px; }
    button{ padding:10px 14px; }
  }
</style>
</head>

<body>
  <a class="backBtn" href="../index.html">← もどる</a>
  <canvas id="fx"></canvas>

  <div class="wrap">
    <h1>てんつなぎ（自動生成）</h1>

    <div class="card">
      <canvas class="board" id="sample"></canvas>
    </div>

    <div class="card">
      <canvas class="board" id="play"></canvas>
    </div>

    <div class="row">
      <button class="primary" id="doneBtn">できた！</button>
      <button class="sub" id="nextBtn">つぎ</button>
      <button class="sub" id="clearBtn">けす</button>
    </div>

    <div class="status" id="status">おてほんをみて なぞってね（離すと直線になるよ）</div>
    <div class="hint" id="hint">
      ※ お手本の点の数（折れ点）が 16〜20 になるように自動生成します。余計な線があるとNG。
    </div>
  </div>

<script>
(() => {
  "use strict";

  /* ======================
     設定
  ====================== */
  const GRID = 5;
  const DOT_R = 6;

  // 点を拾う半径（px）
  const HIT_R = 30;

  // 開始/終了の強制スナップ（px）
  const FORCE_SNAP_R = 55;

  // ✅「表示されるお手本（折れ点）」の点数を 16〜20 に固定
  const MIN_VISIBLE_POINTS = 16;
  const MAX_VISIBLE_POINTS = 20;

  // 生成の試行回数（安全のため）
  const GEN_TRIES = 400;

  /* ======================
     DOM / Canvas
  ====================== */
  const fx = document.getElementById("fx");
  const fxCtx = fx.getContext("2d");

  const sample = document.getElementById("sample");
  const play   = document.getElementById("play");
  const sctx = sample.getContext("2d");
  const pctx = play.getContext("2d");

  const statusEl = document.getElementById("status");
  const hintEl = document.getElementById("hint");
  const doneBtn  = document.getElementById("doneBtn");
  const nextBtn  = document.getElementById("nextBtn");
  const clearBtn = document.getElementById("clearBtn");

  function setStatus(t){ statusEl.textContent = t; }
  function setHint(t){ hintEl.textContent = t; }

  window.addEventListener("error", (e) => {
    setStatus("エラー: " + (e.message || "unknown"));
  });

  /* ======================
     正解音（WebAudio）
  ====================== */
  let audioCtx = null;
  function ctx(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  async function ensureAudio(){
    try{
      const c = ctx();
      if(c.state === "suspended") await c.resume();
    }catch(e){}
  }
  function tone(freq, t0, dur, type="triangle", gain=0.12){
    const c = ctx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = 0.0001;
    o.connect(g); g.connect(c.destination);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.start(t0);
    o.stop(t0 + dur + 0.02);
  }
  function playOk(){
    const c = ctx();
    const t = c.currentTime;
    tone(660, t, .10, "triangle", .14);
    tone(880, t + .10, .12, "triangle", .12);
    tone(1100, t + .22, .14, "sine", .10);
  }

  /* ======================
     花吹雪（Canvas）
  ====================== */
  const confetti = [];
  function resizeFX(){
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    fx.width = Math.floor(innerWidth * dpr);
    fx.height = Math.floor(innerHeight * dpr);
    fx.style.width = innerWidth + "px";
    fx.style.height = innerHeight + "px";
    fxCtx.setTransform(dpr,0,0,dpr,0,0);
  }
  addEventListener("resize", resizeFX, {passive:true});
  resizeFX();

  function rand(a,b){ return a + Math.random()*(b-a); }
  function spawnConfetti(n=170){
    const cols = ["#ffd54a","#7CFFB2","#5ad8ff","#ff7bd1","#b48cff","#ffffff"];
    for(let i=0;i<n;i++){
      confetti.push({
        x: innerWidth*0.5 + rand(-60,60),
        y: innerHeight*0.22 + rand(-30,30),
        vx: rand(-6,6),
        vy: rand(-10,-3),
        g: 0.14,
        r: rand(2.2,4.6),
        a: 1,
        life: rand(45, 95),
        col: cols[(Math.random()*cols.length)|0]
      });
    }
  }
  function fxLoop(){
    fxCtx.clearRect(0,0,innerWidth,innerHeight);
    for(let i=confetti.length-1;i>=0;i--){
      const p = confetti[i];
      p.x += p.vx; p.y += p.vy; p.vy += p.g;
      p.life -= 1; p.a *= 0.985;
      fxCtx.globalAlpha = Math.max(0, Math.min(1, p.a));
      fxCtx.fillStyle = p.col;
      fxCtx.beginPath();
      fxCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      fxCtx.fill();
      if(p.life <= 0 || p.y > innerHeight + 80) confetti.splice(i,1);
    }
    requestAnimationFrame(fxLoop);
  }
  requestAnimationFrame(fxLoop);

  /* ======================
     座標（正規化）
  ====================== */
  function dotPos(i,j){
    return { x:(j+1)/(GRID+1), y:(i+1)/(GRID+1) };
  }
  function idToIJ(id){
    return { i: Math.floor(id/GRID), j: id % GRID };
  }
  function idToNorm(id){
    const {i,j} = idToIJ(id);
    return dotPos(i,j);
  }

  /* ======================
     Canvasサイズ
  ====================== */
  function resizeCanvas(c){
    const r = c.getBoundingClientRect();
    const w = Math.max(1, Math.floor(r.width));
    c.width = w;
    c.height = w;
  }
  function resizeAll(){
    resizeCanvas(sample);
    resizeCanvas(play);
    drawSample();
    drawPlay();
  }
  function bootResize(){
    resizeAll();
    requestAnimationFrame(resizeAll);
    setTimeout(resizeAll, 60);
    setTimeout(resizeAll, 220);
  }
  window.addEventListener("resize", bootResize, {passive:true});

  /* ======================
     問題自動生成（自己交差OK）
     ※上下左右ランダムウォーク
  ====================== */
  function randInt(a,b){ return Math.floor(a + Math.random()*(b-a+1)); }

  function neighbors(id){
    const {i,j} = idToIJ(id);
    const cand = [];
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    for(const [di,dj] of dirs){
      const ni=i+di, nj=j+dj;
      if(0<=ni && ni<GRID && 0<=nj && nj<GRID) cand.push(ni*GRID+nj);
    }
    return cand;
  }

  function compressSeq(ids){
    const out = [];
    for(const v of ids){
      if(out.length===0 || out[out.length-1]!==v) out.push(v);
    }
    return out;
  }

  function collinear(a,b,c,eps=1e-12){
    const abx=b.x-a.x, aby=b.y-a.y;
    const bcx=c.x-b.x, bcy=c.y-b.y;
    const cross = abx*bcy - aby*bcx;
    return Math.abs(cross) < eps;
  }

  // 表示用：同一直線の中間点を削る（折れ点だけ残す）
  function compressCollinearIds(ids){
    const clean = compressSeq(ids);
    if(clean.length <= 2) return clean;
    const out = [clean[0]];
    for(let i=1;i<clean.length-1;i++){
      const a = idToNorm(out[out.length-1]);
      const b = idToNorm(clean[i]);
      const c = idToNorm(clean[i+1]);
      if(collinear(a,b,c)) continue;
      out.push(clean[i]);
    }
    out.push(clean[clean.length-1]);
    return out;
  }

  // まず長めの元点列を作る（最終的に折れ点が16～20になるまで調整するため）
  function generateRawWalk(rawLen){
    let cur = randInt(0, GRID*GRID-1);
    const path = [cur];
    for(let k=1;k<rawLen;k++){
      const ns = neighbors(cur);
      cur = ns[randInt(0, ns.length-1)];
      path.push(cur);
    }
    return compressSeq(path);
  }

  // ✅表示点数（answerViewIds.length）が必ず16〜20になるまで生成し直す
  function generateProblemWithVisibleCount(){
    for(let t=0;t<GEN_TRIES;t++){
      // 折れ点が減ることを見越して、元はやや長めに作る
      const rawLen = randInt(28, 46);
      const answer = generateRawWalk(rawLen);
      const view = compressCollinearIds(answer);

      if(view.length >= MIN_VISIBLE_POINTS && view.length <= MAX_VISIBLE_POINTS){
        return { answer, view };
      }
    }
    // 万一見つからない場合は、最後に条件を満たすまで無限ループしないようフォールバック
    // （この条件だと通常ここに来ません）
    const fallbackAnswer = generateRawWalk(40);
    return { answer: fallbackAnswer, view: compressCollinearIds(fallbackAnswer) };
  }

  let answer, answerViewIds;
  ({ answer, view: answerViewIds } = generateProblemWithVisibleCount());
  setHint(`※ お手本の点の数（折れ点）：${answerViewIds.length}（目標 16〜20） / 余計な線があるとNG`);

  /* ======================
     描画
  ====================== */
  function drawDots(ctx){
    const v = getComputedStyle(document.documentElement).getPropertyValue("--dot").trim();
    ctx.fillStyle = v || "#444";
    for(let i=0;i<GRID;i++){
      for(let j=0;j<GRID;j++){
        const p = dotPos(i,j);
        const x = p.x * ctx.canvas.width;
        const y = p.y * ctx.canvas.height;
        ctx.beginPath();
        ctx.arc(x,y, DOT_R, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  function drawPolyline(ctx, pts, color, width){
    if(pts.length < 2) return;
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineJoin = "round";
    ctx.lineCap  = "round";
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
  }

  function idsToCanvasPts(ids, canvas){
    return ids.map(id => {
      const p = idToNorm(id);
      return { x:p.x*canvas.width, y:p.y*canvas.height };
    });
  }

  function drawSample(){
    sctx.clearRect(0,0,sample.width,sample.height);
    drawDots(sctx);
    const pts = idsToCanvasPts(answerViewIds, sample);
    drawPolyline(sctx, pts, "red", 4);
  }

  /* ======================
     プレイ：直線化ストローク
  ====================== */
  let strokes = []; // { idsView:[], ptsView:[{x,y}...], edgeSet:Set<string> }

  let drawing = false;
  let rawPts = [];

  function drawPlay(){
    pctx.clearRect(0,0,play.width,play.height);
    drawDots(pctx);

    for(const st of strokes){
      drawPolyline(pctx, st.ptsView, "#00d2ff", 4);
    }

    if(drawing && rawPts.length > 1){
      drawPolyline(pctx, rawPts, "rgba(0,210,255,.35)", 4);
    }
  }

  function clientToCanvasXY(clientX, clientY){
    const r = play.getBoundingClientRect();
    return { x: clientX - r.left, y: clientY - r.top };
  }

  function nearestDotId(x,y){
    let best=null, bestD=1e9;
    for(let i=0;i<GRID;i++){
      for(let j=0;j<GRID;j++){
        const id = i*GRID + j;
        const p = dotPos(i,j);
        const px = p.x * play.width;
        const py = p.y * play.height;
        const d = Math.hypot(x-px, y-py);
        if(d < bestD){
          bestD = d;
          best = id;
        }
      }
    }
    return { id: best, dist: bestD };
  }

  function pushUnique(arr, id){
    if(id==null) return;
    if(arr.length===0 || arr[arr.length-1]!==id) arr.push(id);
  }

  function extractIdsFromRaw(raw){
    const ids = [];
    for(const p of raw){
      const {id, dist} = nearestDotId(p.x, p.y);
      if(dist <= HIT_R) pushUnique(ids, id);
    }

    if(raw.length){
      const a = nearestDotId(raw[0].x, raw[0].y);
      const b = nearestDotId(raw[raw.length-1].x, raw[raw.length-1].y);

      if(a.dist <= FORCE_SNAP_R){
        ids.unshift(a.id);
        while(ids.length>=2 && ids[0]===ids[1]) ids.shift();
      }
      if(b.dist <= FORCE_SNAP_R){
        ids.push(b.id);
        while(ids.length>=2 && ids[ids.length-1]===ids[ids.length-2]) ids.pop();
      }
    }

    return compressSeq(ids);
  }

  /* ======================
     厳密判定（見た目と判定一致）
     「表示用idsView」→単位エッジ集合（隣接点辺）に分解して比較
  ====================== */
  function edgeKey(a,b){
    const lo = Math.min(a,b), hi = Math.max(a,b);
    return lo + "-" + hi;
  }

  function unitEdgesFromViewIds(idsView){
    const set = new Set();
    for(let i=0;i<idsView.length-1;i++){
      const a = idsView[i], b = idsView[i+1];
      if(a==null || b==null || a===b) continue;

      const ai = Math.floor(a/GRID), aj = a % GRID;
      const bi = Math.floor(b/GRID), bj = b % GRID;

      const di = bi - ai;
      const dj = bj - aj;

      if(di !== 0 && dj !== 0) return null; // 斜めはNG

      const stepI = di === 0 ? 0 : (di > 0 ? 1 : -1);
      const stepJ = dj === 0 ? 0 : (dj > 0 ? 1 : -1);
      const steps = Math.abs(di) + Math.abs(dj);

      let ci = ai, cj = aj;
      for(let s=0;s<steps;s++){
        const ni = ci + stepI;
        const nj = cj + stepJ;
        const from = ci*GRID + cj;
        const to   = ni*GRID + nj;
        set.add(edgeKey(from, to));
        ci = ni; cj = nj;
      }
    }
    return set;
  }

  function finalizeStroke(){
    const idsUnit = extractIdsFromRaw(rawPts);
    if(idsUnit.length < 2) return false;

    const idsView = compressCollinearIds(idsUnit);
    if(idsView.length < 2) return false;

    const edgeSet = unitEdgesFromViewIds(idsView);
    if(edgeSet == null) return false;

    const ptsView = idsToCanvasPts(idsView, play);
    strokes.push({ idsView, ptsView, edgeSet });
    return true;
  }

  function onStart(clientX, clientY){
    drawing = true;
    rawPts = [];
    rawPts.push(clientToCanvasXY(clientX, clientY));
    drawPlay();
  }

  function onMove(clientX, clientY){
    if(!drawing) return;
    rawPts.push(clientToCanvasXY(clientX, clientY));
    drawPlay();
  }

  function onEnd(){
    if(!drawing) return;
    drawing = false;

    const ok = finalizeStroke();
    rawPts = [];
    drawPlay();

    if(ok){
      setStatus("直線にしたよ！つづけて描いてOK（できた！で判定）");
    }else{
      setStatus("点の近くをなぞってね（離すと直線になるよ）");
    }
  }

  /* 入力：Pointer + Touch + Mouse */
  play.addEventListener("pointerdown", async (e)=>{
    e.preventDefault();
    await ensureAudio();
    try{ play.setPointerCapture?.(e.pointerId); }catch(_){}
    onStart(e.clientX, e.clientY);
  }, {passive:false});

  play.addEventListener("pointermove", (e)=>{
    e.preventDefault();
    onMove(e.clientX, e.clientY);
  }, {passive:false});

  play.addEventListener("pointerup", (e)=>{
    e.preventDefault();
    onEnd();
  }, {passive:false});

  play.addEventListener("pointercancel", (e)=>{
    e.preventDefault();
    onEnd();
  }, {passive:false});

  play.addEventListener("touchstart", async (e)=>{
    e.preventDefault();
    await ensureAudio();
    const t = e.changedTouches[0];
    onStart(t.clientX, t.clientY);
  }, {passive:false});

  play.addEventListener("touchmove", (e)=>{
    e.preventDefault();
    const t = e.changedTouches[0];
    onMove(t.clientX, t.clientY);
  }, {passive:false});

  play.addEventListener("touchend", (e)=>{
    e.preventDefault();
    onEnd();
  }, {passive:false});

  play.addEventListener("mousedown", async (e)=>{
    e.preventDefault();
    await ensureAudio();
    onStart(e.clientX, e.clientY);
  }, {passive:false});

  window.addEventListener("mousemove", (e)=> onMove(e.clientX, e.clientY), {passive:true});
  window.addEventListener("mouseup", ()=> onEnd(), {passive:true});

  function unionPlayerEdges(){
    const all = new Set();
    for(const st of strokes){
      for(const k of st.edgeSet) all.add(k);
    }
    return all;
  }

  function setEquals(a, b){
    if(a.size !== b.size) return false;
    for(const k of a) if(!b.has(k)) return false;
    return true;
  }

  function isCorrectStrict(){
    const ansSet = unitEdgesFromViewIds(answerViewIds);
    if(ansSet == null) return false;
    const mySet = unionPlayerEdges();
    return setEquals(ansSet, mySet);
  }

  function clearAll(msg){
    strokes = [];
    drawing = false;
    rawPts = [];
    drawPlay();
    setStatus(msg);
  }

  function celebrate(){
    spawnConfetti(180);
    playOk();
  }

  doneBtn.addEventListener("click", async ()=>{
    if(drawing) onEnd();

    if(strokes.length === 0){
      setStatus("まずは なぞってね🙂（線を引いてから「できた！」）");
      return;
    }

    await ensureAudio();

    if(isCorrectStrict()){
      setStatus("せいかい！🎉");
      celebrate();
      setTimeout(()=>{
        ({ answer, view: answerViewIds } = generateProblemWithVisibleCount());
        setHint(`※ お手本の点の数（折れ点）：${answerViewIds.length}（目標 16〜20） / 余計な線があるとNG`);
        clearAll("つぎの もんだい");
        drawSample();
      }, 850);
    }else{
      setStatus("ちがうよ。お手本と同じ線だけになるようにしてね（余計な線があるとNG）");
    }
  });

  nextBtn.addEventListener("click", ()=>{
    ({ answer, view: answerViewIds } = generateProblemWithVisibleCount());
    setHint(`※ お手本の点の数（折れ点）：${answerViewIds.length}（目標 16〜20） / 余計な線があるとNG`);
    clearAll("つぎの もんだい");
    drawSample();
  });

  clearBtn.addEventListener("click", ()=>{
    clearAll("やりなおし");
  });

  /* 起動 */
  bootResize();
  drawSample();
  drawPlay();
})();
</script>
</body>
</html>
