<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>てんつなぎ（自動生成）</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  background:#0b1538;
  color:#fff;
  display:flex;
  justify-content:center;
}
.wrap{
  width:min(520px,96vw);
  padding:12px;
}
h1{
  font-size:18px;
  font-weight:1000;
  text-align:center;
  margin:6px 0 10px;
}
.card{
  background:#fff;
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
}
canvas{
  display:block;
  width:100%;
  aspect-ratio:1/1;
  touch-action:none;
}
.row{
  display:flex;
  gap:10px;
  justify-content:center;
}
button{
  border:none;
  border-radius:14px;
  padding:12px 16px;
  font-size:16px;
  font-weight:1000;
}
.primary{ background:#ffd54a; color:#221400; }
.sub{ background:rgba(255,255,255,.15); color:#fff; }

.status{
  text-align:center;
  font-weight:1000;
  margin-top:8px;
}

/* 右上 もどる */
.backBtn{
  position:fixed;
  top:10px;
  right:10px;
  z-index:50;
  text-decoration:none;
  padding:8px 12px;
  font-size:13px;
  font-weight:900;
  border-radius:999px;
  background:rgba(255,255,255,.14);
  color:#fff;
  border:1px solid rgba(255,255,255,.25);
}
</style>
</head>

<body>
<a class="backBtn" href="../index.html">← もどる</a>

<div class="wrap">
  <h1>てんつなぎ</h1>

  <div class="card">
    <canvas id="sample"></canvas>
  </div>

  <div class="card">
    <canvas id="play"></canvas>
  </div>

  <div class="row">
    <button class="primary" id="doneBtn">できた！</button>
    <button class="sub" id="nextBtn">つぎ</button>
    <button class="sub" id="clearBtn">けす</button>
  </div>

  <div class="status" id="status">おてほんをみて なぞってね</div>
</div>

<script>
/* ======================
   設定
====================== */
const GRID = 5;
const DOT_R = 6;
const HIT_R = 22;

/* ======================
   ユーティリティ
====================== */
function rand(a,b){ return a+Math.random()*(b-a); }
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function dotPos(i,j){
  return {x:(j+1)/(GRID+1), y:(i+1)/(GRID+1)};
}
function idToXY(id){
  const i=Math.floor(id/GRID);
  const j=id%GRID;
  return dotPos(i,j);
}

/* ======================
   問題自動生成
====================== */
function generateProblem(){
  const all=[...Array(GRID*GRID).keys()];
  shuffle(all);
  const len=Math.floor(rand(8,14));
  return all.slice(0,len);
}
let answer = generateProblem();

/* ======================
   Canvas
====================== */
const sample=document.getElementById("sample");
const play=document.getElementById("play");
const sctx=sample.getContext("2d");
const pctx=play.getContext("2d");
const statusEl=document.getElementById("status");

function resize(c){
  const w=c.getBoundingClientRect().width;
  c.width=w;
  c.height=w;
}
function resizeAll(){
  resize(sample); resize(play);
  drawSample(); drawPlay();
}
window.addEventListener("resize",resizeAll);
resizeAll();

/* ======================
   描画
====================== */
function drawDots(ctx){
  ctx.fillStyle="#444";
  for(let i=0;i<GRID;i++){
    for(let j=0;j<GRID;j++){
      const p=dotPos(i,j);
      ctx.beginPath();
      ctx.arc(p.x*ctx.canvas.width,p.y*ctx.canvas.height,DOT_R,0,Math.PI*2);
      ctx.fill();
    }
  }
}

function drawSample(){
  sctx.clearRect(0,0,sample.width,sample.height);
  drawDots(sctx);
  sctx.strokeStyle="red";
  sctx.lineWidth=4;
  sctx.beginPath();
  answer.forEach((id,k)=>{
    const p=idToXY(id);
    const x=p.x*sample.width;
    const y=p.y*sample.height;
    if(k===0) sctx.moveTo(x,y);
    else sctx.lineTo(x,y);
  });
  sctx.stroke();
}

/* ======================
   プレイ
====================== */
let drawPts=[];
let hitIds=[];
let drawing=false;

function drawPlay(){
  pctx.clearRect(0,0,play.width,play.height);
  drawDots(pctx);
  if(drawPts.length>1){
    pctx.strokeStyle="#00d2ff";
    pctx.lineWidth=4;
    pctx.beginPath();
    drawPts.forEach((p,i)=>{
      if(i===0) pctx.moveTo(p.x,p.y);
      else pctx.lineTo(p.x,p.y);
    });
    pctx.stroke();
  }
}

function hitTest(x,y){
  let best=null,dist=1e9;
  for(let i=0;i<GRID;i++){
    for(let j=0;j<GRID;j++){
      const id=i*GRID+j;
      const p=dotPos(i,j);
      const px=p.x*play.width;
      const py=p.y*play.height;
      const d=Math.hypot(x-px,y-py);
      if(d<HIT_R && d<dist){dist=d;best=id;}
    }
  }
  return best;
}

function getXY(e){
  const r=play.getBoundingClientRect();
  return {x:e.clientX-r.left,y:e.clientY-r.top};
}

play.addEventListener("pointerdown",e=>{
  e.preventDefault();
  drawing=true;
  drawPts=[]; hitIds=[];
  const p=getXY(e);
  drawPts.push(p);
  const id=hitTest(p.x,p.y);
  if(id!=null) hitIds.push(id);
  drawPlay();
});
play.addEventListener("pointermove",e=>{
  if(!drawing) return;
  const p=getXY(e);
  drawPts.push(p);
  const id=hitTest(p.x,p.y);
  if(id!=null && hitIds[hitIds.length-1]!==id) hitIds.push(id);
  drawPlay();
});
window.addEventListener("pointerup",()=>drawing=false);

/* ======================
   判定（長い直線OK）
====================== */
function compress(ids){
  const o=[];
  ids.forEach(v=>{ if(o[o.length-1]!==v) o.push(v); });
  return o;
}
function segments(ids){
  const s=[];
  for(let i=0;i<ids.length-1;i++){
    if(ids[i]!==ids[i+1]) s.push([ids[i],ids[i+1]]);
  }
  return s;
}
function covers(a,b){
  const p=idToXY(a[0]), q=idToXY(a[1]);
  const r=idToXY(b[0]), s=idToXY(b[1]);
  const vx=q.x-p.x, vy=q.y-p.y;
  const wx=r.x-p.x, wy=r.y-p.y;
  if(Math.abs(vx*wy-vy*wx)>1e-3) return false;
  const dot=(ax,ay,bx,by)=>ax*bx+ay*by;
  const pq=dot(vx,vy,vx,vy);
  const proj=v=>dot(v.x-p.x,v.y-p.y,vx,vy);
  return Math.min(proj(r),proj(s))<=pq && Math.max(proj(r),proj(s))>=0;
}
function isCorrect(){
  const aSeg=segments(compress(answer));
  const pSeg=segments(compress(hitIds));
  return aSeg.every(a=>pSeg.some(p=>covers(p,a)));
}

/* ======================
   操作
====================== */
doneBtn.onclick=()=>{
  if(isCorrect()){
    statusEl.textContent="せいかい！🎉";
  }else{
    statusEl.textContent="ちがうよ。もういちど！";
  }
};
nextBtn.onclick=()=>{
  answer=generateProblem();
  drawPts=[]; hitIds=[];
  drawSample(); drawPlay();
  statusEl.textContent="つぎの もんだい";
};
clearBtn.onclick=()=>{
  drawPts=[]; hitIds=[];
  drawPlay();
  statusEl.textContent="やりなおし";
};

drawSample();
drawPlay();
</script>
</body>
</html>
``
