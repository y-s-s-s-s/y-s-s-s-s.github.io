<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>てんつなぎ</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  background:#0b1538;
  color:#fff;
  display:flex;
  justify-content:center;
}
.wrap{
  width:min(460px,96vw);
  padding:12px;
}
h1{
  text-align:center;
  font-size:18px;
  font-weight:1000;
}
.card{
  background:#fff;
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
}
canvas{
  display:block;
  width:100%;
  aspect-ratio:1/1;
  touch-action:none;
}
.row{
  display:flex;
  gap:10px;
  justify-content:center;
}
button{
  border:none;
  border-radius:14px;
  padding:12px 18px;
  font-size:16px;
  font-weight:1000;
}
.primary{ background:#ffd54a; color:#221400; }
.sub{ background:rgba(255,255,255,.15); color:#fff; }
.status{
  text-align:center;
  font-weight:1000;
  margin-top:8px;
  min-height:1.6em;
}
</style>
</head>

<body>
<div class="wrap">
  <h1>てんつなぎ</h1>

  <div class="card">
    <canvas id="sample"></canvas>
  </div>

  <div class="card">
    <canvas id="play"></canvas>
  </div>

  <div class="row">
    <button class="primary" id="doneBtn">できた！</button>
    <button class="sub" id="clearBtn">けす</button>
  </div>

  <div class="status" id="status">おてほんをみて なぞってね</div>
</div>

<script>
/* =====================
   基本設定
===================== */
const GRID = 5;
const DOT_R = 6;
const HIT_R = 24;

/* 正規化点座標 */
function dotPos(i,j){
  return { x:(j+1)/(GRID+1), y:(i+1)/(GRID+1) };
}

/* 問題 */
const problems = [
  { answer:[20,21,22,23,24,19,14,9,8,7,12,17,16,15,10,5,6,11] }
];
let current = 0;

/* Canvas */
const sample = document.getElementById("sample");
const play   = document.getElementById("play");
const sctx = sample.getContext("2d");
const pctx = play.getContext("2d");
const statusEl = document.getElementById("status");

function resize(c){
  const w = c.getBoundingClientRect().width;
  c.width = w;
  c.height = w;
}
function resizeAll(){
  resize(sample);
  resize(play);
  drawSample();
  drawPlay();
}
window.addEventListener("resize", resizeAll);
resizeAll();

/* 点描画 */
function drawDots(ctx){
  ctx.fillStyle="#444";
  for(let i=0;i<GRID;i++){
    for(let j=0;j<GRID;j++){
      const p = dotPos(i,j);
      ctx.beginPath();
      ctx.arc(p.x*ctx.canvas.width, p.y*ctx.canvas.height, DOT_R, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

/* お手本 */
function drawSample(){
  sctx.clearRect(0,0,sample.width,sample.height);
  drawDots(sctx);
  const a = problems[current].answer;
  sctx.strokeStyle="red";
  sctx.lineWidth=4;
  sctx.lineJoin="round";
  sctx.beginPath();
  a.forEach((id,k)=>{
    const i=Math.floor(id/GRID);
    const j=id%GRID;
    const p=dotPos(i,j);
    const x=p.x*sample.width;
    const y=p.y*sample.height;
    if(k===0) sctx.moveTo(x,y);
    else sctx.lineTo(x,y);
  });
  sctx.stroke();
}

/* =====================
   プレイ側
===================== */

/* 描画用：指の軌跡 */
let drawPoints = [];

/* 判定用：拾った点 */
let hitPoints = [];

let drawing=false;

function drawPlay(){
  pctx.clearRect(0,0,play.width,play.height);
  drawDots(pctx);

  if(drawPoints.length){
    pctx.strokeStyle="#00d2ff";
    pctx.lineWidth=4;
    pctx.lineJoin="round";
    pctx.lineCap="round";
    pctx.beginPath();
    drawPoints.forEach((p,i)=>{
      if(i===0) pctx.moveTo(p.x,p.y);
      else pctx.lineTo(p.x,p.y);
    });
    pctx.stroke();
  }
}

function getXY(e){
  const r = play.getBoundingClientRect();
  return { x:e.clientX-r.left, y:e.clientY-r.top };
}

/* 点ヒット判定 */
function hitTest(x,y){
  let best=null, dist=1e9;
  for(let i=0;i<GRID;i++){
    for(let j=0;j<GRID;j++){
      const id=i*GRID+j;
      const p=dotPos(i,j);
      const px=p.x*play.width;
      const py=p.y*play.height;
      const d=Math.hypot(x-px,y-py);
      if(d<HIT_R && d<dist){
        dist=d;
        best=id;
      }
    }
  }
  return best;
}

/* 入力 */
play.addEventListener("pointerdown",e=>{
  e.preventDefault();
  drawing=true;
  drawPoints=[];
  hitPoints=[];
  statusEl.textContent="なぞってるよ…";
  const {x,y}=getXY(e);
  drawPoints.push({x,y});
  const id=hitTest(x,y);
  if(id!=null) hitPoints.push(id);
  drawPlay();
});

play.addEventListener("pointermove",e=>{
  if(!drawing) return;
  const {x,y}=getXY(e);
  drawPoints.push({x,y});
  const id=hitTest(x,y);
  if(id!=null && hitPoints[hitPoints.length-1]!==id){
    hitPoints.push(id);
  }
  drawPlay();
});

window.addEventListener("pointerup",()=>drawing=false);

/* =====================
   ゆる判定（線分カバー）
===================== */
function segmentsFrom(ids){
  const out=[];
  for(let i=0;i<ids.length-1;i++){
    const a=ids[i], b=ids[i+1];
    if(a!==b) out.push([a,b]);
  }
  return out;
}
function idToXY(id){
  const i=Math.floor(id/GRID);
  const j=id%GRID;
  const p=dotPos(i,j);
  return {x:p.x,y:p.y};
}
function covers(segA, segB){
  const p=idToXY(segA[0]);
  const q=idToXY(segA[1]);
  const r=idToXY(segB[0]);
  const s=idToXY(segB[1]);

  const cross=(q.x-p.x)*(r.y-p.y)-(q.y-p.y)*(r.x-p.x);
  if(Math.abs(cross)>1e-3) return false;

  const dot=v=>((v.x-p.x)*(q.x-p.x)+(v.y-p.y)*(q.y-p.y));
  const pq=dot(q);
  const r1=dot(r), r2=dot(s);
  return Math.min(r1,r2)<=pq && Math.max(r1,r2)>=0;
}

function isCorrect(){
  const ansSegs=segmentsFrom(problems[current].answer);
  const playSegs=segmentsFrom(hitPoints);
  return ansSegs.every(a=>playSegs.some(p=>covers(p,a)));
}

/* 判定 */
document.getElementById("doneBtn").onclick=()=>{
  if(drawPoints.length<2){
    statusEl.textContent="なぞってね🙂";
    return;
  }
  if(isCorrect()){
    statusEl.textContent="せいかい！🎉";
  }else{
    statusEl.textContent="ちがうよ。もういちど！";
  }
};
document.getElementById("clearBtn").onclick=()=>{
  drawPoints=[];
  hitPoints=[];
  drawPlay();
  statusEl.textContent="おてほんをみて なぞってね";
};

drawSample();
drawPlay();
</script>
</body>
</html>
