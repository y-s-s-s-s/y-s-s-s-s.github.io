<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>てんつなぎ（5×5）</title>
<style>
  :root{
    --bg:#0b1538;
    --card:#ffffff;
    --text:#ffffff;
    --dot:#3b3f4a;
    --sample:#ff3b3b;
    --draw:#00d2ff;
    --shadow: 0 16px 40px rgba(0,0,0,.25);
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
    overscroll-behavior: none;
  }
  .wrap{
    width:min(520px, 96vw);
    padding:12px;
  }
  h1{
    margin:6px 0 10px;
    font-size:18px;
    font-weight:1000;
    text-align:center;
  }
  .card{
    background:var(--card);
    border-radius:12px;
    padding:10px;
    margin-bottom:10px;
    box-shadow: var(--shadow);
  }
  canvas{
    display:block;
    width:100%;
    height:auto;
    aspect-ratio: 1 / 1;
    touch-action: none;     /* スクロール・拡大に奪われない */
    user-select:none;
    -webkit-user-select:none;
  }
  .row{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-top:8px;
  }
  button{
    border:none;
    border-radius:14px;
    padding:12px 16px;
    font-size:16px;
    font-weight:1000;
    cursor:pointer;
  }
  .primary{ background:#ffd54a; color:#221400; }
  .sub{ background:rgba(255,255,255,.18); color:#fff; border:1px solid rgba(255,255,255,.25); }
  .status{
    margin-top:10px;
    text-align:center;
    font-weight:1000;
    min-height:1.6em;
  }
  .debug{
    margin-top:6px;
    text-align:center;
    font-size:12px;
    opacity:.85;
    word-break: break-all;
  }
</style>
</head>

<body>
<div class="wrap">
  <h1>てんつなぎ（5×5）</h1>

  <div class="card">
    <canvas id="sample"></canvas>
  </div>

  <div class="card">
    <canvas id="play"></canvas>
  </div>

  <div class="row">
    <button class="primary" id="doneBtn">できた！</button>
    <button class="sub" id="clearBtn">けす</button>
    <button class="sub" id="nextBtn">つぎ</button>
  </div>

  <div class="status" id="status">おてほんをみて なぞってね</div>
  <div class="debug" id="debug">debug: 起動中…</div>
</div>

<script>
(() => {
  "use strict";

  /* ========= 設定 ========= */
  const GRID = 5;
  const DOT_R = 6;
  const HIT_R_PX = 24; // 点を拾う半径（px）

  /* 点ID = i*GRID + j （i=上0..4, j=左0..4） */
  const problems = [
    { name:"おうち", answer:[20,21,22,23,24,19,14,9,8,7,12,17,16,15,10,5,6,11] },
    { name:"しかく", answer:[6,7,8,13,18,17,16,11,6] }
  ];
  let current = 0;

  /* ========= DOM ========= */
  const sample = document.getElementById("sample");
  const play   = document.getElementById("play");
  const sctx = sample.getContext("2d");
  const pctx = play.getContext("2d");
  const statusEl = document.getElementById("status");
  const debugEl  = document.getElementById("debug");

  const doneBtn  = document.getElementById("doneBtn");
  const clearBtn = document.getElementById("clearBtn");
  const nextBtn  = document.getElementById("nextBtn");

  /* ========= 便利関数 ========= */
  function setStatus(t){ statusEl.textContent = t; }
  function setDebug(t){ debugEl.textContent = t; }

  function dotPos(i,j){
    return { x:(j+1)/(GRID+1), y:(i+1)/(GRID+1) };
  }
  function idToNormXY(id){
    const i = Math.floor(id/GRID);
    const j = id % GRID;
    const p = dotPos(i,j);
    return { x:p.x, y:p.y };
  }

  /* ========= Canvasサイズ確定 ========= */
  function resizeCanvas(c){
    const rect = c.getBoundingClientRect();
    const w = Math.max(1, Math.floor(rect.width));
    c.width  = w;
    c.height = w;
  }
  function resizeAll(){
    resizeCanvas(sample);
    resizeCanvas(play);
    drawSample();
    drawPlay();
  }

  // DOM反映後に確実にリサイズ（ここが重要）
  function bootResize(){
    resizeAll();
    requestAnimationFrame(resizeAll);
    setTimeout(resizeAll, 50);
    setTimeout(resizeAll, 200);
  }

  window.addEventListener("resize", () => {
    bootResize();
  }, {passive:true});

  /* ========= 描画 ========= */
  function drawDots(ctx){
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--dot") || "#444";
    for(let i=0;i<GRID;i++){
      for(let j=0;j<GRID;j++){
        const p = dotPos(i,j);
        const x = p.x * ctx.canvas.width;
        const y = p.y * ctx.canvas.height;
        ctx.beginPath();
        ctx.arc(x,y, DOT_R, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  function drawPolyline(ctx, pts, color, width){
    if(pts.length < 2) return;
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineJoin = "round";
    ctx.lineCap  = "round";
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for(let i=1;i<pts.length;i++){
      ctx.lineTo(pts[i].x, pts[i].y);
    }
    ctx.stroke();
  }

  function drawSample(){
    sctx.clearRect(0,0,sample.width,sample.height);
    drawDots(sctx);

    const ans = problems[current].answer;
    const pts = ans.map(id => {
      const p = idToNormXY(id);
      return { x:p.x*sample.width, y:p.y*sample.height };
    });
    drawPolyline(sctx, pts, getComputedStyle(document.documentElement).getPropertyValue("--sample") || "red", 4);
  }

  /* ========= プレイ側状態 ========= */
  // 描画は指の軌跡（必ず線が出る）
  let drawPts = [];
  // 判定用は点ID列（点を拾ったときだけ更新）
  let hitIds = [];

  // デバッグ：最後に触れた位置
  let pointerMarker = null; // {x,y}
  let drawing = false;
  let lastEventName = "-";
  let eventCount = 0;

  function drawPlay(){
    pctx.clearRect(0,0,play.width,play.height);
    drawDots(pctx);

    // なぞり線
    drawPolyline(pctx, drawPts, getComputedStyle(document.documentElement).getPropertyValue("--draw") || "#00d2ff", 4);

    // 指位置マーカー（イベントが来てるか即分かる）
    if(pointerMarker){
      pctx.fillStyle = "rgba(0,0,0,.18)";
      pctx.beginPath();
      pctx.arc(pointerMarker.x, pointerMarker.y, 16, 0, Math.PI*2);
      pctx.fill();

      pctx.strokeStyle = "rgba(255,213,74,.95)";
      pctx.lineWidth = 3;
      pctx.beginPath();
      pctx.arc(pointerMarker.x, pointerMarker.y, 16, 0, Math.PI*2);
      pctx.stroke();
    }
  }

  /* ========= 座標変換 ========= */
  function clientToCanvasXY(clientX, clientY){
    const r = play.getBoundingClientRect();
    return { x: clientX - r.left, y: clientY - r.top };
  }

  /* ========= 点ヒット判定 ========= */
  function hitTestId(x,y){
    let bestId = null;
    let bestD = 1e9;

    for(let i=0;i<GRID;i++){
      for(let j=0;j<GRID;j++){
        const id = i*GRID + j;
        const p = dotPos(i,j);
        const px = p.x * play.width;
        const py = p.y * play.height;
        const d = Math.hypot(x-px, y-py);
        if(d < HIT_R_PX && d < bestD){
          bestD = d;
          bestId = id;
        }
      }
    }
    return bestId;
  }

  function pushHit(id){
    if(id == null) return;
    if(hitIds.length === 0 || hitIds[hitIds.length-1] !== id){
      hitIds.push(id);
    }
  }

  /* ========= 入力処理（Pointer / Mouse / Touch 全対応） ========= */
  function onStart(clientX, clientY, name){
    drawing = true;
    drawPts = [];
    hitIds  = [];
    lastEventName = name;

    const p = clientToCanvasXY(clientX, clientY);
    pointerMarker = {x:p.x, y:p.y};
    drawPts.push({x:p.x, y:p.y});
    pushHit(hitTestId(p.x, p.y));

    eventCount++;
    setStatus("なぞってるよ…（できた！で判定）");
    setDebug(`debug: ${name} start / events=${eventCount} / hits=${hitIds.length}`);
    drawPlay();
  }

  function onMove(clientX, clientY, name){
    if(!drawing) return;
    lastEventName = name;

    const p = clientToCanvasXY(clientX, clientY);
    pointerMarker = {x:p.x, y:p.y};
    drawPts.push({x:p.x, y:p.y});
    pushHit(hitTestId(p.x, p.y));

    eventCount++;
    setDebug(`debug: ${name} move / events=${eventCount} / hits=${hitIds.length}`);
    drawPlay();
  }

  function onEnd(name){
    drawing = false;
    lastEventName = name;
    eventCount++;
    setDebug(`debug: ${name} end / events=${eventCount} / hits=${hitIds.length}`);
  }

  // Pointer
  play.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    try{ play.setPointerCapture?.(e.pointerId); }catch(_){}
    onStart(e.clientX, e.clientY, "pointer");
  }, {passive:false});

  play.addEventListener("pointermove", (e) => {
    e.preventDefault();
    onMove(e.clientX, e.clientY, "pointer");
  }, {passive:false});

  play.addEventListener("pointerup", (e) => {
    e.preventDefault();
    onEnd("pointer");
  }, {passive:false});

  play.addEventListener("pointercancel", (e) => {
    e.preventDefault();
    onEnd("pointercancel");
  }, {passive:false});

  // Mouse保険
  play.addEventListener("mousedown", (e) => {
    e.preventDefault();
    onStart(e.clientX, e.clientY, "mouse");
  }, {passive:false});

  window.addEventListener("mousemove", (e) => {
    if(!drawing) return;
    onMove(e.clientX, e.clientY, "mouse");
  }, {passive:true});

  window.addEventListener("mouseup", () => {
    if(!drawing) return;
    onEnd("mouse");
  }, {passive:true});

  // Touch保険
  play.addEventListener("touchstart", (e) => {
    e.preventDefault();
    const t = e.changedTouches[0];
    onStart(t.clientX, t.clientY, "touch");
  }, {passive:false});

  play.addEventListener("touchmove", (e) => {
    e.preventDefault();
    const t = e.changedTouches[0];
    onMove(t.clientX, t.clientY, "touch");
  }, {passive:false});

  play.addEventListener("touchend", (e) => {
    e.preventDefault();
    onEnd("touch");
  }, {passive:false});

  /* ========= 判定（長い直線OK：線分カバー） ========= */
  function compressIds(ids){
    const out = [];
    for(const v of ids){
      if(out.length === 0 || out[out.length-1] !== v) out.push(v);
    }
    return out;
  }

  function segmentsFrom(ids){
    const segs = [];
    for(let i=0;i<ids.length-1;i++){
      const a = ids[i], b = ids[i+1];
      if(a == null || b == null || a === b) continue;
      segs.push([a,b]);
    }
    return segs;
  }

  // segA が segB（お手本）を「同一直線上で覆う」か
  function covers(segA, segB){
    const p = idToNormXY(segA[0]);
    const q = idToNormXY(segA[1]);
    const r = idToNormXY(segB[0]);
    const s = idToNormXY(segB[1]);

    const vx = q.x - p.x;
    const vy = q.y - p.y;
    const wx = r.x - p.x;
    const wy = r.y - p.y;

    // 同一直線（外積 ≈ 0）
    const cross = vx*wy - vy*wx;
    if(Math.abs(cross) > 1e-3) return false;

    // 投影して区間重なりを見る（p->q方向のスカラー）
    const dot = (ax,ay,bx,by)=> ax*bx + ay*by;
    const pq = dot(vx,vy,vx,vy);
    if(pq < 1e-6) return false; // ほぼ同一点

    const proj = (pt) => dot(pt.x-p.x, pt.y-p.y, vx, vy);
    const r1 = proj(r);
    const r2 = proj(s);

    // segA の範囲は [0, pq]。segB の両端投影がその範囲をまたげばカバー
    const minRS = Math.min(r1,r2);
    const maxRS = Math.max(r1,r2);
    return (minRS <= pq + 1e-6) && (maxRS >= 0 - 1e-6);
  }

  function isCorrect(){
    const ansIds = compressIds(problems[current].answer);
    const myIds  = compressIds(hitIds);

    const ansSegs = segmentsFrom(ansIds);
    const mySegs  = segmentsFrom(myIds);

    // お手本の各線分が、プレイヤー線分のいずれかでカバーされればOK
    return ansSegs.every(aSeg => mySegs.some(pSeg => covers(pSeg, aSeg)));
  }

  /* ========= ボタン ========= */
  doneBtn.addEventListener("click", () => {
    if(drawPts.length < 2){
      setStatus("まずは なぞってね🙂");
      return;
    }

    // ヒットが少なすぎる時はヒント
    if(hitIds.length < 2){
      setStatus("点の近くをなぞってね（点を通ると判定が安定するよ）");
      return;
    }

    if(isCorrect()){
      setStatus("せいかい！🎉 つぎの もんだいへ");
      setTimeout(() => {
        current = (current + 1) % problems.length;
        clearAll();
        drawSample();
        setStatus(`もんだい：${problems[current].name}（なぞってね）`);
      }, 700);
    }else{
      setStatus("ちがうよ。もういちど！（けす でやりなおし）");
    }
  });

  function clearAll(){
    drawPts = [];
    hitIds = [];
    pointerMarker = null;
    drawPlay();
    setDebug(`debug: cleared / last=${lastEventName} / events=${eventCount}`);
  }

  clearBtn.addEventListener("click", () => {
    clearAll();
    setStatus("おてほんをみて なぞってね");
  });

  nextBtn.addEventListener("click", () => {
    current = (current + 1) % problems.length;
    clearAll();
    drawSample();
    setStatus(`もんだい：${problems[current].name}（なぞってね）`);
  });

  /* ========= 起動 ========= */
  window.addEventListener("error", (e) => {
    setStatus("エラーが発生しました: " + (e.message || "unknown"));
    setDebug(`debug: ${e.filename || ""}:${e.lineno || ""}`);
  });

  setDebug("debug: 起動OK / " + navigator.userAgent);
  bootResize();
  drawSample();
  drawPlay();
})();
</script>
</body>
</html>
