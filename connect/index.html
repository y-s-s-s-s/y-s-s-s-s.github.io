<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>てんつなぎ（自動生成・直線補完）</title>

<style>
  :root{
    --bg1:#0b1538;
    --bg2:#0b2a3a;
    --text:#f2f5ff;
    --card:#ffffff;
    --dot:#3e4452;
    --sample:#ff3b3b;
    --draw:#00d2ff;
    --preview:rgba(0,210,255,.35);
    --accent:#ffd54a;
    --shadow:0 18px 60px rgba(0,0,0,.45);
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    color:var(--text);
    background:
      radial-gradient(1000px 700px at 15% 10%, #253d85, var(--bg1)),
      radial-gradient(900px 650px at 85% 20%, #3c1d7a, transparent 60%),
      radial-gradient(900px 650px at 50% 120%, #145a5e, transparent 55%),
      linear-gradient(180deg, var(--bg1), var(--bg2));
    min-height:100svh;
    display:flex;
    justify-content:center;
    padding:12px;
    overscroll-behavior:none;
  }

  .backBtn{
    position:fixed;
    top:10px;
    right:10px;
    z-index:999;
    text-decoration:none;
    font-size:13px;
    font-weight:900;
    padding:8px 12px;
    border-radius:999px;
    background:rgba(255,255,255,.14);
    color:#fff;
    border:1px solid rgba(255,255,255,.25);
    backdrop-filter: blur(6px);
    box-shadow: 0 10px 26px rgba(0,0,0,.3);
    user-select:none;
    touch-action:manipulation;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .backBtn:active{ transform:scale(.97); filter:brightness(1.1); }

  .wrap{ width:min(520px, 96vw); }
  h1{
    margin:6px 0 10px;
    font-size:18px;
    font-weight:1000;
    text-align:center;
    letter-spacing:.02em;
  }
  .card{
    background:var(--card);
    border-radius:12px;
    padding:10px;
    margin-bottom:10px;
    box-shadow: var(--shadow);
  }
  canvas{
    display:block;
    width:100%;
    aspect-ratio:1/1;
    touch-action:none;
    user-select:none;
    -webkit-user-select:none;
  }
  .row{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:6px;
  }
  button{
    border:none;
    border-radius:14px;
    padding:12px 16px;
    font-size:16px;
    font-weight:1000;
    cursor:pointer;
    user-select:none;
    touch-action:manipulation;
  }
  .primary{ background:var(--accent); color:#221400; }
  .sub{ background:rgba(255,255,255,.14); color:#fff; border:1px solid rgba(255,255,255,.22); }
  .status{
    margin-top:10px;
    text-align:center;
    font-weight:1000;
    min-height:1.6em;
  }
  .debug{
    margin-top:6px;
    text-align:center;
    font-size:12px;
    opacity:.85;
    word-break:break-all;
  }
</style>
</head>

<body>
  <a class="backBtn" href="../index.html">← もどる</a>

  <div class="wrap">
    <h1>てんつなぎ（自動生成）</h1>

    <div class="card">
      <canvas id="sample"></canvas>
    </div>

    <div class="card">
      <canvas id="play"></canvas>
    </div>

    <div class="row">
      <button class="primary" id="doneBtn">できた！</button>
      <button class="sub" id="nextBtn">つぎ</button>
      <button class="sub" id="clearBtn">けす</button>
    </div>

    <div class="status" id="status">おてほんをみて なぞってね（何本でもOK）</div>
    <div class="debug" id="debug">debug: 起動中…</div>
  </div>

<script>
(() => {
  "use strict";

  /* ======================
     設定
  ====================== */
  const GRID = 5;
  const DOT_R = 6;
  const HIT_R = 24;        // 点を拾う半径(px)
  const MIN_LEN = 9;       // お手本（点列）の長さ
  const MAX_LEN = 16;

  /* ======================
     DOM / Canvas
  ====================== */
  const sample = document.getElementById("sample");
  const play   = document.getElementById("play");
  const sctx = sample.getContext("2d");
  const pctx = play.getContext("2d");
  const statusEl = document.getElementById("status");
  const debugEl  = document.getElementById("debug");
  const doneBtn  = document.getElementById("doneBtn");
  const nextBtn  = document.getElementById("nextBtn");
  const clearBtn = document.getElementById("clearBtn");

  function setStatus(t){ statusEl.textContent = t; }
  function setDebug(t){ debugEl.textContent = t; }

  setDebug("debug: JS OK / " + navigator.userAgent);
  window.addEventListener("error", (e) => {
    setStatus("エラー: " + (e.message || "unknown"));
    setDebug("debug: " + (e.filename || "") + ":" + (e.lineno || ""));
  });

  /* ======================
     座標系（正規化）
  ====================== */
  function dotPos(i,j){
    return { x:(j+1)/(GRID+1), y:(i+1)/(GRID+1) };
  }
  function idToIJ(id){
    return { i: Math.floor(id/GRID), j: id % GRID };
  }
  function idToNorm(id){
    const {i,j} = idToIJ(id);
    return dotPos(i,j);
  }

  /* ======================
     Canvasサイズ
  ====================== */
  function resizeCanvas(c){
    const r = c.getBoundingClientRect();
    const w = Math.max(1, Math.floor(r.width));
    c.width = w;
    c.height = w;
  }
  function resizeAll(){
    resizeCanvas(sample);
    resizeCanvas(play);
    drawSample();
    drawPlay();
  }
  function bootResize(){
    resizeAll();
    requestAnimationFrame(resizeAll);
    setTimeout(resizeAll, 60);
    setTimeout(resizeAll, 220);
  }
  window.addEventListener("resize", bootResize, {passive:true});

  /* ======================
     問題自動生成（自己交差OK）
     ランダムウォーク
  ====================== */
  function randInt(a,b){ return Math.floor(a + Math.random()*(b-a+1)); }

  function neighbors(id){
    const {i,j} = idToIJ(id);
    const cand = [];
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    for(const [di,dj] of dirs){
      const ni=i+di, nj=j+dj;
      if(0<=ni && ni<GRID && 0<=nj && nj<GRID) cand.push(ni*GRID+nj);
    }
    return cand;
  }

  function compressSeq(ids){
    const out = [];
    for(const v of ids){
      if(out.length===0 || out[out.length-1]!==v) out.push(v);
    }
    return out;
  }

  // 3点が同一直線（正規化座標で外積≈0）
  function collinear(a,b,c,eps=1e-12){
    const abx = b.x-a.x, aby=b.y-a.y;
    const bcx = c.x-b.x, bcy=c.y-b.y;
    const cross = abx*bcy - aby*bcx;
    return Math.abs(cross) < eps;
  }

  // 同一直線が続く中間点を削って「長い直線」にまとめる
  function compressCollinearIds(ids){
    const clean = compressSeq(ids);
    if(clean.length <= 2) return clean;

    const out = [clean[0]];
    for(let i=1;i<clean.length-1;i++){
      const a = idToNorm(out[out.length-1]);
      const b = idToNorm(clean[i]);
      const c = idToNorm(clean[i+1]);
      if(collinear(a,b,c)) continue; // bは直線上の中間点 → 省略
      out.push(clean[i]);
    }
    out.push(clean[clean.length-1]);
    return out;
  }

  function generateProblem(){
    const len = randInt(MIN_LEN, MAX_LEN);
    let cur = randInt(0, GRID*GRID-1);
    const path = [cur];
    for(let k=1;k<len;k++){
      const ns = neighbors(cur);
      cur = ns[randInt(0, ns.length-1)];
      path.push(cur);
    }
    const out = compressSeq(path);
    return out.length >= 2 ? out : generateProblem();
  }

  let answer = generateProblem();

  /* ======================
     描画
  ====================== */
  function cssVar(name, fallback){
    const v = getComputedStyle(document.documentElement).getPropertyValue(name);
    return (v && v.trim()) ? v.trim() : fallback;
  }

  function drawDots(ctx){
    ctx.fillStyle = cssVar("--dot", "#444");
    for(let i=0;i<GRID;i++){
      for(let j=0;j<GRID;j++){
        const p = dotPos(i,j);
        const x = p.x * ctx.canvas.width;
        const y = p.y * ctx.canvas.height;
        ctx.beginPath();
        ctx.arc(x, y, DOT_R, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  function drawPolyline(ctx, pts, color, width){
    if(pts.length < 2) return;
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineJoin = "round";
    ctx.lineCap  = "round";
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
  }

  function idsToCanvasPts(ids, canvas){
    return ids.map(id => {
      const p = idToNorm(id);
      return { x:p.x*canvas.width, y:p.y*canvas.height };
    });
  }

  function drawSample(){
    sctx.clearRect(0,0,sample.width,sample.height);
    drawDots(sctx);
    const pts = idsToCanvasPts(answer, sample);
    drawPolyline(sctx, pts, cssVar("--sample","red"), 4);
  }

  /* ======================
     プレイ：複数ストローク
     - 描いてる最中はフリーハンド（preview）
     - 指を離したら点と点を結ぶ直線（snapLine）に変換して確定
  ====================== */
  // 確定ストローク配列：
  // { ids: [点ID...](圧縮済み), pts: [{x,y}...](点中心へスナップした直線用) }
  let strokes = [];

  // 現在描画中（フリーハンド表示用）
  let drawing = false;
  let previewPts = [];      // フリーハンド軌跡（表示用）
  let currentHitIds = [];   // 点ヒット（確定用）
  let events = 0;

  function drawPlay(){
    pctx.clearRect(0,0,play.width,play.height);
    drawDots(pctx);

    // 確定済みストロークは「直線補完済み（点中心へスナップ）」で描く
    const color = cssVar("--draw","#00d2ff");
    for(const st of strokes){
      drawPolyline(pctx, st.pts, color, 4);
    }

    // 描いてる最中は薄いプレビュー（フリーハンド）
    if(drawing && previewPts.length > 1){
      drawPolyline(pctx, previewPts, cssVar("--preview","rgba(0,210,255,.35)"), 4);
    }
  }

  function clientToCanvasXY(clientX, clientY){
    const r = play.getBoundingClientRect();
    return { x: clientX - r.left, y: clientY - r.top };
  }

  function hitTest(x,y){
    let best=null, bestD=1e9;
    for(let i=0;i<GRID;i++){
      for(let j=0;j<GRID;j++){
        const id = i*GRID + j;
        const p = dotPos(i,j);
        const px = p.x * play.width;
        const py = p.y * play.height;
        const d = Math.hypot(x-px, y-py);
        if(d < HIT_R && d < bestD){
          bestD = d;
          best = id;
        }
      }
    }
    return best;
  }

  function pushHit(id){
    if(id==null) return;
    if(currentHitIds.length===0 || currentHitIds[currentHitIds.length-1]!==id){
      currentHitIds.push(id);
    }
  }

  // ストローク確定：点列→直線補完（点中心へスナップ）
  function finalizeStroke(){
    // 連続重複除去→同一直線の中間点除去（長い直線にまとめる）
    const ids = compressCollinearIds(currentHitIds);

    // 点を2つ以上拾えていないと「直線」が作れないので、捨てる（プレビューだけ）
    if(ids.length < 2) return;

    const pts = idsToCanvasPts(ids, play);
    strokes.push({ ids, pts });
  }

  function onStart(clientX, clientY, src){
    drawing = true;
    previewPts = [];
    currentHitIds = [];

    const p = clientToCanvasXY(clientX, clientY);
    previewPts.push(p);
    pushHit(hitTest(p.x, p.y));

    events++;
    setStatus("なぞってるよ…（離すと直線になるよ）");
    setDebug(`debug: ${src} start / events=${events} / strokes=${strokes.length}`);
    drawPlay();
  }

  function onMove(clientX, clientY, src){
    if(!drawing) return;
    const p = clientToCanvasXY(clientX, clientY);
    previewPts.push(p);
    pushHit(hitTest(p.x, p.y));

    events++;
    setDebug(`debug: ${src} move / events=${events} / hits=${currentHitIds.length}`);
    drawPlay();
  }

  function onEnd(src){
    if(!drawing) return;
    drawing = false;

    finalizeStroke();     // ★ここで直線補完して確定
    previewPts = [];
    currentHitIds = [];

    events++;
    setDebug(`debug: ${src} end / events=${events} / strokes=${strokes.length}`);
    drawPlay();
  }

  /* Pointer / Touch / Mouse 全対応 */
  play.addEventListener("pointerdown", (e)=>{
    e.preventDefault();
    try{ play.setPointerCapture?.(e.pointerId); }catch(_){}
    onStart(e.clientX, e.clientY, "pointer");
  }, {passive:false});

  play.addEventListener("pointermove", (e)=>{
    e.preventDefault();
    onMove(e.clientX, e.clientY, "pointer");
  }, {passive:false});

  play.addEventListener("pointerup", (e)=>{
    e.preventDefault();
    onEnd("pointer");
  }, {passive:false});

  play.addEventListener("pointercancel", (e)=>{
    e.preventDefault();
    onEnd("pointercancel");
  }, {passive:false});

  // mouse fallback
  play.addEventListener("mousedown", (e)=>{
    e.preventDefault();
    onStart(e.clientX, e.clientY, "mouse");
  }, {passive:false});

  window.addEventListener("mousemove", (e)=>{
    onMove(e.clientX, e.clientY, "mouse");
  }, {passive:true});

  window.addEventListener("mouseup", ()=>{
    onEnd("mouse");
  }, {passive:true});

  // touch fallback
  play.addEventListener("touchstart", (e)=>{
    e.preventDefault();
    const t = e.changedTouches[0];
    onStart(t.clientX, t.clientY, "touch");
  }, {passive:false});

  play.addEventListener("touchmove", (e)=>{
    e.preventDefault();
    const t = e.changedTouches[0];
    onMove(t.clientX, t.clientY, "touch");
  }, {passive:false});

  play.addEventListener("touchend", (e)=>{
    e.preventDefault();
    onEnd("touch");
  }, {passive:false});

  /* ======================
     判定：長い直線OK（線分カバー）
     ※確定ストローク(strokes[].ids)のみを使って判定（見た目と一致）
  ====================== */
  function segments(ids){
    const segs=[];
    for(let i=0;i<ids.length-1;i++){
      const a=ids[i], b=ids[i+1];
      if(a==null || b==null || a===b) continue;
      segs.push([a,b]);
    }
    return segs;
  }

  // segA（プレイヤー）が segB（お手本）を同一直線上で覆うか
  function covers(segA, segB){
    const p = idToNorm(segA[0]);
    const q = idToNorm(segA[1]);
    const r = idToNorm(segB[0]);
    const s = idToNorm(segB[1]);

    const vx = q.x - p.x, vy = q.y - p.y;
    const wx = r.x - p.x, wy = r.y - p.y;
    const cross = vx*wy - vy*wx;
    if(Math.abs(cross) > 1e-3) return false;

    const dot = (ax,ay,bx,by)=> ax*bx + ay*by;
    const pq = dot(vx,vy,vx,vy);
    if(pq < 1e-6) return false;

    const proj = (pt)=> dot(pt.x-p.x, pt.y-p.y, vx, vy);
    const r1 = proj(r), r2 = proj(s);
    const minRS = Math.min(r1,r2);
    const maxRS = Math.max(r1,r2);

    return (minRS <= pq + 1e-6) && (maxRS >= 0 - 1e-6);
  }

  function allPlayerSegments(){
    const segs = [];
    for(const st of strokes){
      segs.push(...segments(st.ids));
    }
    return segs;
  }

  function isCorrect(){
    const ansSegs = segments(compressCollinearIds(answer)); // お手本も直線まとめてOK
    const mySegs  = allPlayerSegments();
    if(mySegs.length === 0) return false;

    return ansSegs.every(a => mySegs.some(p => covers(p,a)));
  }

  /* ======================
     ボタン
  ====================== */
  function clearAll(msg="おてほんをみて なぞってね（何本でもOK）"){
    strokes = [];
    drawing = false;
    previewPts = [];
    currentHitIds = [];
    drawPlay();
    setStatus(msg);
    setDebug(`debug: cleared / strokes=${strokes.length}`);
  }

  doneBtn.addEventListener("click", ()=>{
    // 描画中なら確定してから判定（押しっぱなし誤操作対策）
    if(drawing) onEnd("force");

    if(strokes.length === 0){
      setStatus("まずは なぞってね🙂（線を引いてから「できた！」）");
      return;
    }

    if(isCorrect()){
      setStatus("せいかい！🎉 つぎの もんだいへ");
      setTimeout(()=>{
        answer = generateProblem();
        clearAll("つぎの もんだい");
        drawSample();
      }, 650);
    }else{
      setStatus("ちがうよ。もういちど！（何本でもOK）");
    }
  });

  nextBtn.addEventListener("click", ()=>{
    answer = generateProblem();
    clearAll("つぎの もんだい");
    drawSample();
  });

  clearBtn.addEventListener("click", ()=>{
    clearAll("やりなおし");
  });

  /* ======================
     起動
  ====================== */
  bootResize();
  drawSample();
  drawPlay();
})();
</script>
</body>
</html>
