<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>てんつなぎゲーム</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  background:#0b1538;
  color:#fff;
  display:flex;
  justify-content:center;
}
.wrap{
  width:min(420px, 96vw);
  padding:12px;
}
h1{
  font-size:18px;
  text-align:center;
  margin:6px 0 10px;
}
.board{
  background:#fff;
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
}
canvas{
  width:100%;
  aspect-ratio:1/1;
  touch-action:none;
}
.buttons{
  display:flex;
  gap:10px;
  justify-content:center;
}
button{
  font-size:16px;
  font-weight:900;
  padding:12px 18px;
  border-radius:14px;
  border:none;
  cursor:pointer;
}
.primary{
  background:#ffd54a;
  color:#221400;
}
.status{
  margin-top:8px;
  text-align:center;
  font-weight:900;
}
</style>
</head>

<body>
<div class="wrap">
  <h1>てんつなぎ</h1>

  <div class="board">
    <canvas id="sample"></canvas>
  </div>

  <div class="board">
    <canvas id="play"></canvas>
  </div>

  <div class="buttons">
    <button class="primary" id="doneBtn">できた！</button>
  </div>

  <div class="status" id="status">おてほんをみて なぞってね</div>
</div>

<script>
/* ===============================
   基本設定
================================ */
const GRID = 5;
const DOT_R = 6;

/* 点の正規化座標（0〜1） */
function dotPos(i,j){
  return {
    x:(j+1)/(GRID+1),
    y:(i+1)/(GRID+1)
  };
}

/* ===============================
   問題データ
   各点は「番号」で管理（0〜24）
================================ */
const problems = [
  {
    // 添付画像イメージ（木みたいな形）
    answer:[20,21,22,23,24,19,14,9,8,7,12,17,16,15,10,5,6,11]
  },
  {
    // シンプルな四角
    answer:[6,7,8,13,18,17,16,11,6]
  }
];
let current = 0;

/* ===============================
   Canvas初期化
================================ */
const sample = document.getElementById("sample");
const play   = document.getElementById("play");
const sctx = sample.getContext("2d");
const pctx = play.getContext("2d");

function resize(){
  [sample,play].forEach(c=>{
    const w = c.clientWidth;
    c.width = w;
    c.height = w;
  });
  drawSample();
  drawPlay();
}
window.addEventListener("resize",resize);
resize();

/* ===============================
   点描画
================================ */
function drawDots(ctx){
  ctx.fillStyle="#444";
  for(let i=0;i<GRID;i++){
    for(let j=0;j<GRID;j++){
      const p = dotPos(i,j);
      ctx.beginPath();
      ctx.arc(p.x*ctx.canvas.width, p.y*ctx.canvas.height, DOT_R, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

/* ===============================
   お手本
================================ */
function drawSample(){
  sctx.clearRect(0,0,sample.width,sample.height);
  drawDots(sctx);

  const a = problems[current].answer;
  sctx.strokeStyle="red";
  sctx.lineWidth=4;
  sctx.beginPath();
  a.forEach((id,k)=>{
    const i = Math.floor(id/GRID);
    const j = id%GRID;
    const p = dotPos(i,j);
    const x = p.x*sample.width;
    const y = p.y*sample.height;
    if(k===0) sctx.moveTo(x,y);
    else sctx.lineTo(x,y);
  });
  sctx.stroke();
}

/* ===============================
   プレイ側
================================ */
let path = [];
let drawing = false;

function drawPlay(){
  pctx.clearRect(0,0,play.width,play.height);
  drawDots(pctx);

  if(path.length>0){
    pctx.strokeStyle="#00d2ff";
    pctx.lineWidth=4;
    pctx.beginPath();
    path.forEach((id,k)=>{
      const i = Math.floor(id/GRID);
      const j = id%GRID;
      const p = dotPos(i,j);
      const x = p.x*play.width;
      const y = p.y*play.height;
      if(k===0) pctx.moveTo(x,y);
      else pctx.lineTo(x,y);
    });
    pctx.stroke();
  }
}

function hitTest(x,y){
  for(let i=0;i<GRID;i++){
    for(let j=0;j<GRID;j++){
      const id = i*GRID+j;
      const p = dotPos(i,j);
      const dx = x - p.x*play.width;
      const dy = y - p.y*play.height;
      if(Math.hypot(dx,dy) < 20) return id;
    }
  }
  return null;
}

play.addEventListener("pointerdown",e=>{
  drawing=true;
  path=[];
  const r = play.getBoundingClientRect();
  const id = hitTest(e.clientX-r.left, e.clientY-r.top);
  if(id!==null) path.push(id);
  drawPlay();
});

play.addEventListener("pointermove",e=>{
  if(!drawing) return;
  const r = play.getBoundingClientRect();
  const id = hitTest(e.clientX-r.left, e.clientY-r.top);
  if(id!==null && path[path.length-1]!==id){
    path.push(id);
    drawPlay();
  }
});

window.addEventListener("pointerup",()=>drawing=false);

/* ===============================
   判定
================================ */
document.getElementById("doneBtn").addEventListener("click",()=>{
  const ans = problems[current].answer.join(",");
  const pth = path.join(",");
  if(ans===pth){
    document.getElementById("status").textContent="せいかい！🎉";
    current = (current+1)%problems.length;
    path=[];
    setTimeout(()=>{
      drawSample();
      drawPlay();
      document.getElementById("status").textContent="つぎの もんだい";
    },800);
  }else{
    document.getElementById("status").textContent="ちがうよ。もういちど！";
  }
});
</script>
</body>
</html>
