<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>てんつなぎ（自動生成・離した瞬間に直線化）</title>

<style>
  :root{
    --bg1:#0b1538;
    --bg2:#0b2a3a;
    --text:#f2f5ff;
    --card:#ffffff;
    --dot:#3e4452;
    --sample:#ff3b3b;

    --draw:#00d2ff;                 /* 確定線（濃い水色） */
    --preview:rgba(0,210,255,.35);  /* 描画中プレビュー（薄い水色） */

    --accent:#ffd54a;
    --shadow:0 18px 60px rgba(0,0,0,.45);
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    color:var(--text);
    background:
      radial-gradient(1000px 700px at 15% 10%, #253d85, var(--bg1)),
      radial-gradient(900px 650px at 85% 20%, #3c1d7a, transparent 60%),
      radial-gradient(900px 650px at 50% 120%, #145a5e, transparent 55%),
      linear-gradient(180deg, var(--bg1), var(--bg2));
    min-height:100svh;
    display:flex;
    justify-content:center;
    padding:8px; /* ★省スペース（12→8） */
    overscroll-behavior:none;
  }

  /* ★花吹雪用Canvas（クリックを邪魔しない） */
  #fx{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    pointer-events:none;
    z-index:40;
  }

  /* 右上もどる */
  .backBtn{
    position:fixed;
    top:8px;
    right:8px;
    z-index:999;
    text-decoration:none;
    font-size:13px;
    font-weight:900;
    padding:8px 12px;
    border-radius:999px;
    background:rgba(255,255,255,.14);
    color:#fff;
    border:1px solid rgba(255,255,255,.25);
    backdrop-filter: blur(6px);
    box-shadow: 0 10px 26px rgba(0,0,0,.3);
    user-select:none;
    touch-action:manipulation;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .backBtn:active{ transform:scale(.97); filter:brightness(1.1); }

  .wrap{
    width:min(520px, 96vw);
  }

  h1{
    margin:4px 0 8px; /* ★省スペース */
    font-size:18px;
    font-weight:1000;
    text-align:center;
    letter-spacing:.02em;
  }

  .card{
    background:var(--card);
    border-radius:12px;
    padding:7px;        /* ★省スペース（10→7） */
    margin-bottom:8px;  /* ★省スペース（10→8） */
    box-shadow: var(--shadow);
  }

  canvas{
    display:block;
    width:100%;
    aspect-ratio:1/1;
    touch-action:none;
    user-select:none;
    -webkit-user-select:none;
  }

  .row{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:4px; /* ★省スペース */
  }

  button{
    border:none;
    border-radius:14px;
    padding:11px 16px; /* ★少しだけ省スペース */
    font-size:16px;
    font-weight:1000;
    cursor:pointer;
    user-select:none;
    touch-action:manipulation;
  }
  .primary{ background:var(--accent); color:#221400; }
  .sub{ background:rgba(255,255,255,.14); color:#fff; border:1px solid rgba(255,255,255,.22); }

  .status{
    margin-top:8px;
    text-align:center;
    font-weight:1000;
    min-height:1.6em;
  }
  .hint{
    margin-top:6px;
    text-align:center;
    font-size:12px;
    opacity:.86;
    line-height:1.4;
  }

  @media (max-width:420px){
    body{ padding:6px; }
    .card{ padding:6px; margin-bottom:7px; }
    button{ padding:10px 14px; }
  }
</style>
</head>

<body>
  <a class="backBtn" href="../index.html" aria-label="もどる">← もどる</a>
  <canvas id="fx"></canvas>

  <div class="wrap">
    <h1>てんつなぎ（自動生成）</h1>

    <div class="card">
      <canvas id="sample"></canvas>
    </div>

    <div class="card">
      <canvas id="play"></canvas>
    </div>

    <div class="row">
      <button class="primary" id="doneBtn">できた！</button>
      <button class="sub" id="nextBtn">つぎ</button>
      <button class="sub" id="clearBtn">けす</button>
    </div>

    <div class="status" id="status">おてほんをみて なぞってね（離すと直線になるよ）</div>
    <div class="hint">※ 描いている最中は薄い線 / 指を離すと点→点の直線（濃い線）に変わります。</div>
  </div>

<script>
(() => {
  "use strict";

  /* ======================
     設定
  ====================== */
  const GRID = 5;
  const DOT_R = 6;

  // 点を拾う半径（px）
  const HIT_R = 30;

  // 「開始点/終了点」はこれより近ければ強制スナップ（px）
  const FORCE_SNAP_R = 55;

  // お手本の長さ（点数）
  const MIN_LEN = 9;
  const MAX_LEN = 16;

  /* ======================
     DOM / Canvas
  ====================== */
  const sample = document.getElementById("sample");
  const play   = document.getElementById("play");
  const sctx = sample.getContext("2d");
  const pctx = play.getContext("2d");

  const statusEl = document.getElementById("status");
  const doneBtn  = document.getElementById("doneBtn");
  const nextBtn  = document.getElementById("nextBtn");
  const clearBtn = document.getElementById("clearBtn");

  function setStatus(t){ statusEl.textContent = t; }

  window.addEventListener("error", (e) => {
    setStatus("エラー: " + (e.message || "unknown"));
  });

  /* ======================
     正解音（WebAudio）
  ====================== */
  let audioCtx = null;
  function ctx(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  async function ensureAudio(){
    try{
      const c = ctx();
      if(c.state === "suspended") await c.resume();
    }catch(e){}
  }
  function tone(freq, t0, dur, type="triangle", gain=0.12){
    const c = ctx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = 0.0001;
    o.connect(g); g.connect(c.destination);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.start(t0);
    o.stop(t0 + dur + 0.02);
  }
  function playOk(){
    const c = ctx();
    const t = c.currentTime;
    tone(660, t, .10, "triangle", .14);
    tone(880, t + .10, .12, "triangle", .12);
    tone(1100, t + .22, .14, "sine", .10);
  }

  /* ======================
     花吹雪（Canvas）
  ====================== */
  const fx = document.getElementById("fx");
  const fxCtx = fx.getContext("2d");
  const confetti = [];
  function resizeFX(){
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    fx.width = Math.floor(innerWidth * dpr);
    fx.height = Math.floor(innerHeight * dpr);
    fx.style.width = innerWidth + "px";
    fx.style.height = innerHeight + "px";
    fxCtx.setTransform(dpr,0,0,dpr,0,0);
  }
  addEventListener("resize", resizeFX, {passive:true});
  resizeFX();

  function rand(a,b){ return a + Math.random()*(b-a); }
  function spawnConfetti(n=160){
    const cols = ["#ffd54a","#7CFFB2","#5ad8ff","#ff7bd1","#b48cff","#ffffff"];
    for(let i=0;i<n;i++){
      confetti.push({
        x: innerWidth*0.5 + rand(-60,60),
        y: innerHeight*0.22 + rand(-30,30),
        vx: rand(-6,6),
        vy: rand(-10,-3),
        g: 0.14,
        r: rand(2.2,4.6),
        a: 1,
        life: rand(45, 95),
        col: cols[(Math.random()*cols.length)|0]
      });
    }
  }
  function fxLoop(){
    fxCtx.clearRect(0,0,innerWidth,innerHeight);
    for(let i=confetti.length-1;i>=0;i--){
      const p = confetti[i];
      p.x += p.vx; p.y += p.vy; p.vy += p.g;
      p.life -= 1; p.a *= 0.985;
      fxCtx.globalAlpha = Math.max(0, Math.min(1, p.a));
      fxCtx.fillStyle = p.col;
      fxCtx.beginPath();
      fxCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      fxCtx.fill();
      if(p.life <= 0 || p.y > innerHeight + 80) confetti.splice(i,1);
    }
    requestAnimationFrame(fxLoop);
  }
  requestAnimationFrame(fxLoop);

  /* ======================
     座標（正規化）
  ====================== */
  function dotPos(i,j){
    return { x:(j+1)/(GRID+1), y:(i+1)/(GRID+1) };
  }
  function idToIJ(id){
    return { i: Math.floor(id/GRID), j: id % GRID };
  }
  function idToNorm(id){
    const {i,j} = idToIJ(id);
    return dotPos(i,j);
  }

  /* ======================
     Canvasサイズ確定
  ====================== */
  function resizeCanvas(c){
    const r = c.getBoundingClientRect();
    const w = Math.max(1, Math.floor(r.width));
    c.width = w;
    c.height = w;
  }
  function resizeAll(){
    resizeCanvas(sample);
    resizeCanvas(play);
    drawSample();
    drawPlay();
  }
  function bootResize(){
    resizeAll();
    requestAnimationFrame(resizeAll);
    setTimeout(resizeAll, 60);
    setTimeout(resizeAll, 220);
  }
  window.addEventListener("resize", bootResize, {passive:true});

  /* ======================
     問題自動生成（自己交差OK）
     ランダムウォーク（上下左右）
  ====================== */
  function randInt(a,b){ return Math.floor(a + Math.random()*(b-a+1)); }

  function neighbors(id){
    const {i,j} = idToIJ(id);
    const cand = [];
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    for(const [di,dj] of dirs){
      const ni=i+di, nj=j+dj;
      if(0<=ni && ni<GRID && 0<=nj && nj<GRID) cand.push(ni*GRID+nj);
    }
    return cand;
  }

  function compressSeq(ids){
    const out = [];
    for(const v of ids){
      if(out.length===0 || out[out.length-1]!==v) out.push(v);
    }
    return out;
  }

  // 3点が同一直線（外積≈0）
  function collinear(a,b,c,eps=1e-12){
    const abx=b.x-a.x, aby=b.y-a.y;
    const bcx=c.x-b.x, bcy=c.y-b.y;
    const cross = abx*bcy - aby*bcx;
    return Math.abs(cross) < eps;
  }

  // 中間点を削って長い直線へ
  function compressCollinearIds(ids){
    const clean = compressSeq(ids);
    if(clean.length <= 2) return clean;

    const out = [clean[0]];
    for(let i=1;i<clean.length-1;i++){
      const a = idToNorm(out[out.length-1]);
      const b = idToNorm(clean[i]);
      const c = idToNorm(clean[i+1]);
      if(collinear(a,b,c)) continue;
      out.push(clean[i]);
    }
    out.push(clean[clean.length-1]);
    return out;
  }

  function generateProblem(){
    const len = randInt(MIN_LEN, MAX_LEN);
    let cur = randInt(0, GRID*GRID-1);
    const path = [cur];
    for(let k=1;k<len;k++){
      const ns = neighbors(cur);
      cur = ns[randInt(0, ns.length-1)];
      path.push(cur);
    }
    const out = compressSeq(path);
    return out.length >= 2 ? out : generateProblem();
  }

  let answer = generateProblem();

  /* ======================
     描画ユーティリティ
  ====================== */
  function drawDots(ctx){
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--dot").trim() || "#444";
    for(let i=0;i<GRID;i++){
      for(let j=0;j<GRID;j++){
        const p = dotPos(i,j);
        const x = p.x * ctx.canvas.width;
        const y = p.y * ctx.canvas.height;
        ctx.beginPath();
        ctx.arc(x,y, DOT_R, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  function drawPolyline(ctx, pts, color, width){
    if(pts.length < 2) return;
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineJoin = "round";
    ctx.lineCap  = "round";
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
  }

  function idsToCanvasPts(ids, canvas){
    return ids.map(id => {
      const p = idToNorm(id);
      return { x:p.x*canvas.width, y:p.y*canvas.height };
    });
  }

  function drawSample(){
    sctx.clearRect(0,0,sample.width,sample.height);
    drawDots(sctx);
    const pts = idsToCanvasPts(answer, sample);
    drawPolyline(sctx, pts, "red", 4);
  }

  /* ======================
     プレイ：複数ストローク
     - 描画中：フリーハンド（薄い線）
     - 離した瞬間：点→点の直線（濃い線）に確定
  ====================== */
  let strokes = []; // { ids:[], pts:[{x,y}...] }

  let drawing = false;
  let rawPts = [];         // フリーハンド軌跡
  let currentIds = [];     // move中拾い（最終確定はrawPtsから再抽出）

  function drawPlay(){
    pctx.clearRect(0,0,play.width,play.height);
    drawDots(pctx);

    // 確定済み（濃い水色）
    for(const st of strokes){
      drawPolyline(pctx, st.pts, "#00d2ff", 4);
    }

    // 描画中プレビュー（薄い水色）
    if(drawing && rawPts.length > 1){
      drawPolyline(pctx, rawPts, "rgba(0,210,255,.35)", 4);
    }
  }

  function clientToCanvasXY(clientX, clientY){
    const r = play.getBoundingClientRect();
    return { x: clientX - r.left, y: clientY - r.top };
  }

  function nearestDotId(x,y){
    let best=null, bestD=1e9;
    for(let i=0;i<GRID;i++){
      for(let j=0;j<GRID;j++){
        const id = i*GRID + j;
        const p = dotPos(i,j);
        const px = p.x * play.width;
        const py = p.y * play.height;
        const d = Math.hypot(x-px, y-py);
        if(d < bestD){
          bestD = d;
          best = id;
        }
      }
    }
    return { id: best, dist: bestD };
  }

  function pushUnique(arr, id){
    if(id==null) return;
    if(arr.length===0 || arr[arr.length-1]!==id) arr.push(id);
  }

  // rawPts全体から点列抽出（取りこぼし対策）
  function extractIdsFromRaw(raw){
    const ids = [];

    // 途中点：近い点を拾う
    for(const p of raw){
      const {id, dist} = nearestDotId(p.x, p.y);
      if(dist <= HIT_R){
        pushUnique(ids, id);
      }
    }

    // 開始点/終了点の強制スナップ
    if(raw.length){
      const first = raw[0];
      const last  = raw[raw.length-1];

      const a = nearestDotId(first.x, first.y);
      const b = nearestDotId(last.x, last.y);

      if(a.dist <= FORCE_SNAP_R){
        ids.unshift(a.id);
        while(ids.length>=2 && ids[0]===ids[1]) ids.shift();
      }
      if(b.dist <= FORCE_SNAP_R){
        ids.push(b.id);
        while(ids.length>=2 && ids[ids.length-1]===ids[ids.length-2]) ids.pop();
      }
    }

    return compressCollinearIds(ids);
  }

  function finalizeStroke(){
    const ids = extractIdsFromRaw(rawPts);
    if(ids.length < 2) return false;

    const pts = idsToCanvasPts(ids, play);
    strokes.push({ ids, pts });
    return true;
  }

  function onStart(clientX, clientY){
    drawing = true;
    rawPts = [];
    currentIds = [];

    const p = clientToCanvasXY(clientX, clientY);
    rawPts.push(p);

    const n = nearestDotId(p.x,p.y);
    if(n.dist <= HIT_R) pushUnique(currentIds, n.id);

    drawPlay();
  }

  function onMove(clientX, clientY){
    if(!drawing) return;

    const p = clientToCanvasXY(clientX, clientY);
    rawPts.push(p);

    const n = nearestDotId(p.x,p.y);
    if(n.dist <= HIT_R) pushUnique(currentIds, n.id);

    drawPlay();
  }

  function onEnd(){
    if(!drawing) return;
    drawing = false;

    const ok = finalizeStroke();

    // プレビューを消し、確定線のみ表示
    rawPts = [];
    currentIds = [];
    drawPlay();

    if(ok){
      setStatus("いいね！直線にしたよ。つづけて描いてOK（できた！で判定）");
    }else{
      setStatus("点の近くをなぞってね（離すと直線になるよ）");
    }
  }

  /* 入力：Pointer + Touch + Mouse */
  play.addEventListener("pointerdown", async (e)=>{
    e.preventDefault();
    await ensureAudio(); // ★最初の操作で音が有効になるように
    try{ play.setPointerCapture?.(e.pointerId); }catch(_){}
    onStart(e.clientX, e.clientY);
  }, {passive:false});

  play.addEventListener("pointermove", (e)=>{
    e.preventDefault();
    onMove(e.clientX, e.clientY);
  }, {passive:false});

  play.addEventListener("pointerup", (e)=>{
    e.preventDefault();
    onEnd();
  }, {passive:false});

  play.addEventListener("pointercancel", (e)=>{
    e.preventDefault();
    onEnd();
  }, {passive:false});

  // touch fallback
  play.addEventListener("touchstart", async (e)=>{
    e.preventDefault();
    await ensureAudio();
    const t = e.changedTouches[0];
    onStart(t.clientX, t.clientY);
  }, {passive:false});

  play.addEventListener("touchmove", (e)=>{
    e.preventDefault();
    const t = e.changedTouches[0];
    onMove(t.clientX, t.clientY);
  }, {passive:false});

  play.addEventListener("touchend", (e)=>{
    e.preventDefault();
    onEnd();
  }, {passive:false});

  // mouse fallback
  play.addEventListener("mousedown", async (e)=>{
    e.preventDefault();
    await ensureAudio();
    onStart(e.clientX, e.clientY);
  }, {passive:false});

  window.addEventListener("mousemove", (e)=> onMove(e.clientX, e.clientY), {passive:true});
  window.addEventListener("mouseup", ()=> onEnd(), {passive:true});

  /* ======================
     判定：長い直線OK（線分カバー）
     ※確定ストローク(strokes[].ids)を使う（見た目と一致）
  ====================== */
  function segments(ids){
    const segs=[];
    for(let i=0;i<ids.length-1;i++){
      const a=ids[i], b=ids[i+1];
      if(a==null || b==null || a===b) continue;
      segs.push([a,b]);
    }
    return segs;
  }

  function covers(segA, segB){
    const p = idToNorm(segA[0]);
    const q = idToNorm(segA[1]);
    const r = idToNorm(segB[0]);
    const s = idToNorm(segB[1]);

    const vx = q.x - p.x, vy = q.y - p.y;
    const wx = r.x - p.x, wy = r.y - p.y;
    const cross = vx*wy - vy*wx;
    if(Math.abs(cross) > 1e-3) return false;

    const dot = (ax,ay,bx,by)=> ax*bx + ay*by;
    const pq = dot(vx,vy,vx,vy);
    if(pq < 1e-6) return false;

    const proj = (pt)=> dot(pt.x-p.x, pt.y-p.y, vx, vy);
    const r1 = proj(r), r2 = proj(s);
    const minRS = Math.min(r1,r2);
    const maxRS = Math.max(r1,r2);

    return (minRS <= pq + 1e-6) && (maxRS >= 0 - 1e-6);
  }

  function allPlayerSegments(){
    const out = [];
    for(const st of strokes) out.push(...segments(st.ids));
    return out;
  }

  function isCorrect(){
    const ansSegs = segments(compressCollinearIds(answer));
    const mySegs  = allPlayerSegments();
    if(mySegs.length === 0) return false;
    return ansSegs.every(a => mySegs.some(p => covers(p,a)));
  }

  /* ======================
     ボタン
  ====================== */
  function clearAll(msg="おてほんをみて なぞってね（離すと直線になるよ）"){
    strokes = [];
    drawing = false;
    rawPts = [];
    currentIds = [];
    drawPlay();
    setStatus(msg);
  }

  function celebrate(){
    spawnConfetti(180);
    playOk();
  }

  doneBtn.addEventListener("click", async ()=>{
    // 描画中なら確定してから判定
    if(drawing) onEnd();

    if(strokes.length === 0){
      setStatus("まずは なぞってね🙂（線を引いてから「できた！」）");
      return;
    }

    await ensureAudio();

    if(isCorrect()){
      setStatus("せいかい！🎉");
      celebrate();
      setTimeout(()=>{
        answer = generateProblem();
        clearAll("つぎの もんだい");
        drawSample();
      }, 850);
    }else{
      setStatus("ちがうよ。もういちど！（線を足してもOK）");
    }
  });

  nextBtn.addEventListener("click", ()=>{
    answer = generateProblem();
    clearAll("つぎの もんだい");
    drawSample();
  });

  clearBtn.addEventListener("click", ()=>{
    clearAll("やりなおし");
  });

  /* ======================
     起動
  ====================== */
  bootResize();
  drawSample();
  drawPlay();
})();
</script>
</body>
</html>
