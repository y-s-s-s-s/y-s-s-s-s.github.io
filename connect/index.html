<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>てんつなぎゲーム</title>

<style>
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    background:#0b1538;
    color:#fff;
    display:flex;
    justify-content:center;
  }
  .wrap{
    width:min(420px, 96vw);
    padding:12px;
  }
  h1{
    font-size:18px;
    text-align:center;
    margin:6px 0 10px;
  }
  .board{
    background:#fff;
    border-radius:12px;
    padding:10px;
    margin-bottom:10px;
  }

  /* ★重要：canvasはblockにする（当たり判定ズレ防止） */
  canvas{
    display:block;
    width:100%;
    aspect-ratio:1/1;
    touch-action:none; /* pointerが効く環境ではスクロール抑制 */
  }

  .buttons{
    display:flex;
    gap:10px;
    justify-content:center;
  }
  button{
    font-size:16px;
    font-weight:900;
    padding:12px 18px;
    border-radius:14px;
    border:none;
    cursor:pointer;
  }
  .primary{
    background:#ffd54a;
    color:#221400;
  }
  .sub{
    background:rgba(255,255,255,.14);
    color:#fff;
  }
  .status{
    margin-top:8px;
    text-align:center;
    font-weight:900;
    min-height:1.6em;
  }
  .hint{
    font-size:12px;
    opacity:.8;
    text-align:center;
    margin-top:6px;
  }
</style>
</head>

<body>
<div class="wrap">
  <h1>てんつなぎ</h1>

  <div class="board">
    <canvas id="sample"></canvas>
  </div>

  <div class="board">
    <canvas id="play"></canvas>
  </div>

  <div class="buttons">
    <button class="primary" id="doneBtn">できた！</button>
    <button class="sub" id="clearBtn">けす</button>
  </div>

  <div class="status" id="status">おてほんをみて なぞってね</div>
  <div class="hint">点の上を通ると自動でつながります</div>
</div>

<script>
/* ===============================
   基本設定
================================ */
const GRID = 5;
const DOT_R = 6;
const HIT_R = 22; // 点に触れた判定（大きめで優しく）

/* 点の正規化座標（0〜1） */
function dotPos(i,j){
  return { x:(j+1)/(GRID+1), y:(i+1)/(GRID+1) };
}

/* ===============================
   問題データ（点ID 0〜24）
   i*GRID + j （i=上から0..4, j=左から0..4）
================================ */
const problems = [
  {
    name:"おうち",
    answer:[20,21,22,23,24,19,14,9,8,7,12,17,16,15,10,5,6,11]
  },
  {
    name:"しかく",
    answer:[6,7,8,13,18,17,16,11,6]
  }
];
let current = 0;

/* ===============================
   Canvas初期化
================================ */
const sample = document.getElementById("sample");
const play   = document.getElementById("play");
const sctx = sample.getContext("2d");
const pctx = play.getContext("2d");
const statusEl = document.getElementById("status");

function setStatus(msg){ statusEl.textContent = msg; }

function resize(){
  [sample,play].forEach(c=>{
    const w = Math.max(1, c.getBoundingClientRect().width);
    c.width = Math.floor(w);
    c.height = Math.floor(w);
  });
  drawSample();
  drawPlay();
}
window.addEventListener("resize", resize, {passive:true});
resize();

/* ===============================
   点描画
================================ */
function drawDots(ctx){
  ctx.fillStyle="#444";
  for(let i=0;i<GRID;i++){
    for(let j=0;j<GRID;j++){
      const p = dotPos(i,j);
      ctx.beginPath();
      ctx.arc(p.x*ctx.canvas.width, p.y*ctx.canvas.height, DOT_R, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

/* ===============================
   お手本描画（赤）
================================ */
function drawSample(){
  sctx.clearRect(0,0,sample.width,sample.height);
  drawDots(sctx);

  const a = problems[current].answer;
  sctx.strokeStyle="red";
  sctx.lineWidth=4;
  sctx.lineJoin="round";
  sctx.lineCap="round";
  sctx.beginPath();
  a.forEach((id,k)=>{
    const i = Math.floor(id/GRID);
    const j = id%GRID;
    const p = dotPos(i,j);
    const x = p.x*sample.width;
    const y = p.y*sample.height;
    if(k===0) sctx.moveTo(x,y);
    else sctx.lineTo(x,y);
  });
  sctx.stroke();
}

/* ===============================
   プレイ側（青）
================================ */
let path = [];       // 通過した点ID列
let drawing = false; // なぞり中か
let lastId = null;

function drawPlay(){
  pctx.clearRect(0,0,play.width,play.height);
  drawDots(pctx);

  if(path.length>0){
    pctx.strokeStyle="#00d2ff";
    pctx.lineWidth=4;
    pctx.lineJoin="round";
    pctx.lineCap="round";
    pctx.beginPath();
    path.forEach((id,k)=>{
      const i = Math.floor(id/GRID);
      const j = id%GRID;
      const p = dotPos(i,j);
      const x = p.x*play.width;
      const y = p.y*play.height;
      if(k===0) pctx.moveTo(x,y);
      else pctx.lineTo(x,y);
    });
    pctx.stroke();
  }
}

/* 画面座標→キャンバス座標 */
function getLocalXY(ev){
  const r = play.getBoundingClientRect();
  return { x: ev.clientX - r.left, y: ev.clientY - r.top };
}

/* 点ヒット判定（近い点のIDを返す） */
function hitTest(x,y){
  let hit = null;
  let best = 1e9;
  for(let i=0;i<GRID;i++){
    for(let j=0;j<GRID;j++){
      const id = i*GRID+j;
      const p = dotPos(i,j);
      const px = p.x*play.width;
      const py = p.y*play.height;
      const d = Math.hypot(x-px, y-py);
      if(d < HIT_R && d < best){
        best = d;
        hit = id;
      }
    }
  }
  return hit;
}

function addPoint(id){
  if(id==null) return;
  if(path.length===0){
    path.push(id);
    lastId = id;
    drawPlay();
    return;
  }
  if(lastId !== id){
    path.push(id);
    lastId = id;
    drawPlay();
  }
}

/* ===============================
   入力：Pointer / Mouse / Touch 全対応
================================ */
function startDrawFromEvent(e){
  drawing = true;
  path = [];
  lastId = null;

  setStatus("なぞってるよ…（できた！で判定）");

  const {x,y} = getLocalXY(e);
  addPoint(hitTest(x,y));
}

function moveDrawFromEvent(e){
  if(!drawing) return;
  const {x,y} = getLocalXY(e);
  addPoint(hitTest(x,y));
}

function endDraw(){
  drawing = false;
}

/* Pointer（対応環境） */
play.addEventListener("pointerdown", (e)=>{
  e.preventDefault();
  play.setPointerCapture?.(e.pointerId);
  startDrawFromEvent(e);
});
play.addEventListener("pointermove", (e)=>{
  e.preventDefault();
  moveDrawFromEvent(e);
});
play.addEventListener("pointerup", (e)=>{
  e.preventDefault();
  endDraw();
});
play.addEventListener("pointercancel", endDraw);

/* Mouse（保険） */
play.addEventListener("mousedown", (e)=>{
  e.preventDefault();
  startDrawFromEvent(e);
});
window.addEventListener("mousemove", (e)=>{
  if(!drawing) return;
  moveDrawFromEvent(e);
});
window.addEventListener("mouseup", endDraw);

/* Touch（保険：Android/Safariでpointerが効かない時） */
play.addEventListener("touchstart", (e)=>{
  e.preventDefault();
  const t = e.changedTouches[0];
  startDrawFromEvent(t);
}, {passive:false});

play.addEventListener("touchmove", (e)=>{
  e.preventDefault();
  const t = e.changedTouches[0];
  moveDrawFromEvent(t);
}, {passive:false});

play.addEventListener("touchend", (e)=>{
  e.preventDefault();
  endDraw();
}, {passive:false});

/* ===============================
   判定
================================ */
function isCorrect(){
  const ans = problems[current].answer;
  if(path.length !== ans.length) return false;
  for(let i=0;i<ans.length;i++){
    if(path[i] !== ans[i]) return false;
  }
  return true;
}

document.getElementById("doneBtn").addEventListener("click", ()=>{
  if(path.length === 0){
    setStatus("まずは なぞってね🙂");
    return;
  }

  if(isCorrect()){
    setStatus("せいかい！🎉 つぎへ！");
    current = (current + 1) % problems.length;
    setTimeout(()=>{
      path = [];
      lastId = null;
      drawSample();
      drawPlay();
      setStatus("おてほんをみて なぞってね");
    }, 700);
  }else{
    setStatus("ちがうよ。もういちど！（けす でやりなおし）");
  }
});

document.getElementById("clearBtn").addEventListener("click", ()=>{
  path = [];
  lastId = null;
  drawPlay();
  setStatus("おてほんをみて なぞってね");
});

/* 初期表示 */
drawSample();
drawPlay();
</script>
</body>
</html>
