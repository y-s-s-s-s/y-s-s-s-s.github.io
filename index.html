<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>面接練習 抽選ガチャ</title>
  <style>
    :root{
      --bg:#070b18; --card:#121a35; --accent:#ffd54a; --ok:#7CFFB2; --text:#eef1ff;
      --pink:#ff7bd1; --blue:#5ad8ff; --vio:#b48cff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
      background:
        radial-gradient(900px 650px at 15% 10%, #1b2a5a, var(--bg)),
        radial-gradient(900px 650px at 90% 20%, #2b165f, transparent 60%),
        radial-gradient(900px 650px at 50% 120%, #134a4e, transparent 55%);
      color:var(--text);
      display:flex; min-height:100vh; align-items:center; justify-content:center;
      overflow:hidden;
    }

    /* FX Canvas */
    #fx{
      position:fixed; inset:0;
      width:100vw; height:100vh;
      pointer-events:none;
      z-index:5;
    }

    .wrap{ width:min(940px, 92vw); z-index:10; }
    h1{ font-size:20px; font-weight:900; margin:0 0 10px; letter-spacing:.04em; }
    .tabs{ display:flex; gap:8px; margin:10px 0 14px;}
    .tab{
      padding:10px 14px; border-radius:999px;
      background:rgba(255,255,255,.08);
      cursor:pointer; user-select:none;
      border:1px solid rgba(255,255,255,.10);
    }
    .tab.active{
      background:rgba(255,213,74,.18);
      border:1px solid rgba(255,213,74,.45);
      box-shadow: 0 0 0 2px rgba(255,213,74,.10) inset;
    }

    .card{
      position:relative;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px; padding:18px;
      box-shadow: 0 22px 80px rgba(0,0,0,.45);
      overflow:hidden;
    }

    /* subtle moving shine */
    .card::before{
      content:"";
      position:absolute; inset:-60% -40%;
      background: conic-gradient(from 180deg, transparent, rgba(255,255,255,.08), transparent 40%);
      animation: sheen 8s linear infinite;
      opacity:.35;
      pointer-events:none;
    }
    @keyframes sheen{
      0%{ transform:rotate(0deg) translateZ(0); }
      100%{ transform:rotate(360deg) translateZ(0); }
    }

    .displayWrap{
      position:relative;
      display:grid;
      grid-template-columns: 110px 1fr;
      gap:12px;
      align-items:center;
    }

    /* “Gacha coin” logo */
    .logo{
      width:110px; height:110px;
      border-radius:50%;
      display:grid; place-items:center;
      position:relative;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.35), transparent 40%),
        radial-gradient(circle at 70% 70%, rgba(0,0,0,.40), transparent 55%),
        linear-gradient(145deg, rgba(255,213,74,.95), rgba(255,123,209,.85), rgba(90,216,255,.85));
      border:1px solid rgba(255,255,255,.25);
      box-shadow: 0 14px 35px rgba(0,0,0,.40);
      transform: translateZ(0);
    }
    .logo::after{
      content:"";
      position:absolute; inset:10px;
      border-radius:50%;
      border:1px dashed rgba(0,0,0,.25);
      opacity:.55;
    }
    .logoText{
      font-weight:1000;
      letter-spacing:.06em;
      font-size:18px;
      color:#240f00;
      text-shadow: 0 1px 0 rgba(255,255,255,.55);
      text-align:center;
      line-height:1.05;
      user-select:none;
    }
    .logoText small{
      display:block;
      font-size:11px;
      opacity:.85;
      letter-spacing:.12em;
      margin-top:4px;
    }
    .spin{ animation: spin 650ms linear infinite; }
    @keyframes spin{ to { transform:rotate(360deg); } }

    .logoWin{
      animation: win 900ms cubic-bezier(.2,1.2,.25,1) 1;
      box-shadow:
        0 0 0 3px rgba(255,213,74,.20) inset,
        0 0 30px rgba(255,213,74,.35),
        0 18px 55px rgba(0,0,0,.45);
    }
    @keyframes win{
      0%{ transform:scale(1) rotate(0deg); filter:brightness(1); }
      40%{ transform:scale(1.10) rotate(10deg); filter:brightness(1.25); }
      70%{ transform:scale(0.98) rotate(-6deg); filter:brightness(1.15); }
      100%{ transform:scale(1.03) rotate(0deg); filter:brightness(1.20); }
    }

    .display{
      background:rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.14);
      border-radius:16px;
      padding:18px;
      min-height:110px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:26px;
      line-height:1.35;
      font-weight:1000;
      position:relative;
      transform: translateZ(0);
    }

    /* “ATARI” badge */
    .badge{
      position:absolute;
      top:-10px;
      right:-10px;
      background: linear-gradient(135deg, rgba(255,213,74,1), rgba(255,123,209,1));
      color:#200b00;
      font-weight:1000;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.35);
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
      transform: rotate(10deg) scale(.9);
      opacity:0;
      pointer-events:none;
    }
    .badge.show{
      opacity:1;
      animation: pop 700ms cubic-bezier(.2,1.4,.25,1) 1;
    }
    @keyframes pop{
      0%{ transform: rotate(10deg) scale(.2); opacity:0; }
      50%{ transform: rotate(10deg) scale(1.12); opacity:1; }
      100%{ transform: rotate(10deg) scale(1.0); opacity:1; }
    }

    .hint{ margin-top:10px; font-size:13px; opacity:.85; }

    .row{
      display:flex; gap:12px; flex-wrap:wrap;
      margin-top:14px; align-items:center;
    }
    button{
      border:none; border-radius:14px;
      padding:14px 16px; font-size:16px; font-weight:1000;
      cursor:pointer; user-select:none; touch-action:manipulation;
      box-shadow: 0 16px 40px rgba(0,0,0,.25);
    }
    .start{ background:var(--accent); color:#1b1b1b; }
    .reset{
      background:rgba(255,255,255,.10); color:var(--text);
      border:1px solid rgba(255,255,255,.18);
      box-shadow:none;
    }
    .toggle{
      display:flex; gap:10px; align-items:center;
      padding:10px 12px; border-radius:14px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      font-size:13px; font-weight:900;
    }
    .toggle input{ transform:scale(1.2); }

    .flash{
      animation: flash 520ms ease-in-out 0s 2;
      outline: 2px solid rgba(255,213,74,.45);
    }
    @keyframes flash{
      0%{ transform:scale(1); filter:brightness(1); }
      50%{ transform:scale(1.02); filter:brightness(1.25); }
      100%{ transform:scale(1); filter:brightness(1); }
    }

    .grid{ display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:14px; }
    textarea{
      width:100%; height:160px; resize:vertical;
      background:rgba(0,0,0,.25); color:var(--text);
      border:1px solid rgba(255,255,255,.14); border-radius:14px;
      padding:12px; line-height:1.5; font-size:13px;
    }
    .muted{ font-size:12px; opacity:.82; margin:6px 0 0; }
    .history{ margin-top:12px; font-size:13px; opacity:.92; }
    .history b{ color:var(--ok); }

    @media (max-width:700px){
      .displayWrap{ grid-template-columns: 92px 1fr; }
      .logo{ width:92px; height:92px; }
      .display{ font-size:22px; min-height:120px; }
      .grid{ grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <canvas id="fx"></canvas>

  <div class="wrap">
    <h1>面接練習 抽選ガチャ（豪華演出）</h1>

    <div class="tabs">
      <div class="tab active" data-mode="child">子ども用</div>
      <div class="tab" data-mode="parent">保護者用</div>
    </div>

    <div class="card">
      <div class="displayWrap">
        <div id="logo" class="logo">
          <div class="logoText">
            GACHA
            <small>INTERVIEW</small>
          </div>
        </div>

        <div id="display" class="display">
          スタートを押してね
          <div id="badge" class="badge">当たり！</div>
        </div>
      </div>

      <div class="hint">
        ※短い演出でサッと決まります。効果音は右のスイッチでON/OFF。iPadは「最初のタップ」で音が有効になります（仕様）。
      </div>

      <div class="row">
        <button id="btnStart" class="start">抽選スタート</button>
        <button id="btnAgain" class="reset">もう一回</button>
        <button id="btnClear" class="reset">履歴クリア</button>

        <label class="toggle" title="iPadはサイレントモードだと鳴らないことがあります">
          <input id="soundToggle" type="checkbox" checked />
          効果音 ON
        </label>
      </div>

      <div class="history" id="history">履歴：なし</div>

      <div class="grid">
        <div>
          <div class="muted">子ども用 質問（1行=1問）</div>
          <textarea id="taChild"></textarea>
        </div>
        <div>
          <div class="muted">保護者用 質問（1行=1問）</div>
          <textarea id="taParent"></textarea>
        </div>
      </div>

      <div class="muted">
        iPadでのコツ：Safari → 共有 →「ホーム画面に追加」でアプリ風に使えます。<br/>
        ※「音が鳴らない」時はサイレント解除＆音量確認をお願いします。
      </div>
    </div>
  </div>

<script>
  // -------------------
  // 初期質問（例）※自由に置き換えOK
  // -------------------
  const defaultChild = [
    "小学校でがんばりたいことは何ですか？",
    "好きな遊びは何ですか？",
    "お友達とケンカしたらどうしますか？",
    "バレエで好きなところはどこですか？",
    "困ったときはどうしますか？"
  ].join("\n");

  const defaultParent = [
    "本校を志望された理由を教えてください。",
    "お子さまの長所と、伸ばしたい点を教えてください。",
    "つまずいたとき、家庭ではどのように関わりますか？",
    "ご家庭で大切にしていることを具体例で教えてください。",
    "『存在するだけですばらしい』をどう理解されていますか？"
  ].join("\n");

  // -------------------
  // UI参照
  // -------------------
  const canvas = document.getElementById("fx");
  const cx = canvas.getContext("2d");
  const display = document.getElementById("display");
  const badge = document.getElementById("badge");
  const logo = document.getElementById("logo");
  const tabs = document.querySelectorAll(".tab");
  const taChild = document.getElementById("taChild");
  const taParent = document.getElementById("taParent");
  const historyEl = document.getElementById("history");
  const soundToggle = document.getElementById("soundToggle");

  taChild.value = defaultChild;
  taParent.value = defaultParent;

  let mode = "child";
  let rolling = false;

  // 被りを減らす：直近N件は出にくくする
  let history = [];
  const avoidN = 6;

  // ルーレットの長さ（短め）
  const SPIN_STEPS = 14;  // 少し短い
  const SPIN_DELAY0 = 22; // 初期速度(ms)

  // -------------------
  // Canvas resize
  // -------------------
  function resize(){
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    canvas.style.width = innerWidth + "px";
    canvas.style.height = innerHeight + "px";
    cx.setTransform(dpr,0,0,dpr,0,0);
  }
  addEventListener("resize", resize, {passive:true});
  resize();

  // -------------------
  // WebAudio（豪華サウンド：外部ファイル無し）
  // -------------------
  let audioCtx = null;
  function ctx(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  async function ensureAudio(){
    try{
      const c = ctx();
      if(c.state === "suspended") await c.resume();
    }catch(e){}
  }

  function playNoiseBurst(time, dur, gain, freq){
    const c = ctx();
    const bufferSize = Math.floor(c.sampleRate * dur);
    const buffer = c.createBuffer(1, bufferSize, c.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++){
      data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
    }
    const src = c.createBufferSource();
    src.buffer = buffer;

    const filter = c.createBiquadFilter();
    filter.type = "bandpass";
    filter.frequency.value = freq;

    const g = c.createGain();
    g.gain.value = 0.0001;

    src.connect(filter);
    filter.connect(g);
    g.connect(c.destination);

    g.gain.setValueAtTime(0.0001, time);
    g.gain.exponentialRampToValueAtTime(gain, time + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, time + dur);

    src.start(time);
    src.stop(time + dur);
  }

  function playClick(){
    if(!soundToggle.checked) return;
    const c = ctx();
    const t = c.currentTime;

    // tick (square)
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = "square";
    o.frequency.value = 520 + Math.random()*260;
    g.gain.value = 0.0001;
    o.connect(g); g.connect(c.destination);

    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.10, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
    o.start(t); o.stop(t + 0.06);

    // shimmer noise
    playNoiseBurst(t, 0.06, 0.06, 4200 + Math.random()*1200);
  }

  function playBell(){
    if(!soundToggle.checked) return;
    const c = ctx();
    const t = c.currentTime;

    // bell-ish: sine + partials
    const freqs = [880, 1320, 1760];
    freqs.forEach((f, i)=>{
      const o = c.createOscillator();
      const g = c.createGain();
      o.type = "sine";
      o.frequency.value = f * (1 + (Math.random()-0.5)*0.01);
      o.connect(g); g.connect(c.destination);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.12/(i+1), t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.25 + i*0.05);
      o.start(t);
      o.stop(t + 0.33 + i*0.08);
    });

    // tiny sparkle
    playNoiseBurst(t, 0.10, 0.08, 6500);
  }

  function playFanfare(){
    if(!soundToggle.checked) return;
    const c = ctx();
    const t0 = c.currentTime;

    // short fanfare notes
    const notes = [523.25, 659.25, 783.99, 1046.5]; // C E G C
    notes.forEach((f, i)=>{
      const t = t0 + i*0.07;
      const o = c.createOscillator();
      const g = c.createGain();
      o.type = "triangle";
      o.frequency.value = f;
      o.connect(g); g.connect(c.destination);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.12, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
      o.start(t);
      o.stop(t + 0.13);
    });

    // chord tail
    const chord = [392, 494, 587]; // G B D
    chord.forEach((f, i)=>{
      const t = t0 + 0.28;
      const o = c.createOscillator();
      const g = c.createGain();
      o.type = "sine";
      o.frequency.value = f;
      o.connect(g); g.connect(c.destination);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.10/(i+1), t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.44);
      o.start(t);
      o.stop(t + 0.5);
    });

    // “ジャーン！” noise hit
    playNoiseBurst(t0 + 0.27, 0.18, 0.12, 2400);
    playNoiseBurst(t0 + 0.30, 0.22, 0.08, 5200);
  }

  // -------------------
  // キラキラ粒子（Canvas）
  // -------------------
  const particles = [];
  let fxRunning = true;
  let sparkleMode = "idle"; // "idle" | "spin" | "win"

  function rand(a,b){ return a + Math.random()*(b-a); }
  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  function spawnSparkle(n, burst=false){
    const colors = ["#ffd54a","#ff7bd1","#5ad8ff","#b48cff","#ffffff"];
    for(let i=0;i<n;i++){
      const angle = burst ? rand(0, Math.PI*2) : rand(-Math.PI/2 - 0.6, -Math.PI/2 + 0.6);
      const speed = burst ? rand(2.5, 8.5) : rand(1.2, 3.5);
      const x = burst ? innerWidth*0.50 + rand(-10,10) : rand(0, innerWidth);
      const y = burst ? innerHeight*0.30 + rand(-10,10) : innerHeight + rand(0, 40);
      particles.push({
        x, y,
        vx: Math.cos(angle)*speed + (burst?0:rand(-0.5,0.5)),
        vy: Math.sin(angle)*speed - (burst?0:rand(0.5,1.2)),
        g: burst ? 0.14 : 0.06,
        r: burst ? rand(2,4.2) : rand(1.3,3.0),
        a: 1,
        rot: rand(0, Math.PI),
        vr: rand(-0.25,0.25),
        col: pick(colors),
        life: burst ? rand(35, 85) : rand(40, 90),
        shape: Math.random() < 0.45 ? "star" : "dot"
      });
    }
  }

  function drawStar(x,y,r,rot){
    cx.save();
    cx.translate(x,y);
    cx.rotate(rot);
    cx.beginPath();
    for(let i=0;i<5;i++){
      cx.lineTo(Math.cos((18+i*72)*Math.PI/180)*r, -Math.sin((18+i*72)*Math.PI/180)*r);
      cx.lineTo(Math.cos((54+i*72)*Math.PI/180)*r*0.45, -Math.sin((54+i*72)*Math.PI/180)*r*0.45);
    }
    cx.closePath();
    cx.fill();
    cx.restore();
  }

  function ringFlash(){
    // draw a quick ring at center-top for “impact”
    const r = {x: innerWidth*0.67, y: innerHeight*0.23, t:0};
    const id = Symbol();
    const step = () => {
      r.t += 1;
      const p = r.t/18;
      if(p>=1) return;
      cx.save();
      cx.globalAlpha = (1-p)*0.35;
      cx.strokeStyle = "#ffd54a";
      cx.lineWidth = 4;
      cx.beginPath();
      cx.arc(r.x, r.y, 10 + p*120, 0, Math.PI*2);
      cx.stroke();
      cx.restore();
      requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }

  function fxLoop(){
    if(!fxRunning) return;
    cx.clearRect(0,0,innerWidth,innerHeight);

    // continuous sparkle during spin
    if(sparkleMode === "spin"){
      if(Math.random() < 0.55) spawnSparkle(3, false);
    }

    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += p.g;
      p.rot += p.vr;
      p.life -= 1;
      p.a *= 0.985;

      cx.globalAlpha = Math.max(0, Math.min(1, p.a));
      cx.fillStyle = p.col;

      if(p.shape === "star") drawStar(p.x, p.y, p.r*1.6, p.rot);
      else{
        cx.beginPath();
        cx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        cx.fill();
      }

      if(p.life <= 0 || p.y > innerHeight + 80){
        particles.splice(i,1);
      }
    }
    requestAnimationFrame(fxLoop);
  }
  requestAnimationFrame(fxLoop);

  // -------------------
  // タブ切替
  // -------------------
  tabs.forEach(t => t.addEventListener("click", ()=>{
    tabs.forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    mode = t.dataset.mode;
    display.textContent = "スタートを押してね";
    badge.classList.remove("show");
    display.classList.remove("flash");
  }));

  function getList(){
    const raw = (mode === "child" ? taChild.value : taParent.value);
    return raw.split("\n").map(s=>s.trim()).filter(Boolean);
  }

  function pickSmart(list){
    if(list.length === 0) return null;
    if(history.length === 0) return list[Math.floor(Math.random()*list.length)];
    const recent = new Set(history.slice(-avoidN));
    const pool = list.filter(x=>!recent.has(x));
    const use = pool.length ? pool : list;
    return use[Math.floor(Math.random()*use.length)];
  }

  function escapeHtml(str){
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function updateHistory(q){
    history.push(q);
    const showList = history.slice(-8);
    const show = showList.map((x,i)=>{
      const mark = (i === showList.length-1) ? "<b>★</b>" : "・";
      return `${mark} ${escapeHtml(x)}`;
    }).join("<br>");
    historyEl.innerHTML = `履歴（直近）:<br>${show}`;
  }

  // -------------------
  // メイン：ルーレット（短い＋豪華演出）
  // -------------------
  async function roulette(){
    if(rolling) return;
    const list = getList();
    if(list.length === 0){
      display.textContent = "質問が空です。テキスト欄に質問を入れてね。";
      return;
    }

    rolling = true;
    display.classList.remove("flash");
    badge.classList.remove("show");
    logo.classList.remove("logoWin");

    await ensureAudio();

    // spin mode ON
    sparkleMode = "spin";
    logo.classList.add("spin");

    // 短め：だいたい0.8〜1.1秒
    let delay = SPIN_DELAY0;
    let q = null;

    for(let i=0;i<SPIN_STEPS;i++){
      q = list[Math.floor(Math.random()*list.length)];
      display.textContent = q;
      playClick();

      if(i > SPIN_STEPS*0.65) delay += 18;
      else if(i > SPIN_STEPS*0.35) delay += 9;

      await new Promise(r=>setTimeout(r, delay));
    }

    // final pick
    q = pickSmart(list);
    display.textContent = q;

    // spin mode OFF → win!
    sparkleMode = "idle";
    logo.classList.remove("spin");

    // strong win visuals
    display.classList.add("flash");
    badge.classList.add("show");
    logo.classList.add("logoWin");

    // FX burst
    spawnSparkle(120, true);     // burst
    spawnSparkle(60, false);     // falling sparkle
    ringFlash();

    // rich sound
    playBell();
    playFanfare();

    updateHistory(q);
    rolling = false;
  }

  document.getElementById("btnStart").addEventListener("click", roulette);
  document.getElementById("btnAgain").addEventListener("click", roulette);
  document.getElementById("btnClear").addEventListener("click", ()=>{
    history = [];
    historyEl.textContent = "履歴：なし";
    display.textContent = "スタートを押してね";
    display.classList.remove("flash");
    badge.classList.remove("show");
    logo.classList.remove("logoWin");
  });
</script>
</body>
</html>
